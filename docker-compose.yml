x-runtime-timezone-environment: &runtime-timezone-environment
  # 本地开发、演示和 E2E 环境默认按北京时间展示容器日志、数据库 CURRENT_TIMESTAMP、Java/Python 本地时间。
  # 生产环境如果需要 UTC 统一存储，可以通过 DATASMART_TIME_ZONE 显式覆盖，并在前端展示层转换。
  TZ: ${DATASMART_TIME_ZONE:-Asia/Shanghai}

services:
  # PostgreSQL 是 DataSmart 的目标事务数据库、Agent 长期记忆库和 LangGraph durable state 候选底座。
  #
  # 当前处于 MySQL -> PostgreSQL 渐进迁移期，因此 PostgreSQL 与 MySQL 会暂时并存：
  # - 已完成迁移的服务通过 PostgreSQL 中自己的 schema 访问数据；
  # - 尚未迁移的历史服务继续使用 MySQL，直到对应 schema、SQL、测试和 E2E 全部通过；
  # - 迁移完成后删除 MySQL 服务和 mysql_data，而不是永久维护双写。
  postgresql:
    # pgvector 官方镜像同时提供 PostgreSQL 与 vector extension。
    # 默认经 DaoCloud 国内镜像前缀拉取；企业环境可通过 DATASMART_POSTGRES_IMAGE 指向 Harbor/Nexus。
    # 当前固定 PostgreSQL 17，因为 Spring Boot 3.5.11 管理的 Flyway 已正式验证到 17；
    # PostgreSQL 18 虽可启动，但会产生“尚未测试支持”的迁移警告，不适合作为当前商业基线。
    image: ${DATASMART_POSTGRES_IMAGE:-docker.m.daocloud.io/pgvector/pgvector:0.8.3-pg17}
    container_name: datasmart-postgresql
    environment:
      <<: *runtime-timezone-environment
      POSTGRES_DB: datasmart_govern
      POSTGRES_USER: datasmart
      POSTGRES_PASSWORD: ${DATASMART_POSTGRES_PASSWORD:-password}
      # Keycloak 作为 OIDC 身份中心时会维护 realm、client、用户、角色、服务账号、密钥轮换历史等身份事实。
      # 这些事实不应该继续落在 Keycloak dev 文件目录里，而是进入 PostgreSQL 独立 database，方便备份恢复、
      # 权限隔离和未来迁移到客户托管 PostgreSQL。这里把变量传给 init 脚本，首次创建 postgresql_data 卷时自动建库。
      DATASMART_KEYCLOAK_DB_NAME: ${DATASMART_KEYCLOAK_DB_NAME:-keycloak}
      DATASMART_KEYCLOAK_DB_USERNAME: ${DATASMART_KEYCLOAK_DB_USERNAME:-keycloak}
      DATASMART_KEYCLOAK_DB_PASSWORD: ${DATASMART_KEYCLOAK_DB_PASSWORD:-keycloak}
    ports:
      - "${DATASMART_LOCAL_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./docker/postgresql/init:/docker-entrypoint-initdb.d:ro
    command:
      # PostgreSQL 的 `TIMESTAMPTZ` 底层仍按绝对时间存储；这里设置的是会话展示与
      # `localtimestamp` 这类“本地墙钟时间”函数的默认时区，避免本地页面、审计和 Flyway
      # 记录看起来慢 8 小时。
      - postgres
      - -c
      - timezone=${DATASMART_TIME_ZONE:-Asia/Shanghai}
      - -c
      - log_timezone=${DATASMART_TIME_ZONE:-Asia/Shanghai}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datasmart -d datasmart_govern"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - datasmart-network
    restart: unless-stopped

  # Keycloak PostgreSQL bootstrap 是一个一次性补偿服务。
  #
  # 为什么还需要它：
  # - PostgreSQL 官方 init 脚本只在数据目录第一次创建时运行；
  # - 很多开发机已经存在 postgresql_data 卷，如果只新增 init 脚本，旧卷不会自动拥有 keycloak database；
  # - 该服务每次启动 Keycloak 前都幂等执行同一份建库脚本，确保新旧本地环境都能补齐数据库契约；
  # - 它只创建/更新角色密码和 database，不删除、不导出、不覆盖任何 Keycloak realm 或用户数据。
  keycloak-db-bootstrap:
    image: ${DATASMART_POSTGRES_IMAGE:-docker.m.daocloud.io/pgvector/pgvector:0.8.3-pg17}
    container_name: datasmart-keycloak-db-bootstrap
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      <<: *runtime-timezone-environment
      POSTGRES_HOST: postgresql
      POSTGRES_PORT: 5432
      POSTGRES_USER: datasmart
      POSTGRES_PASSWORD: ${DATASMART_POSTGRES_PASSWORD:-password}
      DATASMART_KEYCLOAK_DB_NAME: ${DATASMART_KEYCLOAK_DB_NAME:-keycloak}
      DATASMART_KEYCLOAK_DB_USERNAME: ${DATASMART_KEYCLOAK_DB_USERNAME:-keycloak}
      DATASMART_KEYCLOAK_DB_PASSWORD: ${DATASMART_KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      - ./docker/postgresql/init/01-keycloak-database.sh:/docker-entrypoint-initdb.d/01-keycloak-database.sh:ro
    entrypoint:
      - /bin/sh
      - /docker-entrypoint-initdb.d/01-keycloak-database.sh
    networks:
      - datasmart-network
    restart: "no"

  # MySQL 是迁移期兼容数据库，不再是目标架构。
  # 它只服务于尚未完成 PostgreSQL schema/SQL 转换的历史模块以及当前 Nacos 外置存储。
  mysql:
    # 默认通过 DaoCloud 国内镜像站拉取；企业环境可用 DATASMART_MYSQL_IMAGE 指向私有仓库。
    image: ${DATASMART_MYSQL_IMAGE:-docker.m.daocloud.io/library/mysql:8.0}
    container_name: datasmart-mysql
    environment:
      <<: *runtime-timezone-environment
      MYSQL_ROOT_PASSWORD: ${DATASMART_MYSQL_PASSWORD:-password}
      MYSQL_DATABASE: datasmart_govern
      MYSQL_USER: datasmart
      MYSQL_PASSWORD: ${DATASMART_MYSQL_PASSWORD:-password}
    command:
      # MySQL 的 DATETIME 没有时区信息，默认时区会影响 NOW()/CURRENT_TIMESTAMP 写入的墙钟时间。
      # 本地闭环按北京时间运行，因此显式使用 +08:00，避免 JDBC、Nacos 和历史兼容表出现 UTC 偏移。
      - --default-time-zone=+08:00
    ports:
      # 宿主机常见会安装本地 MySQL 并占用 3306；本地工具（Navicat/DataGrip）默认走 13306，
      # 容器网络内的 Nacos 和业务服务仍通过 mysql:3306 访问，不受宿主机端口调整影响。
      - "${DATASMART_LOCAL_MYSQL_PORT:-13306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - datasmart-network
    restart: unless-stopped

  # Redis 预留给缓存、分布式协调和短生命周期运行态数据。
  redis:
    image: ${DATASMART_REDIS_IMAGE:-docker.m.daocloud.io/library/redis:7.2-alpine}
    container_name: datasmart-redis
    environment:
      <<: *runtime-timezone-environment
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - datasmart-network
    restart: unless-stopped

  # Kafka + Zookeeper 为后续模块解耦协作提供异步事件基础设施。
  zookeeper:
    image: ${DATASMART_ZOOKEEPER_IMAGE:-docker.m.daocloud.io/confluentinc/cp-zookeeper:7.6.0}
    container_name: datasmart-zookeeper
    environment:
      <<: *runtime-timezone-environment
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - datasmart-network
    # Zookeeper 是当前 Kafka 7.6 (ZooKeeper mode) 的强依赖。Docker Desktop 重启后若它不自动恢复，
    # Kafka 和 Python AI Runtime 会形成连续重启链，因此必须同时声明重启策略与真实就绪探针。
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 5 >/dev/null 2>&1"]
      interval: 10s
      timeout: 8s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  kafka:
    image: ${DATASMART_KAFKA_IMAGE:-docker.m.daocloud.io/confluentinc/cp-kafka:7.6.0}
    container_name: datasmart-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      <<: *runtime-timezone-environment
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - datasmart-network
    # 进程启动不代表 broker 已经能够完成 metadata 请求；下游必须等待该探针通过后再创建 producer。
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b kafka:29092 1 10 >/dev/null 2>&1"]
      interval: 10s
      timeout: 15s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  # Neo4j 预留给血缘关系、知识图谱和治理关联建模能力。
  neo4j:
    image: ${DATASMART_NEO4J_IMAGE:-docker.m.daocloud.io/library/neo4j:5.20}
    container_name: datasmart-neo4j
    environment:
      <<: *runtime-timezone-environment
      NEO4J_AUTH: neo4j/${DATASMART_NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["graph-data-science"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - datasmart-network
    restart: unless-stopped

  # MinIO 用于保存报表、文件和不适合直接放入 MySQL 的大对象。
  minio:
    image: ${DATASMART_MINIO_IMAGE:-docker.m.daocloud.io/minio/minio:latest}
    container_name: datasmart-minio
    environment:
      <<: *runtime-timezone-environment
      MINIO_ACCESS_KEY: ${DATASMART_MINIO_ACCESS_KEY:-datasmart}
      MINIO_SECRET_KEY: ${DATASMART_MINIO_SECRET_KEY:-datasmart123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - datasmart-network
    restart: unless-stopped

  # Nacos 是微服务注册与配置中心，网关和各业务模块都会依赖它。
  nacos:
    image: ${DATASMART_NACOS_IMAGE:-docker.m.daocloud.io/nacos/nacos-server:v2.3.0}
    container_name: datasmart-nacos
    environment:
      <<: *runtime-timezone-environment
      MODE: standalone
      # Nacos 2.3 镜像的配置模板已经从旧的 spring.datasource.platform 迁移到 spring.sql.init.platform，
      # 但部分启动路径和排障资料仍会同时参考旧属性。这里同时提供环境变量和 JVM system property，
      # 让本地 E2E 明确进入 MySQL 外置存储模式，避免出现 "No DataSource set" 的重启循环。
      SPRING_DATASOURCE_PLATFORM: mysql
      SPRING_SQL_INIT_PLATFORM: mysql
      JAVA_OPT_EXT: "-Dspring.datasource.platform=mysql -Dspring.sql.init.platform=mysql -Duser.timezone=${DATASMART_TIME_ZONE:-Asia/Shanghai}"
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: ${DATASMART_MYSQL_PASSWORD:-password}
      # MySQL 8 默认认证插件会在非 SSL 连接下要求客户端允许获取公钥。
      # Nacos 2.3 镜像内部使用 JDBC 连接外置 MySQL，如果不显式追加 allowPublicKeyRetrieval=true，
      # 本地 E2E 会在 Nacos 启动阶段报 Public Key Retrieval is not allowed，随后所有 Java 微服务注册都会失败。
      MYSQL_SERVICE_DB_PARAM: characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true
    ports:
      - "8848:8848"
      - "9848:9848"
    depends_on:
      - mysql
    volumes:
      - nacos_logs:/home/nacos/logs
      - nacos_data:/home/nacos/data
    networks:
      - datasmart-network
    restart: unless-stopped

  # Keycloak 是本地开发与集成测试使用的 OIDC 身份提供方样板。
  #
  # 设计意图：
  # 1. gateway 已按 OIDC Resource Server 校验 Bearer JWT，因此本地环境也需要一个真实 IdP 签发标准 JWT；
  # 2. 这里使用 Keycloak 官方镜像和 realm import，而不是在 gateway 内继续维护简化 token 逻辑；
  # 3. `docker/keycloak/import/datasmart-realm.json` 会导入 datasmart realm、datasmart-gateway client、
  #    audience mapper、DataSmart 平台必需 claim mapper 和本地样例用户；
  # 4. `start-dev`、默认 admin 密码和样例用户密码只允许用于本地学习/联调，生产必须替换为正式 Keycloak 集群、
  #    企业 IdP、TLS、外部数据库、Secret Manager 和组织用户同步策略。
  keycloak:
    # Keycloak 官方镜像来源是 Quay，而不是 Docker Hub。
    # Docker Hub 镜像可通过 `docker.m.daocloud.io/library/...` 加速；
    # Quay 镜像则需要使用 DaoCloud 的 Quay 专用入口 `quay.m.daocloud.io/...`。
    # 保留 DATASMART_KEYCLOAK_IMAGE 覆盖点，便于企业环境切换到私有镜像仓库或已签名镜像。
    image: ${DATASMART_KEYCLOAK_IMAGE:-quay.m.daocloud.io/keycloak/keycloak:26.6.4}
    container_name: datasmart-keycloak
    command:
      - start-dev
      - --http-port=18080
      - --import-realm
    depends_on:
      keycloak-db-bootstrap:
        condition: service_completed_successfully
    environment:
      # Keycloak 26+ 推荐使用 KC_BOOTSTRAP_ADMIN_* 初始化本地管理员。
      # 这些默认值只用于本地容器；生产不能把 admin/admin 或任何固定密码写入部署配置。
      <<: *runtime-timezone-environment
      KC_BOOTSTRAP_ADMIN_USERNAME: ${DATASMART_KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${DATASMART_KEYCLOAK_ADMIN_PASSWORD:-admin}
      # Keycloak 的身份事实数据现在进入 PostgreSQL 独立 database。
      # start-dev 仍只代表“本地开发启动模式”，不再代表使用容器文件目录保存用户/realm。
      # 生产环境应继续替换为正式 hostname、TLS、集群化 Keycloak、受控 Secret 和高可用 PostgreSQL。
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgresql:5432/${DATASMART_KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${DATASMART_KEYCLOAK_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${DATASMART_KEYCLOAK_DB_PASSWORD:-keycloak}
      # 打开健康和指标端点，便于后续 Prometheus 或运维脚本对认证中心做存活检查。
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      JAVA_OPTS_APPEND: "-Duser.timezone=${DATASMART_TIME_ZONE:-Asia/Shanghai}"
    ports:
      # 对外使用 18080，避免与 gateway 8080、Nacos 8848、Chroma 8000 等端口冲突。
      - "18080:18080"
    volumes:
      # realm import 只读挂载，防止容器运行时误改仓库内的身份样板。
      - ./docker/keycloak/import:/opt/keycloak/data/import:ro
    networks:
      - datasmart-network
    restart: unless-stopped

  # Prometheus 负责抓取并存储可观测性层暴露的指标数据。
  prometheus:
    image: ${DATASMART_PROMETHEUS_IMAGE:-docker.m.daocloud.io/prom/prometheus:latest}
    container_name: datasmart-prometheus
    environment:
      <<: *runtime-timezone-environment
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      # 告警规则单独挂载目录，便于按模块维护 data-sync、data-quality、task-management 等规则文件。
      - ./docker/prometheus/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus
    networks:
      - datasmart-network
    restart: unless-stopped

  # Alertmanager 负责接收 Prometheus 触发的告警，并进行分组、抑制、静默和通知路由。
  # 当前配置使用空接收器占位，避免本地开发误发真实通知；生产环境再替换为邮件、企业 IM 或工单 webhook。
  alertmanager:
    image: ${DATASMART_ALERTMANAGER_IMAGE:-docker.m.daocloud.io/prom/alertmanager:latest}
    container_name: datasmart-alertmanager
    environment:
      <<: *runtime-timezone-environment
    ports:
      - "9093:9093"
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      # 通知模板用于统一邮件、webhook、企业 IM 的标题和正文格式；当前 receiver 仍为空接收器，生产接入时复用模板。
      - ./docker/alertmanager/templates:/etc/alertmanager/templates
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - datasmart-network
    restart: unless-stopped

  # Grafana 用于指标可视化以及后续的告警看板展示。
  grafana:
    image: ${DATASMART_GRAFANA_IMAGE:-docker.m.daocloud.io/grafana/grafana:latest}
    container_name: datasmart-grafana
    environment:
      <<: *runtime-timezone-environment
      GF_SECURITY_ADMIN_PASSWORD: ${DATASMART_GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      # provisioning 目录用于自动创建数据源和 dashboard provider，避免每次重建容器后手动配置。
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      # dashboards 目录用于存放可导入的 JSON 面板，本轮先提供 data-sync 运维总览。
      # 挂载到 /etc/grafana/dashboards，避免和 /var/lib/grafana 数据卷互相遮挡。
      - ./docker/grafana/dashboards:/etc/grafana/dashboards
      - grafana_data:/var/lib/grafana
    networks:
      - datasmart-network
    restart: unless-stopped

  # Chroma 为后续检索增强或语义治理助手能力预留向量存储支撑。
  chroma:
    image: ${DATASMART_CHROMA_IMAGE:-docker.m.daocloud.io/chromadb/chroma:latest}
    container_name: datasmart-chroma
    environment:
      <<: *runtime-timezone-environment
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - datasmart-network
    restart: unless-stopped

volumes:
  postgresql_data:
  mysql_data:
  redis_data:
  kafka_data:
  neo4j_data:
  neo4j_logs:
  minio_data:
  nacos_logs:
  nacos_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  chroma_data:

networks:
  datasmart-network:
    driver: bridge
