version: '3.8'

services:
  # MySQL 是当前已实现业务模块的核心事务库。
  # 挂载初始化脚本可以让本地启动后直接具备可运行的基础表结构。
  mysql:
    image: mysql:8.0
    container_name: datasmart-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: datasmart_govern
      MYSQL_USER: datasmart
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - datasmart-network
    restart: unless-stopped

  # Redis 预留给缓存、分布式协调和短生命周期运行态数据。
  redis:
    image: redis:7.2-alpine
    container_name: datasmart-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - datasmart-network
    restart: unless-stopped

  # Kafka + Zookeeper 为后续模块解耦协作提供异步事件基础设施。
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: datasmart-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - datasmart-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: datasmart-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - datasmart-network
    restart: unless-stopped

  # Neo4j 预留给血缘关系、知识图谱和治理关联建模能力。
  neo4j:
    image: neo4j:5.20
    container_name: datasmart-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["graph-data-science"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - datasmart-network
    restart: unless-stopped

  # MinIO 用于保存报表、文件和不适合直接放入 MySQL 的大对象。
  minio:
    image: minio/minio:latest
    container_name: datasmart-minio
    environment:
      MINIO_ACCESS_KEY: datasmart
      MINIO_SECRET_KEY: datasmart123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - datasmart-network
    restart: unless-stopped

  # Nacos 是微服务注册与配置中心，网关和各业务模块都会依赖它。
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: datasmart-nacos
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: password
    ports:
      - "8848:8848"
      - "9848:9848"
    depends_on:
      - mysql
    volumes:
      - nacos_logs:/home/nacos/logs
      - nacos_data:/home/nacos/data
    networks:
      - datasmart-network
    restart: unless-stopped

  # Prometheus 负责抓取并存储可观测性层暴露的指标数据。
  prometheus:
    image: prom/prometheus:latest
    container_name: datasmart-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - datasmart-network
    restart: unless-stopped

  # Grafana 用于指标可视化以及后续的告警看板展示。
  grafana:
    image: grafana/grafana:latest
    container_name: datasmart-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - datasmart-network
    restart: unless-stopped

  # Chroma 为后续检索增强或语义治理助手能力预留向量存储支撑。
  chroma:
    image: chromadb/chroma:latest
    container_name: datasmart-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - datasmart-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  kafka_data:
  neo4j_data:
  neo4j_logs:
  minio_data:
  nacos_logs:
  nacos_data:
  prometheus_data:
  grafana_data:
  chroma_data:

networks:
  datasmart-network:
    driver: bridge
