# Grafana 数据源自动配置。
#
# 这个文件会被 docker-compose 挂载到 Grafana 的 provisioning/datasources 目录。
# Grafana 启动时会自动读取它，并创建名为 Prometheus 的数据源。
# 这样本地环境不需要手动登录 Grafana 后再点击页面配置数据源，减少环境搭建步骤。
apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    # Grafana 和 Prometheus 位于同一个 docker-compose 网络中，
    # 因此这里使用服务名 prometheus 和容器内端口 9090，而不是 localhost。
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
