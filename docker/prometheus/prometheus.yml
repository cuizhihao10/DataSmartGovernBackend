global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        # Prometheus 与 Alertmanager 运行在同一个 docker-compose 网络中，
        # 因此这里使用服务名 alertmanager 和容器内端口 9093。
        - targets:
            - 'alertmanager:9093'

rule_files:
  # 规则文件按模块拆分，避免所有告警混在 prometheus.yml 中。
  # 当前先接入 data-sync 的恢复、幂等清理和运行数据清理告警。
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: 'gateway'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: '/actuator/prometheus'

  - job_name: 'task-management'
    static_configs:
      - targets: ['host.docker.internal:8081']
    metrics_path: '/actuator/prometheus'

  - job_name: 'datasource-management'
    static_configs:
      - targets: ['host.docker.internal:8082']
    metrics_path: '/actuator/prometheus'

  - job_name: 'data-quality'
    static_configs:
      - targets: ['host.docker.internal:8083']
    metrics_path: '/actuator/prometheus'

  - job_name: 'data-sync'
    static_configs:
      - targets: ['host.docker.internal:8086']
    metrics_path: '/actuator/prometheus'

  - job_name: 'observability'
    static_configs:
      - targets: ['host.docker.internal:8084']
    metrics_path: '/actuator/prometheus'

  - job_name: 'python-ai-runtime'
    static_configs:
      # Python AI Runtime 默认建议监听 8090，避免与 Chroma 等本地 AI 组件常用的 8000 端口冲突。
      # 该服务不是 Spring Boot 应用，因此不使用 /actuator/prometheus，而是暴露轻量业务指标端点 /agent/metrics。
      # 当前端点只输出低基数长期记忆物化指标；单条候选排障继续走 Runtime Event replay、lease/receipt 查询和审计链路。
      - targets: ['host.docker.internal:8090']
    metrics_path: '/agent/metrics'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
