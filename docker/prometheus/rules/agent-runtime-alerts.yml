# DataSmart Govern - agent-runtime 告警规则草案。
#
# 设计原则：
# 1. agent-runtime 是 Java 侧 AI 控制面，当前重点监控异步 command dispatcher 的执行前复核和 Skill 可见性索引健康；
# 2. Prometheus 只看聚合趋势：通过率、阻断率、暂缓率、确认过期、容量暂缓、策略缺失、索引失败率、fallback 比例和 Manifest 绑定异常；
# 3. 单条 command 的排障继续走 runtime event replay、outbox 诊断、confirmation 查询和结构化日志；
# 4. 规则标签只使用 module/category/severity 这类固定枚举，不把 commandId、tenantId、runId、traceId 等业务主键放入时序；
# 5. 当前阈值适合本地和早期集成环境，生产应按 worker 实例数、租户套餐、任务流量和 SLA 重新调优。
groups:
  - name: datasmart-agent-runtime-availability
    rules:
      - alert: AgentRuntimeMetricsDown
        expr: up{job="agent-runtime"} == 0
        for: 2m
        labels:
          severity: critical
          module: agent-runtime
          category: availability
        annotations:
          summary: "agent-runtime Prometheus 抓取失败"
          description: "Prometheus 连续 2 分钟无法抓取 agent-runtime 的 /actuator/prometheus。请优先检查 Java agent-runtime 进程、8091 端口、Actuator Prometheus 端点、docker 网络和 agent-runtime job 配置。"

      - alert: AgentRuntimeMetricsTargetMissing
        expr: absent(up{job="agent-runtime"})
        for: 2m
        labels:
          severity: critical
          module: agent-runtime
          category: availability
        annotations:
          summary: "Prometheus 未发现 agent-runtime 抓取目标"
          description: "Prometheus 中不存在 job=agent-runtime 的目标。通常表示 prometheus.yml 未加载、Prometheus 容器未重载，或本地环境尚未启用 agent-runtime 指标抓取。"

  - name: datasmart-agent-runtime-async-command-precheck
    rules:
      - alert: AgentRuntimeAsyncCommandPreCheckBlockedDetected
        expr: increase(datasmart_agent_runtime_async_command_precheck_verdict_total{decision="BLOCKED"}[15m]) > 0
        for: 2m
        labels:
          severity: warning
          module: agent-runtime
          category: async-command-precheck
        annotations:
          summary: "Agent 异步 command 执行前复核出现阻断"
          description: "最近 15 分钟 agent-runtime dispatcher pre-check 产生 BLOCKED verdict。请通过 runtime event replay 查询 tool_pre_check_blocked 事件，并结合 confirmationId、policyVersion、sandboxIssueCodes 和 outbox 状态判断是否需要重新 dry-run/confirmation 或人工补偿。"

      - alert: AgentRuntimeAsyncCommandPreCheckDeferredRatioHigh
        expr: |
          (
            sum(rate(datasmart_agent_runtime_async_command_precheck_verdict_total{decision="DEFERRED"}[15m]))
            /
            clamp_min(sum(rate(datasmart_agent_runtime_async_command_precheck_verdict_total[15m])), 1)
          ) > 0.2
        for: 5m
        labels:
          severity: warning
          module: agent-runtime
          category: async-command-precheck
        annotations:
          summary: "Agent 异步 command 执行前复核暂缓比例偏高"
          description: "最近 15 分钟 pre-check DEFERRED 比例持续高于 20%。通常表示 runtime-protection 容量不足、目标服务熔断或 Run policy 暂不可读。请检查 targetService 容量、熔断状态、agent-runtime 日志和下游服务健康。"

      - alert: AgentRuntimeAsyncCommandConfirmationExpired
        expr: increase(datasmart_agent_runtime_async_command_precheck_issue_total{issueCode="CONFIRMATION_EXPIRED"}[15m]) > 0
        for: 2m
        labels:
          severity: warning
          module: agent-runtime
          category: async-command-precheck
        annotations:
          summary: "Agent 异步 command 确认记录过期"
          description: "最近 15 分钟出现 CONFIRMATION_EXPIRED。说明用户确认的 dry-run 预案已经过期，worker 不应继续执行副作用。请引导用户重新执行 dry-run 和 selected-node confirmation。"

      - alert: AgentRuntimeAsyncCommandRuntimeProtectionDeferred
        expr: increase(datasmart_agent_runtime_async_command_precheck_issue_total{issueCode="RUNTIME_PROTECTION_DEFERRED_BEFORE_WORKER"}[15m]) > 5
        for: 5m
        labels:
          severity: info
          module: agent-runtime
          category: async-command-precheck
        annotations:
          summary: "Agent 异步 command 因运行时保护频繁暂缓"
          description: "最近 15 分钟 runtime-protection 暂缓超过 5 次。少量出现是正常背压；如果持续升高，请评估是否需要拆批、扩容、调整并发上限或排查目标服务熔断。"

      - alert: AgentRuntimeAsyncCommandPolicyItemMissing
        expr: increase(datasmart_agent_runtime_async_command_precheck_issue_total{issueCode="CURRENT_POLICY_ITEM_MISSING"}[10m]) > 0
        for: 2m
        labels:
          severity: warning
          module: agent-runtime
          category: async-command-precheck
        annotations:
          summary: "Agent 异步 command 执行前无法读取当前策略项"
          description: "最近 10 分钟出现 CURRENT_POLICY_ITEM_MISSING。请检查 session/run/audit 是否仍存在、Run policy 服务是否异常，以及 dispatcher pre-check 是否在历史 command 上提前打开。"

      - alert: AgentRuntimeAsyncCommandPreCheckUnknownIssueCode
        expr: increase(datasmart_agent_runtime_async_command_precheck_issue_total{issueCode="OTHER"}[30m]) > 0
        for: 5m
        labels:
          severity: info
          module: agent-runtime
          category: async-command-precheck
        annotations:
          summary: "Agent 异步 command pre-check 出现未知 issueCode"
          description: "最近 30 分钟出现 issueCode=OTHER。通常表示代码新增了 pre-check 原因但未同步指标白名单、告警和 runbook。请检查 AgentAsyncTaskCommandPreCheckMetricsService 的 ALLOWED_ISSUE_CODES。"

  - name: datasmart-agent-runtime-skill-visibility-index
    rules:
      - alert: AgentRuntimeSkillVisibilityIndexMaterializationFailureDetected
        expr: increase(datasmart_agent_runtime_skill_visibility_index_materialization_total{outcome="failed"}[15m]) > 0
        for: 2m
        labels:
          severity: warning
          module: agent-runtime
          category: skill-visibility-index
        annotations:
          summary: "Skill 可见性索引物化出现失败"
          description: "最近 15 分钟 Skill 可见性快照专用索引出现 failed 物化。请优先检查 agent-runtime 日志、/agent-runtime/runtime-events/skill-visibility-snapshots/diagnostics、MySQL 连接池、agent_skill_visibility_snapshot_index 表结构和 Kafka 重放情况。该告警不携带 runId/sessionId/tenantId，单条排障应转到 runtime event replay 与诊断接口。"

      - alert: AgentRuntimeSkillVisibilityIndexMaterializationFailureRatioHigh
        expr: |
          (
            sum(rate(datasmart_agent_runtime_skill_visibility_index_materialization_total{outcome="failed"}[30m]))
            /
            clamp_min(sum(rate(datasmart_agent_runtime_skill_visibility_index_materialization_total{outcome=~"materialized|duplicate|failed"}[30m])), 1)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          module: agent-runtime
          category: skill-visibility-index
        annotations:
          summary: "Skill 可见性索引物化失败比例偏高"
          description: "最近 30 分钟 Skill 可见性索引物化失败比例持续高于 5%。这通常表示 MySQL 索引写入、表结构、JSON 字段映射或索引 Store 条件装配存在问题。请先查看诊断接口的 lastFailureStage/lastFailureReason，再决定是否切回 memory store、暂停相关 consumer 或执行人工补偿重放。"

      - alert: AgentRuntimeSkillVisibilityIndexFallbackQueryRatioHigh
        expr: |
          (
            sum(rate(datasmart_agent_runtime_skill_visibility_index_query_total{source="fallback",result="success"}[30m]))
            /
            clamp_min(sum(rate(datasmart_agent_runtime_skill_visibility_index_query_total{result="success"}[30m])), 1)
          ) > 0.3
        for: 10m
        labels:
          severity: warning
          module: agent-runtime
          category: skill-visibility-index
        annotations:
          summary: "Skill 可见性查询 fallback 比例偏高"
          description: "最近 30 分钟 Skill 可见性快照查询中 fallback projection 占比持续高于 30%。本地学习环境可接受 fallback，但生产环境通常应使用 dedicated index。请检查 DATASMART_AGENT_RUNTIME_SKILL_VISIBILITY_INDEX_ENABLED、STORE、数据库总开关和 Store Bean 装配情况。"

      - alert: AgentRuntimeSkillVisibilityIndexDedicatedQueryFailureDetected
        expr: increase(datasmart_agent_runtime_skill_visibility_index_query_total{source="dedicated",result="failed"}[10m]) > 0
        for: 2m
        labels:
          severity: warning
          module: agent-runtime
          category: skill-visibility-index
        annotations:
          summary: "Skill 可见性 dedicated index 查询失败"
          description: "最近 10 分钟 dedicated Skill 可见性索引查询失败。该问题会影响治理页、会话能力回放和 Skill Marketplace 后续统计。请检查 diagnostics.currentIndexSizeStatus、activeStore、MySQL 查询索引、授权项目范围过滤和最近应用发布变更。"

      - alert: AgentRuntimeSkillVisibilityIndexManifestBindingUnhealthy
        expr: sum(increase(datasmart_agent_runtime_skill_visibility_index_materialization_total{outcome=~"materialized|duplicate",bindingStatus=~"UNKNOWN|UNBOUND_UNKNOWN|DIAGNOSTICS_UNAVAILABLE|REMOTE_UNAVAILABLE_FALLBACK|LOCAL_DEFAULT_OR_FALLBACK|OTHER"}[30m])) > 0
        for: 5m
        labels:
          severity: info
          module: agent-runtime
          category: skill-visibility-index
        annotations:
          summary: "Skill 可见性快照出现非理想 Manifest 绑定状态"
          description: "最近 30 分钟新物化的 Skill 可见性快照出现 UNKNOWN、fallback、本地默认或诊断不可用的 Manifest 绑定状态。开发环境可能是预期行为；生产环境应检查 Python Runtime 是否能读取 Java Skill Publication Manifest、contentFingerprint 是否稳定、远端 manifest 诊断是否 required fail-closed。"
