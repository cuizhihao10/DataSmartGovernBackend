server:
  # datasource-management 独立运行端口。
  # 当前阶段保留模块独立启动能力，方便逐模块开发、调试和学习；正式对外访问时再由 gateway 统一代理。
  port: 8082

spring:
  application:
    # 服务名会进入注册发现、日志标识、链路追踪和调度实例标识。
    name: datasource-management
  profiles:
    active: dev
  datasource:
    # 这里连接的是平台自己的治理库，而不是外部业务库。
    # 外部 MySQL、PostgreSQL、Kafka、对象存储等连接信息会登记到业务表中，再由平台按需探查或调度。
    url: jdbc:mysql://localhost:3306/datasmart_govern?useSSL=false&serverTimezone=UTC
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  kafka:
    # 预留给后续元数据变更事件、同步任务事件、执行器回调事件和跨模块异步协作。
    bootstrap-servers: localhost:9092
  cloud:
    compatibility-verifier:
      # 固定技术栈阶段关闭 Spring Cloud 启动兼容性硬校验。
      # 该开关只避免启动前置拦截，不替代服务注册、数据库、Kafka、gateway 路由和真实 smoke 的兼容性验证。
      enabled: false
    nacos:
      discovery:
        # 当前继续保留 Nacos 作为本地服务发现中心，方便 gateway 和其他模块发现 datasource-management。
        server-addr: localhost:8848

mybatis-plus:
  # 预留 XML Mapper 扩展能力，方便后续补充复杂统计、批量操作和治理专用 SQL。
  mapper-locations: classpath:/mapper/*.xml
  # 让 XML 或结果映射可以直接引用实体别名，减少样板配置。
  type-aliases-package: com.czh.datasmart.govern.datasource.entity
  configuration:
    # 数据库使用下划线字段，Java 实体使用驼峰字段，由 MyBatis-Plus 负责自动映射。
    map-underscore-to-camel-case: true

logging:
  level:
    com.czh.datasmart: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        # health/info 用于基础探活，metrics 用于本地排障，prometheus 用于 docker/prometheus 周期抓取。
        # datasource-management 后续会暴露连接探测、元数据采集、同步队列和只读 SQL 审计等指标，必须提前形成运维闭环。
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

datasmart:
  datasource:
    read-only-sql:
      # 是否启用 datasource-management 的受控只读 SQL 执行代理。
      # 这个入口面向 data-quality、data-asset、字段画像、异常样本诊断等平台内部场景，
      # 不定位为通用 SQL 工作台，也不用于大批量数据导出。
      enabled: true
      # 默认最大返回行数；调用方不传 maxRows 时使用该值。
      default-max-rows: 100
      # 绝对最大返回行数；即便调用方传入更大值，服务端也会压回该上限。
      absolute-max-rows: 1000
      # 默认查询超时秒数；用于 JDBC Statement.setQueryTimeout。
      default-query-timeout-seconds: 10
      # 绝对最大查询超时秒数；同步 HTTP 查询不应承担长时间离线扫描。
      absolute-query-timeout-seconds: 60
      audit-masking:
        # 是否在只读 SQL 审计落库前对 SQL 预览做脱敏。
        # 注意：该配置只影响审计表里的 sqlPreview，不会改变真实执行的 SQL，也不会改变原始 SQL 指纹计算。
        enabled: true
        # 邮箱属于可直接定位个人的标识信息，默认遮蔽。
        mask-email: true
        # 手机号常出现在客户、用户、联系人、通知日志等表中，默认遮蔽。
        mask-phone: true
        # 身份证号属于强敏感个人信息，默认遮蔽。
        mask-identity-number: true
        # password/token/secret/api_key/authorization 等凭据类字段赋值默认遮蔽，避免审计表沉淀密钥。
        mask-credential-assignments: true
        # Bearer Token 可能出现在网关日志或三方调用日志查询条件中，默认遮蔽。
        mask-bearer-token: true
        # 超过阈值的单引号长文本字面量默认替换为长度摘要，作为无法枚举所有敏感模式时的兜底保护。
        mask-quoted-long-text: true
        # 单引号字符串字面量超过该长度后写成 '[MASKED_LITERAL:长度]'，保留排查价值但不暴露原文。
        max-quoted-literal-preview-length: 24

    metadata-discovery:
      # 默认一次最多返回多少张表，避免前端一次性展开整库造成响应过重。
      default-max-tables: 20
      # 调用方显式传参也不能突破这个硬上限。
      absolute-max-tables: 100
      # 默认每张表最多展开多少个字段。
      default-max-columns-per-table: 50
      # 防止超宽表把探查接口和前端页面拖慢。
      absolute-max-columns-per-table: 200
      # 默认样本预览行数。
      default-sample-row-limit: 5
      # 样本预览绝对上限，避免敏感数据和性能风险被无限放大。
      absolute-sample-row-limit: 20
      # JDBC 元数据和样本探查查询超时秒数。
      jdbc-query-timeout-seconds: 5
      # 短期内存缓存有效期，降低短时间重复探查同一数据源的压力。
      cache-ttl-seconds: 60

    sync-executor:
      # 执行器每次认领前最多扫描多少条排队候选任务。
      claim-scan-limit: 50
      # 认领成功后的租约时长；执行器需要通过心跳不断续租。
      lease-duration-seconds: 120
      # 显式恢复过期租约时，一次最多处理多少条任务。
      expired-lease-recovery-batch-size: 50
      # 执行器认领前是否自动先清理一轮过期租约，防止失联执行器长期占位。
      auto-recover-expired-leases-before-claim: true
      # 过期租约是否自动重新回到待执行队列。
      auto-requeue-expired-leases: true
      # 单租户最大运行中任务数，用于控制热点租户挤占执行资源。
      max-running-tasks-per-tenant: 4
      # 单数据源最大并发运行任务数，防止同一个连接器或源端被打爆。
      max-running-tasks-per-datasource: 3
      # 全局待执行队列硬上限，用于防止执行器故障时任务无限积压。
      max-queued-tasks-global: 200
      # 单租户待执行队列硬上限，防止大租户长期挤压整个平台。
      max-queued-tasks-per-tenant: 50
      # 是否启用租户维度公平认领，减少大租户饿死小租户的风险。
      enable-tenant-queue-fairness: true
      # 当前开发阶段允许人工 run 绕过排队；更接近生产时通常建议收紧为 false。
      allow-manual-run-bypass-queue: true
      # 排队超过多久视为老化任务，需要人工关注。
      queued-task-aging-threshold-seconds: 900
      # 一次老化巡检最多扫描多少条队列任务。
      queued-task-aging-scan-limit: 100
      # 全局队列预警阈值，通常应小于全局硬上限。
      queue-alert-threshold-global: 120
      # 单租户队列预警阈值，用于提前识别租户级积压。
      queue-alert-threshold-per-tenant: 20

    task-management-execution-receipt:
      # 是否把 datasource-management Runner 的低敏执行结果回写到 task-management。
      # 默认关闭，是为了避免本地只启动 datasource-management 时因为 task-management 不在线而产生额外噪音。
      # 生产环境如果需要端到端任务历史、管理台执行时间线和跨服务告警，应显式打开。
      enabled: ${DATASMART_DATASOURCE_TASK_RECEIPT_ENABLED:false}
      # task-management 内部访问地址。
      # 当前本地默认指向 8081；生产环境建议替换为内部 gateway、服务发现域名、Nacos 解析地址或服务网格入口。
      task-management-base-url: ${DATASMART_TASK_MANAGEMENT_BASE_URL:http://localhost:8081}
      # task-management 接收 Runner 执行回执的内部路径。
      # 该路径只面向服务账号或受控 worker，不应暴露给公网或普通用户。
      record-endpoint-path: ${DATASMART_TASK_EXECUTION_RECEIPT_ENDPOINT:/internal/data-sync-worker-execution-receipts/record}
      # 发布失败时是否失败开放。
      # true：回执发布失败只写低敏日志，不中断真实同步执行；
      # false：回执发布失败会抛出异常，适合强审计场景，但会增加控制面故障影响主流程的风险。
      fail-open: ${DATASMART_DATASOURCE_TASK_RECEIPT_FAIL_OPEN:true}
      # HTTP 连接超时毫秒数。回执发布处于执行后控制面路径，超时应短，避免占用 worker。
      connect-timeout-ms: ${DATASMART_DATASOURCE_TASK_RECEIPT_CONNECT_TIMEOUT_MS:1000}
      # HTTP 读取响应超时毫秒数。生产环境如果 task-management 偶发抖动，可先调大该值，再评估是否改成 Kafka outbox。
      read-timeout-ms: ${DATASMART_DATASOURCE_TASK_RECEIPT_READ_TIMEOUT_MS:1500}
      # datasource 执行器标识，用于 task-management 执行历史排障。
      executor-id: ${DATASMART_DATASOURCE_EXECUTION_RECEIPT_EXECUTOR_ID:datasource-management-runner}
      # 来源服务名，会写入服务间 Header 和 receipt payload。
      source-service: datasource-management

    sync-alert:
      # 告警创建或刷新后是否立即尝试投递。
      # 当前采用“先落库、再外送”的策略，即使外送失败，本地治理对象仍然保留。
      auto-deliver-on-open: true
      # 同类告警在多长时间窗口内去重，避免短时间风暴式刷屏。
      dedup-window-seconds: 600
      # 默认投递通道。当前支持 NONE、WEBHOOK、FEISHU_WEBHOOK、WECOM_WEBHOOK、INTERNAL_LOG。
      default-channel: NONE
      # 通道链支持按顺序回退，例如 WEBHOOK,INTERNAL_LOG 表示 webhook 失败后至少落内部日志兜底。
      channel-chain: NONE
      # 是否启用通用 webhook 外送。
      webhook-enabled: false
      # 通用 webhook 地址。
      webhook-url:
      # 飞书机器人 webhook 地址。
      feishu-webhook-url:
      # 企业微信机器人 webhook 地址。
      wecom-webhook-url:
      # 连接外部告警平台超时秒数。
      connect-timeout-seconds: 3
      # 读取外部告警平台响应超时秒数。
      read-timeout-seconds: 5
      # 单条告警最大自动重试次数。
      max-delivery-retry-count: 3
      # 告警投递失败后的基础退避秒数。
      retry-backoff-seconds: 300
      # 一次批量补投最多处理多少条告警，避免瞬间打满线程池或外部通道。
      retry-dispatch-batch-limit: 100
      scheduler:
        # 是否启用后台定时补投。默认关闭，避免本地开发环境没有外部告警平台时持续空转。
        enabled: false
        # 每轮补投扫描之间的 fixedDelay 秒数，上一轮结束后再等待固定时间启动下一轮。
        fixed-delay-seconds: 300
        # 定时任务执行时使用的系统身份；后续可替换为专门的 SERVICE_ACCOUNT。
        actor-id: 0
        actor-role: PLATFORM_ADMINISTRATOR
        actor-tenant-id:
        # 多实例环境下用于认领 outbox 租约的实例标识。
        instance-id: ${spring.application.name}:${server.port}
        # 单轮最多认领多少条到期待补投告警。
        claim-batch-size: 50
        # 告警 outbox 认领租约秒数，实例宕机后其他实例可在过期后重新接管。
        dispatch-lease-seconds: 120
        # 审计和日志中用于区分人工触发和系统定时补投。
        note: SYSTEM_SCHEDULED_ALERT_DISPATCH

    sync-permission-policy:
      # 本地角色与菜单绑定。
      # 注意：数据库绑定的优先级高于这里的配置绑定，这里更适合作为默认值和开发演示样例。
      role-menu-bindings:
        PLATFORM_ADMINISTRATOR:
          - sync:template-center
          - sync:task-center
          - sync:queue-governance
          - sync:alert-center
          - sync:permission-center
        TENANT_ADMINISTRATOR:
          - sync:template-center
          - sync:task-center
          - sync:queue-governance
          - sync:alert-center
          - sync:permission-center
        PROJECT_OWNER:
          - sync:template-center
          - sync:task-center
          - sync:alert-center
        OPERATOR:
          - sync:task-center
          - sync:alert-center

      # 本地角色与路由策略绑定。
      # 这里直接使用 SyncAdminRoutePolicy 枚举名，便于和后端强类型路由策略保持一致。
      role-route-bindings:
        PLATFORM_ADMINISTRATOR:
          - DATASOURCE_METADATA_DISCOVERY
          - DATASOURCE_READ_ONLY_SQL_EXECUTION
          - DATASOURCE_READ_ONLY_SQL_AUDIT_QUERY
          - SYNC_TEMPLATE_MANAGEMENT
          - SYNC_TEMPLATE_VALIDATION
          - SYNC_TASK_OPERATION
          - SYNC_APPROVAL_OPERATION
          - SYNC_QUEUE_HEALTH
          - SYNC_QUEUE_AGING_SCAN
          - SYNC_ALERT_QUERY
          - SYNC_ALERT_DELIVERY_QUERY
          - SYNC_ALERT_DISPATCH
          - SYNC_ALERT_RETRYABLE_DISPATCH
          - SYNC_ALERT_OUTBOX_HEALTH
          - SYNC_ALERT_OUTBOX_LEASE_RECOVERY
          - SYNC_PERMISSION_POLICY_VIEW
          - SYNC_PERMISSION_BINDING_QUERY
          - SYNC_PERMISSION_BINDING_REPLACE
          - SYNC_PERMISSION_CHANGE_REQUEST_SUBMIT
          - SYNC_PERMISSION_CHANGE_REQUEST_QUERY
          - SYNC_PERMISSION_CHANGE_REQUEST_APPROVE
          - SYNC_PERMISSION_APPROVAL_DELEGATE_RULE_CREATE
          - SYNC_PERMISSION_APPROVAL_DELEGATE_RULE_QUERY
          - SYNC_PERMISSION_APPROVAL_DELEGATE_RULE_DISABLE
          - SYNC_PERMISSION_NOTIFICATION_QUERY
          - SYNC_PERMISSION_NOTIFICATION_READ
          - SYNC_PERMISSION_NOTIFICATION_REMINDER_SCAN
        TENANT_ADMINISTRATOR:
          - DATASOURCE_METADATA_DISCOVERY
          - DATASOURCE_READ_ONLY_SQL_EXECUTION
          - DATASOURCE_READ_ONLY_SQL_AUDIT_QUERY
          - SYNC_TEMPLATE_MANAGEMENT
          - SYNC_TEMPLATE_VALIDATION
          - SYNC_TASK_OPERATION
          - SYNC_APPROVAL_OPERATION
          - SYNC_QUEUE_HEALTH
          - SYNC_QUEUE_AGING_SCAN
          - SYNC_ALERT_QUERY
          - SYNC_ALERT_DELIVERY_QUERY
          - SYNC_ALERT_OUTBOX_HEALTH
          - SYNC_ALERT_OUTBOX_LEASE_RECOVERY
          - SYNC_PERMISSION_POLICY_VIEW
          - SYNC_PERMISSION_BINDING_QUERY
          - SYNC_PERMISSION_BINDING_REPLACE
          - SYNC_PERMISSION_CHANGE_REQUEST_SUBMIT
          - SYNC_PERMISSION_CHANGE_REQUEST_QUERY
          - SYNC_PERMISSION_CHANGE_REQUEST_APPROVE
          - SYNC_PERMISSION_APPROVAL_DELEGATE_RULE_CREATE
          - SYNC_PERMISSION_APPROVAL_DELEGATE_RULE_QUERY
          - SYNC_PERMISSION_APPROVAL_DELEGATE_RULE_DISABLE
          - SYNC_PERMISSION_NOTIFICATION_QUERY
          - SYNC_PERMISSION_NOTIFICATION_READ
          - SYNC_PERMISSION_NOTIFICATION_REMINDER_SCAN
        PROJECT_OWNER:
          - DATASOURCE_METADATA_DISCOVERY
          - SYNC_TEMPLATE_MANAGEMENT
          - SYNC_TEMPLATE_VALIDATION
          - SYNC_TASK_OPERATION
        OPERATOR:
          - DATASOURCE_METADATA_DISCOVERY
          - DATASOURCE_READ_ONLY_SQL_EXECUTION
          - DATASOURCE_READ_ONLY_SQL_AUDIT_QUERY
          - SYNC_TASK_OPERATION
          - SYNC_APPROVAL_OPERATION
          - SYNC_QUEUE_HEALTH
          - SYNC_QUEUE_AGING_SCAN
          - SYNC_ALERT_QUERY
          - SYNC_ALERT_DELIVERY_QUERY
          - SYNC_ALERT_OUTBOX_HEALTH
          - SYNC_PERMISSION_POLICY_VIEW
          - SYNC_PERMISSION_CHANGE_REQUEST_QUERY
          - SYNC_PERMISSION_CHANGE_REQUEST_APPROVE
          - SYNC_PERMISSION_NOTIFICATION_QUERY
          - SYNC_PERMISSION_NOTIFICATION_READ

      # 本地角色默认数据范围覆盖；未配置角色会回退到代码里的默认权限推导。
      role-data-scope-bindings:
        PLATFORM_ADMINISTRATOR: PLATFORM
        TENANT_ADMINISTRATOR: TENANT
        PROJECT_OWNER: OWNED
        OPERATOR: OWNED

      # 管理员专属动作清单，用于前端和后续 permission-admin 判断高风险管理能力。
      admin-only-actions:
        - FORCE_RETRY_TASK
        - FORCE_CANCEL_TASK
        - OVERRIDE_TASK_PRIORITY
        - OVERRIDE_TASK_TIMEOUT
        - DISPATCH_RETRYABLE_ALERTS
        - REQUEUE_DEAD_LETTER_ALERT
        - VIEW_CROSS_TENANT_POLICIES

      # 建议走审批的高风险动作清单，用于后续把配置变更升级到审批流。
      approval-recommended-actions:
        - APPROVE_SYNC_TASK
        - DISABLE_HIGH_IMPACT_CONNECTOR
        - CHANGE_GLOBAL_CONCURRENCY_POLICY
        - EXECUTE_CROSS_TENANT_ADMIN_OVERRIDE

    sync-permission-approval:
      # 是否允许申请人审批自己发起的权限变更申请；商用品治理后台默认建议关闭。
      allow-self-approval: false
      # 是否启用审批委托机制，解决请假、值班轮转、组织调整时的代批问题。
      delegate-approval-enabled: true
      # 平台全局权限变更默认审批角色。平台级策略影响所有租户，因此默认只允许平台管理员审批。
      platform-global-approver-roles:
        - PLATFORM_ADMINISTRATOR
      # 租户级权限变更默认审批角色。
      tenant-scoped-approver-roles:
        - TENANT_ADMINISTRATOR
        - PLATFORM_ADMINISTRATOR
      # 按绑定类型覆写审批矩阵；风险越高的绑定类型可以收紧审批角色。
      binding-type-approver-roles:
        MENU:
          - TENANT_ADMINISTRATOR
          - PLATFORM_ADMINISTRATOR
        ROUTE:
          - TENANT_ADMINISTRATOR
          - PLATFORM_ADMINISTRATOR
        DATA_SCOPE:
          - PLATFORM_ADMINISTRATOR
      # 按申请人角色进一步收紧审批矩阵，例如租户管理员自提权限变更时升级给平台管理员审批。
      requester-role-escalation-approver-roles:
        OPERATOR:
          - TENANT_ADMINISTRATOR
          - PLATFORM_ADMINISTRATOR
        TENANT_ADMINISTRATOR:
          - PLATFORM_ADMINISTRATOR

    sync-permission-notification:
      # 提交权限变更申请后，是否给审批角色生成待办通知。
      notify-approver-roles-on-submit: true
      # 审批完成后，是否给申请人生成结果通知。
      notify-requester-on-decision: true
      # 创建通知后是否立即投递；当前默认配合 INTERNAL_LOG 通道完成本地闭环。
      auto-dispatch-on-create: true
      # 默认通知通道。当前支持 NONE、INTERNAL_LOG，后续可扩展站内消息、邮件和 IM。
      default-channel: INTERNAL_LOG
      # 是否启用审批超时提醒扫描。关闭后，手动接口和定时调度都会直接返回空结果。
      approval-reminder-enabled: true
      # 待审批申请创建多久后生成普通提醒，默认 30 分钟。
      approval-reminder-after-seconds: 1800
      # 待审批申请创建多久后生成升级提醒，默认 2 小时。
      approval-escalation-after-seconds: 7200
      # 单轮最多扫描多少张待审批申请单，避免历史积压时一次创建过多通知。
      approval-reminder-scan-limit: 100
      # 升级提醒默认发送给平台管理员，后续可替换成值班组、租户管理员或服务账号。
      approval-escalation-recipient-role: PLATFORM_ADMINISTRATOR
      # 是否启用后台定时审批提醒扫描；本地开发默认关闭，避免空转。
      reminder-scheduler-enabled: false
      # 定时扫描间隔，使用 fixedDelay 语义：上一轮结束后等待指定秒数再启动下一轮。
      reminder-scheduler-fixed-delay-seconds: 300
      # 定时任务使用的系统身份，当前用平台管理员承接跨租户扫描。
      reminder-scheduler-actor-id: 0
      reminder-scheduler-actor-role: PLATFORM_ADMINISTRATOR
      reminder-scheduler-actor-tenant-id:
      # 审计备注，用于区分人工触发和系统定时触发。
      reminder-scheduler-note: SYSTEM_SCHEDULED_PERMISSION_REMINDER_SCAN
