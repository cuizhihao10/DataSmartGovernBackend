# task-management 是平台任务中心服务，负责任务创建、队列认领、执行回调、租约、退避、死信和 Agent 异步工具任务承载。
# 这里保留独立端口，方便本地单独启动和调试；真实外部访问应优先通过 gateway 路由进入。
server:
  port: 8081

spring:
  application:
    # 服务名会参与注册发现、日志标识、链路追踪和跨模块调用识别。
    name: task-management
  profiles:
    active: dev
  datasource:
    # 任务生命周期的持久化状态保存在 MySQL 中。
    # 本地默认连接开发库，生产环境应通过环境变量、Nacos 或密钥管理系统覆盖。
    url: jdbc:mysql://localhost:3306/datasmart_govern?useSSL=false&serverTimezone=UTC
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    # Redis 预留给短期状态、分布式协作、热点缓存和后续 worker 限流/租户配额。
    host: localhost
    port: 6379
  kafka:
    # Kafka 用于承接跨服务异步命令、任务状态事件和后续告警事件。
    bootstrap-servers: localhost:9092
    consumer:
      # 明确使用字符串反序列化器，使 Kafka 消息保持普通 JSON 字符串。
      # 这样 Java、Python、命令行工具和 Kafka UI 都能直接查看 payload，避免绑定 Java 类序列化头。
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # 本地联调时从 earliest 开始更容易观察链路；生产环境需要结合 offset 管理和灰度策略谨慎调整。
      auto-offset-reset: earliest
  cloud:
    nacos:
      discovery:
        # Nacos 用于服务注册与发现，支撑 gateway 和模块间调用定位。
        server-addr: localhost:8848

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.czh.datasmart.govern.task.entity
  configuration:
    # 开启下划线到驼峰映射，降低数据库字段与 Java 字段命名转换成本。
    map-underscore-to-camel-case: true

logging:
  level:
    com.czh.datasmart: INFO
  pattern:
    # 统一控制台日志格式，便于本地调试和后续日志采集。
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        # 当前先暴露基础健康、信息和指标端点。后续 Agent worker 指标接入后可继续扩展。
        include: health,info,metrics
  endpoint:
    health:
      # 仅在授权情况下展示细节，避免健康检查泄露过多内部信息。
      show-details: when-authorized

datasmart:
  task-management:
    agent-async-commands:
      kafka:
        # 是否启动 Agent 异步工具命令 Kafka listener。
        # 默认关闭，避免本地没有 Kafka 或 agent-runtime dispatcher 时启动后不断重连。
        enabled: ${DATASMART_TASK_AGENT_ASYNC_COMMAND_KAFKA_ENABLED:false}
        # 必须与 agent-runtime command outbox/plan 中的 commandTopic 保持一致。
        topic: ${DATASMART_AGENT_ASYNC_COMMAND_TOPIC:datasmart.agent.tool.async.commands}
        # task-management 消费者组。同组多实例会分摊分区，适合任务创建只处理一次的场景。
        group-id: ${DATASMART_TASK_AGENT_ASYNC_COMMAND_GROUP_ID:datasmart-task-management-agent-command-consumer}
        # 单条消息最大字节数。正常 command 只应包含 payloadReference 和治理元数据，不应携带参数值或大对象。
        max-payload-bytes: ${DATASMART_TASK_AGENT_ASYNC_COMMAND_MAX_PAYLOAD_BYTES:65536}
        # 默认 true：非法消息抛出异常，等待 Kafka 错误处理器或后续 DLQ 处理，避免静默丢弃生产命令。
        fail-on-rejected-message: ${DATASMART_TASK_AGENT_ASYNC_COMMAND_FAIL_ON_REJECTED:true}
        # 默认 false：错误日志不打印完整 payload，避免日志系统复制业务引用或误入敏感上下文。
        log-payload-on-error: ${DATASMART_TASK_AGENT_ASYNC_COMMAND_LOG_PAYLOAD_ON_ERROR:false}
        # 是否记录进程内轻量诊断快照。它不会改变 offset 策略，只帮助定位坏消息类型和最近失败样本。
        diagnostics-enabled: ${DATASMART_TASK_AGENT_ASYNC_COMMAND_DIAGNOSTICS_ENABLED:true}
        # 诊断快照最多保留多少条最近失败样本。累计计数不会受该值影响，只有 recentFailures 窗口会被裁剪。
        max-recent-failures: ${DATASMART_TASK_AGENT_ASYNC_COMMAND_MAX_RECENT_FAILURES:100}
        # 当前阶段仅标记“是否应进入 DLQ”的候选语义，暂不真实写死信 topic，避免未设计重放/权限/脱敏前产生副作用。
        dlq-enabled: ${DATASMART_TASK_AGENT_ASYNC_COMMAND_DLQ_ENABLED:false}
        # 未来真实 Kafka DLQ Producer 使用的 topic。建议与主 topic 分离，便于设置独立保留期、告警和人工重放流程。
        dlq-topic: ${DATASMART_TASK_AGENT_ASYNC_COMMAND_DLQ_TOPIC:datasmart.agent.tool.async.commands.dlq}
    agent-async-worker:
      # Agent 异步工具 worker 总开关。false 时手动 dispatch-once 和后台 scheduler 都不应真实执行任务。
      enabled: ${DATASMART_TASK_AGENT_ASYNC_WORKER_ENABLED:false}
      # 后台定时调度器开关。它与 enabled 分离：enabled=true 只代表 worker 能力可用，scheduler-enabled=true 才代表应用会自动循环认领任务。
      # 生产建议先通过 dispatch-once 手动验证链路，再小流量开启自动调度。
      scheduler-enabled: ${DATASMART_TASK_AGENT_ASYNC_WORKER_SCHEDULER_ENABLED:false}
      # Agent Runtime 内部地址，worker 会通过它读取 /internal/agent-runtime/.../plan-arguments 并回写 async-task-status。
      # Java agent-runtime 默认使用 8091；8090 保留给 Python AI Runtime。
      # 生产环境建议改成服务发现、内网网关或配置中心地址，并叠加服务账号鉴权/mTLS。
      agent-runtime-base-url: ${DATASMART_AGENT_RUNTIME_INTERNAL_BASE_URL:http://localhost:8091}
      # data-sync 内部服务地址。data-sync.execute 白名单适配器只调用固定内部幂等入口，不会执行 Agent payload 中的任意 targetEndpoint。
      data-sync-base-url: ${DATASMART_DATA_SYNC_INTERNAL_BASE_URL:http://localhost:8086}
      # DataSync outbox 自动调度开关。默认关闭，避免本地启动 task-management 后自动调用 datasource-management 产生同步任务副作用。
      data-sync-outbox-scheduler-enabled: ${DATASMART_TASK_DATA_SYNC_OUTBOX_SCHEDULER_ENABLED:false}
      # DataSync outbox 后台调度 fixed-delay 间隔，单位毫秒。与通用 worker scheduler 分开，便于按 data-sync 下游容量单独调优。
      data-sync-outbox-scheduler-fixed-delay-ms: ${DATASMART_TASK_DATA_SYNC_OUTBOX_SCHEDULER_FIXED_DELAY_MS:5000}
      # 单轮最多恢复多少条长时间停留在 DISPATCHING 的 outbox。过大可能瞬时释放太多命令回 DEFERRED。
      data-sync-outbox-recovery-limit-per-tick: ${DATASMART_TASK_DATA_SYNC_OUTBOX_RECOVERY_LIMIT_PER_TICK:20}
      # 单轮最多投递多少条 PENDING/到期 DEFERRED outbox。它是单实例保护阀，不能替代租户级配额和连接器级限流。
      data-sync-outbox-dispatch-limit-per-tick: ${DATASMART_TASK_DATA_SYNC_OUTBOX_DISPATCH_LIMIT_PER_TICK:20}
      # 单条 DataSync outbox 最大自动投递次数，达到后进入 DEAD_LETTER 等待人工处理。
      data-sync-outbox-max-attempts: ${DATASMART_TASK_DATA_SYNC_OUTBOX_MAX_ATTEMPTS:5}
      # DISPATCHING 超过该秒数仍没有 receipt 时会被 stale recovery 视为悬挂命令。
      data-sync-outbox-dispatching-timeout-seconds: ${DATASMART_TASK_DATA_SYNC_OUTBOX_DISPATCHING_TIMEOUT_SECONDS:300}
      # stale DISPATCHING 恢复为 DEFERRED 后，距离下一轮允许领取的退避秒数。
      data-sync-outbox-stale-recovery-retry-after-seconds: ${DATASMART_TASK_DATA_SYNC_OUTBOX_STALE_RECOVERY_RETRY_AFTER_SECONDS:30}
      # worker 身份标识，会进入任务租约、回调幂等键和排障日志。
      executor-id: ${DATASMART_TASK_AGENT_ASYNC_WORKER_EXECUTOR_ID:task-management-agent-async-worker-local}
      # 后台调度 fixed-delay 间隔，单位毫秒。使用 fixed-delay 是为了等上一轮结束后再等待，避免长任务场景产生调度堆积。
      scheduler-fixed-delay-ms: ${DATASMART_TASK_AGENT_ASYNC_WORKER_SCHEDULER_FIXED_DELAY_MS:5000}
      # 单轮最多执行多少次 dispatch-once。该值是本地实例级保护阀，后续还需要叠加租户级配额、工具级限流和下游容量保护。
      max-dispatches-per-tick: ${DATASMART_TASK_AGENT_ASYNC_WORKER_MAX_DISPATCHES_PER_TICK:1}
      # 单轮遇到 NO_TASK 是否提前停止。默认 true，避免队列为空时继续循环 claim，增加数据库压力。
      stop-batch-on-no-task: ${DATASMART_TASK_AGENT_ASYNC_WORKER_STOP_BATCH_ON_NO_TASK:true}
      # 是否启用 worker 本地容量保护。默认开启，用于在 claim 任务前拦截本地并发过高或调度过快的请求。
      capacity-guard-enabled: ${DATASMART_TASK_AGENT_ASYNC_WORKER_CAPACITY_GUARD_ENABLED:true}
      # 单个 task-management 实例允许同时进入 Agent 工具执行链路的最大 dispatch 数。默认 1，优先保证副作用链路安全可审计。
      max-local-concurrent-executions: ${DATASMART_TASK_AGENT_ASYNC_WORKER_MAX_LOCAL_CONCURRENT_EXECUTIONS:1}
      # 两次进入 claim 阶段之间的最小本地间隔，单位毫秒。默认 0 不额外节流，生产可按下游容量设置为 100-1000ms。
      min-dispatch-interval-ms: ${DATASMART_TASK_AGENT_ASYNC_WORKER_MIN_DISPATCH_INTERVAL_MS:0}
      # 自动认领任务时的租约秒数；过短会导致长工具被过早恢复，过长会拖慢故障恢复。
      claim-lease-seconds: ${DATASMART_TASK_AGENT_ASYNC_WORKER_CLAIM_LEASE_SECONDS:60}
      # 参数载荷最大字节数。Agent 工具参数应保存结构化配置和引用，不应携带大文件、样本数据或海量 SQL。
      max-resolved-payload-bytes: ${DATASMART_TASK_AGENT_ASYNC_WORKER_MAX_RESOLVED_PAYLOAD_BYTES:65536}
      # 是否在真实工具执行前回查 agent-runtime 的 DAG selected-node 确认记录。
      # 生产建议保持 true：worker 不能只相信本地 task.params，还要确认 commandId/auditId/policyVersions 来自已确认节点。
      confirmation-check-enabled: ${DATASMART_TASK_AGENT_ASYNC_WORKER_CONFIRMATION_CHECK_ENABLED:true}
      # confirmation 回查异常时是否临时放行。默认 false，控制面不可用时宁愿 defer 重试，也不要绕过确认链执行副作用。
      confirmation-check-fail-open-on-error: ${DATASMART_TASK_AGENT_ASYNC_WORKER_CONFIRMATION_CHECK_FAIL_OPEN_ON_ERROR:false}
      # 执行前复核依赖暂时不可用时的退避秒数。后续接入 permission-admin evaluate、配额和限流后也会复用该退避语义。
      pre-check-unavailable-defer-seconds: ${DATASMART_TASK_AGENT_ASYNC_WORKER_PRECHECK_UNAVAILABLE_DEFER_SECONDS:30}
      # 受控工具动作 dry-run 开关。该链路只认领 AGENT_TOOL_ACTION_CONTROLLED，不会执行真实下游工具；但它会改变任务台账，因此默认关闭。
      controlled-action-dry-run-enabled: ${DATASMART_TASK_AGENT_TOOL_ACTION_CONTROLLED_DRY_RUN_ENABLED:false}
      # dry-run 通过但 payload body、专用 executor 或审批事实尚未就绪时的退避秒数，避免队列对不可执行任务进行高频轮询。
      controlled-action-dry-run-defer-seconds: ${DATASMART_TASK_AGENT_TOOL_ACTION_CONTROLLED_DRY_RUN_DEFER_SECONDS:300}
      # 是否把受控工具动作 dry-run 结果回写到 agent-runtime timeline；只写低敏 receipt，不写工具实参、SQL、prompt 或 payload body。
      controlled-action-receipt-enabled: ${DATASMART_TASK_AGENT_TOOL_ACTION_CONTROLLED_RECEIPT_ENABLED:true}
      # receipt 回写失败时是否允许 dry-run 状态机继续推进。默认 fail-open；强审计阶段应升级为 outbox 重试或改为 false。
      controlled-action-receipt-fail-open-on-error: ${DATASMART_TASK_AGENT_TOOL_ACTION_CONTROLLED_RECEIPT_FAIL_OPEN_ON_ERROR:true}
      # 是否在受控工具动作 dry-run 阶段回查 permission-admin 审批事实；开启后 confirmationId 不能只是字符串，必须是服务端事实。
      controlled-action-approval-check-enabled: ${DATASMART_TASK_AGENT_TOOL_ACTION_CONTROLLED_APPROVAL_CHECK_ENABLED:true}
      # 审批事实评估不可用时是否继续推进。生产建议保持 false，让任务 defer 等待权限中心恢复。
      controlled-action-approval-check-fail-open-on-error: ${DATASMART_TASK_AGENT_TOOL_ACTION_CONTROLLED_APPROVAL_CHECK_FAIL_OPEN_ON_ERROR:false}
      # permission-admin 受控工具动作审批事实评估地址。
      controlled-action-approval-evaluate-url: ${DATASMART_TASK_AGENT_TOOL_ACTION_CONTROLLED_APPROVAL_EVALUATE_URL:http://localhost:8085/permissions/agent/tool-action-approvals/evaluate}
      # 审批事实评估 HTTP 超时，单位毫秒。
      controlled-action-approval-timeout-ms: ${DATASMART_TASK_AGENT_TOOL_ACTION_CONTROLLED_APPROVAL_TIMEOUT_MS:1500}
      # 是否在真实工具执行前调用 permission-admin 做服务账号委托授权实时复核。
      permission-check-enabled: ${DATASMART_TASK_AGENT_ASYNC_WORKER_PERMISSION_CHECK_ENABLED:true}
      # permission-admin 不可用时是否放行。生产建议保持 false，让任务 defer 等待权限中心恢复。
      permission-check-fail-open-on-error: ${DATASMART_TASK_AGENT_ASYNC_WORKER_PERMISSION_CHECK_FAIL_OPEN_ON_ERROR:false}
      # permission-admin evaluate 完整地址。生产建议替换为内部 gateway、服务发现或服务网格地址。
      permission-admin-evaluate-url: ${DATASMART_PERMISSION_ADMIN_EVALUATE_URL:http://localhost:8085/permissions/evaluate}
      # 授权复核 HTTP 超时，单位毫秒。超时后任务会按 pre-check-unavailable-defer-seconds 退避。
      permission-admin-timeout-ms: ${DATASMART_TASK_AGENT_ASYNC_WORKER_PERMISSION_ADMIN_TIMEOUT_MS:1500}
      # task-management Agent worker 服务账号身份，进入 permission-admin 委托证据和审计日志。
      permission-check-service-account-actor-id: ${DATASMART_TASK_AGENT_ASYNC_WORKER_PERMISSION_SERVICE_ACCOUNT_ACTOR_ID:900002}
      permission-check-service-account-code: ${DATASMART_TASK_AGENT_ASYNC_WORKER_PERMISSION_SERVICE_ACCOUNT_CODE:datasmart-task-management-agent-worker}
      permission-check-service-account-role: ${DATASMART_TASK_AGENT_ASYNC_WORKER_PERMISSION_SERVICE_ACCOUNT_ROLE:SERVICE_ACCOUNT}
      # 默认只做 dry-run 预检，不调用真实目标服务。真实执行需要白名单适配器、权限策略和状态回写闭环全部确认后再关闭。
      dry-run-only: ${DATASMART_TASK_AGENT_ASYNC_WORKER_DRY_RUN_ONLY:true}
