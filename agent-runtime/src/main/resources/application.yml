server:
  # Java agent-runtime 是 AI 控制面服务，默认使用 8091。
  # Python AI Runtime 已在网关和 Prometheus 中默认占用 8090；如果两个服务都使用 8090，
  # 本地联调会出现端口冲突，Prometheus 也无法同时抓取 /agent/metrics 与 /actuator/prometheus。
  # 生产环境仍建议通过 Nacos、内网网关或服务网格暴露服务地址，而不是依赖本地端口。
  port: ${DATASMART_AGENT_RUNTIME_SERVER_PORT:8091}

spring:
  application:
    name: agent-runtime
  cloud:
    compatibility-verifier:
      # agent-runtime 是 AI 控制面，必须跟 gateway、permission-admin 等 Java 服务保持同一固定技术栈。
      # 关闭 Spring Cloud 官方矩阵硬校验后，仍要通过 Kafka/Nacos/HTTP 真实联调确认兼容性，而不能把该配置视为“风险消失”。
      enabled: false
    nacos:
      discovery:
        server-addr: localhost:8848
  kafka:
    # Kafka 是 Java 控制面与 Python AI Runtime 的异步事件骨干。
    # 当前 runtime event consumer 默认关闭，因此本地没有 Kafka 时应用仍可启动；
    # 当 datasmart.agent-runtime.runtime-events.kafka.enabled=true 后，该地址会被 Spring Kafka 使用。
    bootstrap-servers: localhost:9092
    consumer:
      # earliest 适合本地联调：第一次启动 Java consumer 时可以读取 Python Runtime 已经发布的测试事件。
      # 生产环境如果 topic 历史很长，应结合消费者组、保留时间和回放策略谨慎调整。
      auto-offset-reset: earliest
    producer:
      # Agent 工具执行状态事件采用 JSON 字符串投递，而不是 Java 对象投递。
      # 这样 Python Runtime、网关、审计中心和 Kafka UI 都可以直接消费/查看 payload，避免被 Java 类型头耦合。
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  flyway:
    # agent-runtime 当前默认仍支持纯内存学习模式，因此 Flyway 默认关闭，避免开发者没有启动 PostgreSQL 时应用无法启动。
    # 在容器联调、集成测试或生产环境中，如果准备启用任意 JDBC durable store，建议先把本开关设为 true，
    # 让 Flyway 在服务启动前校验 `agent_runtime` schema 是否具备所需控制面表。
    enabled: ${DATASMART_AGENT_RUNTIME_FLYWAY_ENABLED:false}
    # agent-runtime 不使用 Spring Boot 默认 datasource，而是通过 datasmart.agent-runtime.persistence.jdbc
    # 条件化创建专用连接池。Flyway 这里显式复用同一组环境变量，避免出现“迁移跑在 A 数据库，运行时写 B 数据库”的错位。
    url: ${DATASMART_AGENT_RUNTIME_JDBC_URL:jdbc:postgresql://localhost:5432/datasmart_govern?currentSchema=agent_runtime&ApplicationName=datasmart-agent-runtime}
    user: ${DATASMART_AGENT_RUNTIME_JDBC_USERNAME:datasmart}
    password: ${DATASMART_AGENT_RUNTIME_JDBC_PASSWORD:password}
    driver-class-name: ${DATASMART_AGENT_RUNTIME_JDBC_DRIVER_CLASS_NAME:org.postgresql.Driver}
    # Flyway 历史表与本模块控制面表都位于 agent_runtime schema。
    # schema 由 docker/postgresql/init/00-platform-schemas.sql 统一创建；应用只负责迁移和校验，不在生产启动时悄悄创建新 schema。
    schemas: agent_runtime
    default-schema: agent_runtime
    create-schemas: false
    locations: classpath:db/migration/postgresql/agent-runtime
    validate-on-migrate: true
    clean-disabled: true
    baseline-on-migrate: false

datasmart:
  agent-runtime:
    # Agent Runtime 是 Java 侧 AI 控制面。
    # 当前默认启用，但模型 Provider 使用 DRY_RUN，不会真实请求大模型。
    enabled: true
    # 单个会话最多绑定的工具数量。
    # 商业化 Agent 不能允许一个会话无限绑定工具，否则模型规划空间、权限校验和审计解释都会失控。
    max-tool-bindings-per-session: 20
    # 单个会话最多保留的运行记录数量。
    # 当前仍是内存仓储阶段，必须设置保守上限；后续接入数据库后，该值仍可作为在线上下文窗口上限。
    max-runs-per-session: 200
    # 单会话同时运行数量。
    # 第一阶段保持 1，避免同一工作空间内多个 run 并发调用工具导致状态竞争。
    max-active-runs-per-session: 1
    # 会话默认生存时间，当前主要作为后续清理策略依据。
    session-ttl-hours: 24
    service-authorization:
      # Agent 工具服务间授权预检开关。
      # 默认关闭是为了保证本地学习环境不强依赖 permission-admin；关闭时 DAG preview 会返回 NOT_EVALUATED，
      # 明确提示“当前还没有真实授权依据”，而不是把未配置误判为允许。
      enabled: ${DATASMART_AGENT_RUNTIME_SERVICE_AUTHORIZATION_ENABLED:false}
      # LOCAL_PREVIEW：只检查租户、项目、actor、工具动作和服务账号上下文是否齐全。
      # PERMISSION_ADMIN_EVALUATE：调用 permission-admin /permissions/evaluate 做真实动作级判定。
      # 生产环境最终应切换到 PERMISSION_ADMIN_EVALUATE，并配合内网 mTLS、服务账号令牌或服务网格策略。
      mode: ${DATASMART_AGENT_RUNTIME_SERVICE_AUTHORIZATION_MODE:LOCAL_PREVIEW}
      # 是否让授权预检结果直接影响 DAG preview 的执行候选。
      # 当前默认 false，先展示授权状态、不改变已有候选数量；真实 DAG worker 上线前建议改为 true，执行 fail-closed。
      enforce-in-preview: ${DATASMART_AGENT_RUNTIME_SERVICE_AUTHORIZATION_ENFORCE_IN_PREVIEW:false}
      # Agent Runtime 在 permission-admin 中使用的服务账号身份。
      # actorId 先使用 Long，是为了兼容现有 PermissionDecisionRequest；serviceAccountCode 用于审计展示。
      service-account-actor-id: ${DATASMART_AGENT_RUNTIME_SERVICE_ACCOUNT_ACTOR_ID:900001}
      service-account-code: ${DATASMART_AGENT_RUNTIME_SERVICE_ACCOUNT_CODE:datasmart-agent-runtime}
      service-account-role: ${DATASMART_AGENT_RUNTIME_SERVICE_ACCOUNT_ROLE:SERVICE_ACCOUNT}
      # permission-admin evaluate 地址。
      # 本地默认直连 8085；生产环境建议改为内部 gateway、Nacos 服务发现地址或服务网格入口。
      permission-admin-evaluate-url: ${DATASMART_PERMISSION_ADMIN_EVALUATE_URL:http://localhost:8085/permissions/evaluate}
      # 授权预检属于执行前关键路径，超时时间应短而明确；权限中心不可用时由 failClosed 策略处理。
      timeout-ms: ${DATASMART_AGENT_RUNTIME_SERVICE_AUTHORIZATION_TIMEOUT_MS:1500}
      # 远端权限中心不可用时是否按拒绝处理。
      # 商业化生产环境建议保持 true，避免 permission-admin 故障期间 Agent 越权执行有副作用的工具。
      fail-closed-when-remote-unavailable: ${DATASMART_AGENT_RUNTIME_SERVICE_AUTHORIZATION_FAIL_CLOSED:true}
    command-worker-leases:
      # command worker lease 的承载介质。
      # memory：默认值，适合本地学习、单元测试和单实例联调；它能表达 fencing token 语义，
      #         但 JVM 重启或多实例部署时无法共享当前持有者事实。
      # mysql：写入 agent_command_worker_lease 表，适合真实 command outbox worker、多实例控制面、
      #        队列重试、旧 worker 恢复写回拦截和运维审计。切换 mysql 时必须同时设置
      #        datasmart.agent-runtime.persistence.database-enabled=true，
      #        并先执行 docker/mysql/migrations/20260624_agent_command_worker_lease.sql。
      # 安全边界：fencingToken 只允许存在于内部 store、claim 响应和 receipt 请求中，
      # 不能进入 runtime event、timeline、日志、Prometheus label、工具结果、prompt、SQL 或 artifact 正文。
      store: ${DATASMART_AGENT_RUNTIME_COMMAND_WORKER_LEASE_STORE:memory}
    tool-action-submissions:
      # 受控工具真实提交事实仓库。
      # 这个配置控制 commandId -> 下游副作用提交状态 的承载介质，服务于质量治理真实提交、后续更多写工具提交、
      # worker 重试、服务重启恢复、运营对账和审计排障。
      # memory：默认值，适合本地学习、单元测试和单实例联调；只能在当前 JVM 内阻止重复提交。
      # mysql：写入 agent_tool_action_submission_fact 表，适合多实例控制面、跨重启恢复和长周期审计。
      #        切换 mysql 时必须同时设置 datasmart.agent-runtime.persistence.database-enabled=true，
      #        并先执行 docker/mysql/migrations/20260628_agent_tool_action_submission_fact.sql。
      # 安全边界：提交事实只保存 commandId、payloadReference、confirmationId、状态、downstreamTaskId 和低敏 issueCode；
      # 不保存 payload body、prompt、SQL、样本、模型输出、凭据、内部 URL 或工具参数正文。
      store: ${DATASMART_AGENT_RUNTIME_TOOL_ACTION_SUBMISSION_STORE:memory}
    artifact-body-read-grants:
      # artifact 正文读取 grant fact 仓库。
      # body-read-grants 返回的 grantDecisionReference 只是低敏审计引用，不是 bearer token；
      # final-check 和 object-store probe 必须回查这里保存的服务端事实，确认引用真实存在、未过期、未撤销且上下文一致。
      # memory：默认值，适合本地学习、单元测试和单实例联调；JVM 重启会丢失，多实例之间不共享。
      # mysql：写入 agent_artifact_body_read_grant_fact 表，适合多实例控制面、跨重启回查、管理员低敏查询和撤销。
      #        切换 mysql 时必须同时设置 datasmart.agent-runtime.persistence.database-enabled=true，
      #        并先执行 docker/mysql/migrations/20260626_agent_artifact_body_read_grant_fact.sql。
      #        管理查询/撤销接口只返回低敏 grant fact，不返回 artifact 正文、bucket/key、签名 URL、prompt、SQL 或工具参数。
      store: ${DATASMART_AGENT_RUNTIME_ARTIFACT_BODY_READ_GRANT_STORE:memory}
      # memory 模式下最多保留多少条 grant fact，防止异常 Agent 循环或压测流量无限扩大 JVM 内存。
      # 该值不等价于生产保留策略；生产 MySQL 模式应通过表分区、归档任务和分页查询控制历史规模。
      memory-max-records: ${DATASMART_AGENT_RUNTIME_ARTIFACT_BODY_READ_GRANT_MEMORY_MAX_RECORDS:10000}
    artifact-object-store:
      minio:
        # 真实 MinIO/S3-compatible artifact 探针 adapter。
        # 默认关闭，关闭时由 DisabledAgentToolActionArtifactObjectStoreClient 返回 fail-safe 不可用结果；
        # 这样本地学习环境不需要配置 MinIO 凭据，也不会误把 artifact 下载能力标记为完成。
        # 生产或联调开启前必须确认：bucket 已创建、账号只有最小只读权限、artifactReference 已按服务端规则物化、
        # durable grant store、DLP/恶意内容扫描、下载审计、限速和保留期策略已有明确路线。
        enabled: ${DATASMART_AGENT_RUNTIME_ARTIFACT_MINIO_ENABLED:false}
        # MinIO/S3-compatible endpoint。该值属于内部基础设施定位信息，不能进入 API 响应、runtime event 或日志。
        endpoint: ${DATASMART_AGENT_RUNTIME_ARTIFACT_MINIO_ENDPOINT:http://localhost:9000}
        # artifact 默认 bucket。调用方不能提交 bucket/key，真实 objectName 由服务端 locator 按低敏引用映射生成。
        bucket: ${DATASMART_AGENT_RUNTIME_ARTIFACT_MINIO_BUCKET:datasmart-agent-artifacts}
        # 访问凭据必须通过环境变量、Nacos、K8s Secret 或企业密钥系统注入，不要把生产明文写入本文件。
        access-key: ${DATASMART_AGENT_RUNTIME_ARTIFACT_MINIO_ACCESS_KEY:}
        secret-key: ${DATASMART_AGENT_RUNTIME_ARTIFACT_MINIO_SECRET_KEY:}
        # 部分 S3-compatible 网关需要 region；本地 MinIO 通常留空即可。
        region: ${DATASMART_AGENT_RUNTIME_ARTIFACT_MINIO_REGION:}
        # 所有 Agent artifact objectName 的根前缀，便于生命周期、归档、清理和审计统一治理。
        object-key-root-prefix: ${DATASMART_AGENT_RUNTIME_ARTIFACT_MINIO_OBJECT_ROOT_PREFIX:agent-runtime/artifacts}
        # Adapter 单次最多读取的 sample 字节数。Host probe service 仍会施加 64KB 硬上限；
        # 这里是 adapter 自己的额外保护，避免未来绕过 Host service 直接复用 adapter 时读入过大对象。
        max-probe-bytes: ${DATASMART_AGENT_RUNTIME_ARTIFACT_MINIO_MAX_PROBE_BYTES:65536}
        # 对象长度软上限。超过后不阻断存在性探针，但会返回低敏 issueCode，提醒不要把大对象当作模型上下文。
        soft-max-object-bytes: ${DATASMART_AGENT_RUNTIME_ARTIFACT_MINIO_SOFT_MAX_OBJECT_BYTES:52428800}
        # 低敏 artifactReference 前缀到 objectName 子目录的服务端映射。
        # 这些值不是 bucket/key 明文，而是受控命名空间规则；调用方只提交左侧前缀对应的 artifactReference。
        reference-prefix-object-key-prefixes:
          "agent-artifact:": agent-artifact
          "artifact:": artifact
          "artifact-ref:": artifact-ref
          "command-output:": command-output
          "task-artifact:": task-artifact
          "minio-object:": minio-object
    tool-action-resume-facts:
      # checkpoint/thread 恢复定位索引的承载介质。
      # memory：默认值，适合本地学习、单元测试和单实例联调，不要求 MySQL；
      # mysql：写入 agent_tool_action_resume_locator_index 表，支持跨重启、跨实例和审计追溯。
      # 注意：切换 mysql 时必须同时设置 datasmart.agent-runtime.persistence.database-enabled=true，
      # 并先执行 docker/mysql/migrations/20260617_agent_tool_action_resume_locator_index.sql。
      # 该索引只保存低敏定位符，不保存 prompt、SQL、arguments、payload、模型输出、密钥或内部 endpoint。
      locator-index-store: ${DATASMART_AGENT_RUNTIME_RESUME_LOCATOR_INDEX_STORE:memory}
      # Human-in-the-loop 澄清事实仓储的承载介质。
      # memory：默认值，适合本地学习、单元测试和单实例联调；服务重启后澄清事实会丢失；
      # mysql：写入 agent_tool_action_clarification_fact 表，适合真实 resume gate、长期审计、多实例控制面和故障恢复。
      # 切换 mysql 时必须同时设置 datasmart.agent-runtime.persistence.database-enabled=true，
      # 并先执行 docker/mysql/migrations/20260618_agent_tool_action_clarification_fact.sql。
      # 该仓储只保存 factId、run/session/command/tool、租户/项目/actor、状态、低敏 code 和 expiresAt，
      # 绝不保存用户澄清原文、prompt、SQL、arguments、payload、样本数据、模型输出、凭证或内部 endpoint。
      clarification-fact-store: ${DATASMART_AGENT_RUNTIME_CLARIFICATION_FACT_STORE:memory}
      # worker receipt 专用索引的承载介质。
      # memory：默认值，适合本地学习、单元测试和单实例联调，不要求 MySQL，但无法跨重启或多实例共享；
      # mysql：写入 agent_tool_action_worker_receipt_index 表，适合恢复前置校验、长期审计、控制面多实例和运维排障。
      # 切换 mysql 时必须同时设置 datasmart.agent-runtime.persistence.database-enabled=true，
      # 并先执行 docker/mysql/migrations/20260618_agent_tool_action_worker_receipt_index.sql。
      # 无论使用哪种介质，该索引都只保存低敏机器事实，不保存 receipt message、payload、prompt、SQL、工具参数、
      # 样本数据、模型输出、凭证、token、内部 endpoint 或工具结果正文。
      worker-receipt-index-store: ${DATASMART_AGENT_RUNTIME_WORKER_RECEIPT_INDEX_STORE:memory}
      # 是否把事实包查询结果写入低敏 runtime event timeline，便于审计台排查 locator/fact 缺失；不保存事实值或 payload。
      diagnostic-event-enabled: ${DATASMART_AGENT_RUNTIME_RESUME_FACT_DIAGNOSTIC_EVENT_ENABLED:true}
      # 工具动作恢复事实包配置。
      # 该能力服务 Python AI Runtime 的 checkpoint/resume-preview：Python 不再只相信请求里自报的
      # approvalConfirmationId/outbox/receipt 字段，而是向 Java 控制面查询哪些事实类型已被服务端采信。
      # 注意：本接口仍是 preview/query，不执行工具、不恢复图、不写 outbox、不派发 worker。
      # 真实执行仍必须经过 command outbox、task-management worker、permission-admin 审批和 receipt 证据链。
      # 是否启用 permission-admin 审批事实远程评估。
      # 默认关闭，避免本地学习环境必须同时启动 permission-admin；关闭时 approval fact 会显示 NOT_EVALUATED，
      # 但绝不会被当作已批准事实。
      approval-fact-evaluation-enabled: ${DATASMART_AGENT_RUNTIME_RESUME_APPROVAL_FACT_EVALUATION_ENABLED:false}
      # permission-admin Agent 工具动作审批事实评估接口。
      # 生产环境建议改为内部 gateway、Nacos 服务发现地址、服务网格入口或 mTLS 受保护地址。
      # 不建议把公网地址配置到这里，因为请求会包含租户、项目、actor、run、command 等控制面定位字段。
      approval-fact-evaluate-url: ${DATASMART_AGENT_RUNTIME_RESUME_APPROVAL_FACT_EVALUATE_URL:http://localhost:8085/permissions/agent/tool-action-approvals/evaluate}
      # 审批事实评估属于恢复预检关键路径，超时应短而明确；超时后由 fail-closed 策略决定是否可重试。
      approval-fact-timeout-ms: ${DATASMART_AGENT_RUNTIME_RESUME_APPROVAL_FACT_TIMEOUT_MS:1500}
      # permission-admin 不可用时是否 fail-closed。
      # 商业化生产环境建议保持 true，防止审批中心故障期间高风险工具动作被 Agent 恢复执行。
      fail-closed-when-approval-remote-unavailable: ${DATASMART_AGENT_RUNTIME_RESUME_APPROVAL_FACT_FAIL_CLOSED:true}
      # 单次查询最多扫描多少条 receipt projection。
      # 当前 runtime event projection 仍是内存热窗口；后续持久化后应改用 runId/commandId/eventType 索引查询。
      receipt-projection-query-limit: ${DATASMART_AGENT_RUNTIME_RESUME_RECEIPT_QUERY_LIMIT:50}
      # 内存版 worker receipt 专用索引容量上限。
      # 该索引只保存 commandId、run/session、租户/项目/actor、outcome、taskStatus、preCheckPassed、
      # errorCode、replaySequence 等低敏机器事实，不保存 message、payload、SQL、prompt、工具参数或内部 endpoint。
      # 它的作用是让恢复事实包优先按 commandId 查专用索引，降低对通用 runtime event 热窗口扫描的依赖。
      # 该配置只影响 memory 模式；当 worker-receipt-index-store=postgresql/jdbc/mysql 时，容量与保留策略应由
      # PostgreSQL 分区、归档或 TTL 清理任务负责。
      worker-receipt-index-max-records: ${DATASMART_AGENT_RUNTIME_WORKER_RECEIPT_INDEX_MAX_RECORDS:10000}
    persistence:
      # 工具执行审计仓储类型。
      # memory 是当前默认值，适合本地学习、单元测试和早期联调；它不会要求 PostgreSQL 已启动。
      # 后续切换为 postgresql/jdbc 时，应配合 agent_tool_execution_audit 表、事务 outbox 和后台 dispatcher 一起灰度，
      # 避免出现“审计状态落库了但事件未入 outbox”或“事件发布了但审计状态未提交”的双写风险。
      # mysql 仍作为历史兼容别名被 AgentRuntimeStoreMode 识别，但新环境应优先使用 postgresql 或 jdbc。
      audit-store: ${DATASMART_AGENT_RUNTIME_AUDIT_STORE:memory}
      # 工具执行事件 outbox 仓储类型。
      # memory 是默认热窗口；postgresql/jdbc 会使用 agent_tool_execution_event_outbox 表持久化待投递事件。
      # 商业化生产环境最终建议 audit-store 与 outbox-store 同时切到 postgresql/jdbc，并通过事务边界保证同提交。
      outbox-store: ${DATASMART_AGENT_RUNTIME_OUTBOX_STORE:memory}
      # 数据库持久化总开关。
      # 当前已经具备 JDBC audit/outbox store、async command outbox store 与 DAG confirmation store，
      # 但默认保持 false，避免本地学习环境没有 PostgreSQL 时启动失败。
      # 启用数据库仓储时，必须同时设置 database-enabled=true 与对应 store=postgresql/jdbc，
      # 这样可以防止误配置单个字符串导致本地启动强依赖数据库。
      database-enabled: ${DATASMART_AGENT_RUNTIME_DATABASE_ENABLED:false}
      jdbc:
        # Agent Runtime 专用 PostgreSQL 连接地址。
        # 默认值面向本地 Docker/PostgreSQL 约定；生产环境应通过环境变量或配置中心覆盖，
        # 并结合数据库账号最小权限、连接超时、慢 SQL 告警和审计库备份策略。
        # currentSchema=agent_runtime 会把未限定表名默认约束在本模块 schema，降低误读其它微服务表的风险。
        url: ${DATASMART_AGENT_RUNTIME_JDBC_URL:jdbc:postgresql://localhost:5432/datasmart_govern?currentSchema=agent_runtime&ApplicationName=datasmart-agent-runtime}
        username: ${DATASMART_AGENT_RUNTIME_JDBC_USERNAME:datasmart}
        password: ${DATASMART_AGENT_RUNTIME_JDBC_PASSWORD:password}
        driver-class-name: ${DATASMART_AGENT_RUNTIME_JDBC_DRIVER_CLASS_NAME:org.postgresql.Driver}
        pool-name: datasmart-agent-runtime-jdbc
        # 连接池大小先保持保守，避免 Agent 工具事件高峰时把 PostgreSQL 连接耗尽。
        # 后续应按“并发 run 数、工具调用 QPS、outbox dispatcher 频率、数据库慢 SQL、锁等待”共同压测后调整。
        minimum-idle: 1
        maximum-pool-size: 10
        connection-timeout-ms: 3000
        idle-timeout-ms: 600000
        max-lifetime-ms: 1800000
        # 当前审计查询接口还没有分页参数；数据库实现先设置硬上限，避免一次诊断请求扫出大量历史记录。
        max-query-limit: 1000
    runtime-events:
      kafka:
        # 默认关闭，避免本地开发环境没有 Kafka 时监听容器不断重连。
        # 生产环境开启前，应确认 Python Runtime 已配置 DATASMART_AI_RUNTIME_EVENT_PUBLISHER=kafka，
        # 并且 topic、消费者组、告警、死信和重放策略已经规划清楚。
        enabled: false
        # 与 Python Runtime 默认 DATASMART_AI_RUNTIME_EVENT_TOPIC 保持一致。
        # 该 topic 当前承载 Agent runtime event 粒度事件，不建议长期承载高频 token streaming。
        topic: datasmart.agent-runtime.events
        # Java agent-runtime 控制面消费者组。
        # observability、audit-center 如果也要消费同一 topic，应使用不同 groupId，避免互相抢分区。
        group-id: datasmart-agent-runtime-control-plane
        # 单个 run 的内存热窗口上限；长期审计后续应落 MySQL/ClickHouse/审计中心。
        max-events-per-run: 1000
        # 当前 JVM 内所有 runtime event 投影的总上限，用于防止重放或事件风暴打满内存。
        max-total-events: 10000
      skill-visibility-index:
        # Skill 可见性快照专用索引。
        # 通用 runtime event projection 负责所有事件的热窗口和 replay；专用索引只保存
        # skill_visibility_snapshot_recorded 的低敏聚合事实，面向前端治理卡片、审计台、Skill Marketplace
        # 和后续 Manifest 指纹灰度排查。默认启用，因为当前实现仍是内存版，不依赖 MySQL/ClickHouse。
        # 如果要回退到 6.15 的行为，可以设置 enabled=false，查询服务会自动 fallback 到通用 projection。
        enabled: ${DATASMART_AGENT_RUNTIME_SKILL_VISIBILITY_INDEX_ENABLED:true}
        # 专用索引实现类型。
        # memory：默认 JVM 热窗口，适合本地学习、单元测试和无数据库联调；
        # mysql：写入 agent_skill_visibility_snapshot_index 表，适合跨实例、跨重启、审计导出和长期治理报表。
        # 切到 mysql 时必须同时设置 datasmart.agent-runtime.persistence.database-enabled=true，
        # 并先执行 docker/mysql/migrations/20260604_agent_skill_visibility_snapshot_index.sql。
        # 这里保留独立 store 开关，是为了支持“启用专用索引但选择不同承载介质”的灰度策略。
        store: ${DATASMART_AGENT_RUNTIME_SKILL_VISIBILITY_INDEX_STORE:memory}
        # 单个 run 在索引中最多保留多少条 Skill 可见性快照。
        # 多轮推理、二轮工具反馈或未来会话内能力刷新都可能生成多条快照；上限用于防止异常循环堆积。
        max-snapshots-per-run: ${DATASMART_AGENT_RUNTIME_SKILL_VISIBILITY_INDEX_MAX_PER_RUN:1000}
        # 当前 JVM 内 Skill 可见性快照索引总上限。
        # 生产长期审计应接 MySQL/ClickHouse/OpenSearch 或审计中心，不能只依赖这个内存窗口。
        max-total-snapshots: ${DATASMART_AGENT_RUNTIME_SKILL_VISIBILITY_INDEX_MAX_TOTAL:10000}
    tool-execution-events:
      # Java 控制面向外发布“工具执行审计状态变化”的开关。
      # 默认关闭是为了保护本地开发；生产环境打开前，应先创建 topic、配置 ACL、告警、保留时间和消费侧幂等。
      enabled: false
      # 该 topic 只承载工具执行状态变化，例如 PLANNED、WAITING_APPROVAL、EXECUTING、SUCCEEDED、FAILED、SKIPPED。
      # 不建议把 token streaming、模型思考日志或网关心跳放入同一 topic，否则消费频率和保留策略会互相影响。
      topic: datasmart.agent-runtime.tool-execution-events
      # payload 内的事件来源，用于区分 agent-runtime、独立 tool-runner、沙箱执行器等未来发布方。
      source: agent-runtime
      outbox:
        # outbox 是工具状态事件的可靠性缓冲层。
        # 它不依赖 Kafka，即使本地没有 broker，也能先记录“事件已经由 Java 控制面生成”这一事实。
        # 后续接入 MySQL store 和后台 dispatcher 后，应把工具状态更新与 outbox 写入放进同一个数据库事务。
        enabled: true
        # 单个 Agent Run 在内存 outbox 中最多保留的事件数，防止单次异常 run 产生过多状态事件挤占 JVM 内存。
        max-events-per-run: 1000
        # 当前 JVM 内 outbox 热窗口总上限；生产持久化后应由数据库保留策略和归档任务控制。
        max-total-records: 10000
        # 单条事件 payload 的最大字节数。超过该值会进入 BLOCKED 状态，而不是继续向下游扩散超大事件。
        max-payload-bytes: 262144
        # outbox 写入失败时是否必须阻断工具状态提交。
        # 默认 false 用于兼容 memory 学习模式；当 audit-store=mysql + outbox-store=mysql + database-enabled=true 时，
        # Java 代码会自动把 outbox sink 升级为必达 sink，并通过 JDBC 事务回滚审计状态。
        # 如果压测或灰度环境需要提前验证 fail-closed 行为，也可以显式设置为 true。
        required-for-state-commit: ${DATASMART_AGENT_RUNTIME_OUTBOX_REQUIRED_FOR_STATE_COMMIT:false}
        # 后续 dispatcher 投递失败后的默认重试间隔；当前阶段先作为配置契约预留。
        retry-backoff-seconds: 30
        # 是否启用 outbox 后台投递器。
        # 默认关闭，避免本地没有 Kafka/审计中心/WebSocket 投递目标时后台任务反复扫描。
        # 生产推荐路线：audit-store=mysql + outbox-store=mysql + database-enabled=true + dispatcher-enabled=true，
        # 并至少启用一个投递目标，例如 dispatcher-kafka-enabled=true。
        dispatcher-enabled: ${DATASMART_AGENT_RUNTIME_OUTBOX_DISPATCHER_ENABLED:false}
        # 首次调度延迟，给应用启动、连接池、Kafka producer 和服务注册留出预热时间。
        dispatcher-initial-delay-ms: 10000
        # 固定延迟轮询间隔。这里使用 fixedDelay，而不是 fixedRate，避免上一轮耗时较长时本 JVM 内重叠执行。
        dispatcher-fixed-delay-ms: 5000
        # 单轮最多领取事件数；后续压测时应结合 outbox 积压、Kafka 吞吐、数据库更新成本调整。
        dispatcher-batch-size: 50
        # 单条记录最大投递尝试次数；达到上限后会进入 BLOCKED，停止自动重试，避免坏消息无限占用 dispatcher。
        # 后续运维台应围绕 BLOCKED 记录提供重新入队、人工忽略、导出排查和修复后补偿等管理能力。
        dispatcher-max-attempts: 10
        # 是否恢复长时间卡在 PUBLISHING 的记录。
        # PUBLISHING 代表 dispatcher 已领取但尚未写回最终状态；如果 worker 崩溃，记录可能永久卡住。
        # 启用后会把超时 PUBLISHING 转回 FAILED 并允许补偿重试；下游仍必须按 eventId/outboxId 做幂等。
        dispatcher-recover-stale-publishing-enabled: true
        # PUBLISHING 超时阈值。默认 300 秒偏保守，避免正常 Kafka ack 或审计中心写入较慢时被误判为 stale。
        # 后续压测可结合 dispatcher-batch-size、Kafka 发送超时、数据库延迟和事件积压量一起调整。
        dispatcher-publishing-timeout-seconds: 300
        # 指数退避最大秒数，避免下游故障时高频重试打爆 Kafka 或数据库。
        dispatcher-max-retry-backoff-seconds: 300
        # 没有任何投递目标时是否允许直接标记 PUBLISHED；生产环境应保持 false，防止事件凭据被误吞。
        dispatcher-allow-no-targets-as-published: false
        # 是否由 dispatcher 把 outbox payload 投递到 Kafka。
        # 注意不要和 tool-execution-events.enabled 的直接 Kafka sink 同时打开，除非消费侧严格按 eventId 幂等去重。
        dispatcher-kafka-enabled: ${DATASMART_AGENT_RUNTIME_OUTBOX_DISPATCHER_KAFKA_ENABLED:false}
        # dispatcher 等待 Kafka broker ack 的超时时间；超时会进入 FAILED 并按退避重试。
        dispatcher-kafka-send-timeout-ms: 3000
    tool-dag:
      confirmations:
        # DAG selected-node 确认记录开关。
        # 该记录表达“调用方确认了哪一版 dry-run 预案，并由此关联了哪些 outbox command”。
        # 它不负责执行工具，也不替代 command outbox 的投递状态机；它是面向审计、复核、补偿和争议排查的证据层。
        enabled: true
        # 当前默认 memory，保证本地学习、单元测试和无数据库联调时无需启动 MySQL。
        # 生产环境可切换为 mysql，并配合 agent_run_tool_dag_confirmation 表实现多实例共享、服务重启恢复和审计导出。
        # mysql 模式需要同时设置 datasmart.agent-runtime.persistence.database-enabled=true，
        # 并确认 JDBC 配置、表结构迁移、备份保留和审计查询权限都已准备好。
        store: memory
        # 确认记录有效期。过期不代表历史事实消失，而是表示这次确认不应再被视为“可继续执行的近期确认”。
        # 后续接入 policyVersion 执行前复核时，如果确认过期或策略版本变化，应要求重新 dry-run/重新确认。
        confirmation-ttl-seconds: 1800
        # memory 模式下单个 run 最多保留的确认记录数；防止异常循环确认把 JVM 内存打满。
        max-confirmations-per-run: 200
        # memory 模式下当前 JVM 总确认记录上限；生产 MySQL 模式应改用归档、保留周期和分页查询治理数据量。
        max-total-records: 2000
    async-task-commands:
      outbox:
        # Agent ASYNC_TASK command outbox。
        # 它与 tool-execution-events.outbox 不同：后者投递“状态事实事件”，本 outbox 投递“创建下游任务的动作命令”。
        # command 会触发 task-management 创建任务，因此更强调幂等、重复投递、失败重试和死信治理。
        enabled: true
        # 当前默认 memory，适合本地学习和单测。
        # 当切换为 mysql 时会使用 agent_async_task_command_outbox 表持久化待投递 command，
        # 同时需要 datasmart.agent-runtime.persistence.database-enabled=true 和 JDBC 配置可用。
        # 生产最终应把“工具审计状态更新 + command outbox INSERT”放在同一事务里，
        # 使模型规划出的异步工具命令不会因为 JVM 重启、dispatcher 崩溃或多实例切换而丢失。
        store: memory
        # 与 task-management AgentAsyncTaskCommandConsumerService 支持的版本保持一致。
        schema-version: datasmart.agent.async-task-command.v1
        # 单条 command payload 最大字节数。command payload 只应包含引用和参数名，不应包含原始工具参数值。
        max-payload-bytes: 65536
        # 内存热窗口容量。生产持久化后应改由数据库保留策略、归档和清理任务控制。
        max-commands-per-run: 500
        max-total-records: 5000
        # 入箱前容量保护。该保护发生在 command outbox append 之前，用于避免 Agent DAG 批量确认继续扩大积压。
        # 第一阶段先做本服务内可验证的 run/tenant backlog 检查；生产多实例后应继续升级为 Redis/DB 原子配额、
        # 租户套餐、工具级并发池和 worker 侧租约控制。
        capacity-protection-enabled: true
        # 单次 enqueue 最多允许的可下发 command 数。selected-node 推荐入口通常应小批量推进，
        # 不建议一次确认几十上百个后台任务；大规模补偿应走管理员补偿台和异步审批流程。
        max-commands-per-enqueue: 20
        # 单个 run 的活跃 command 积压上限。活跃状态包括 PENDING、PUBLISHING、FAILED。
        # PUBLISHED 已交给下游，BLOCKED/IGNORED 已进入人工治理，不计入自动执行压力。
        max-active-commands-per-run: 100
        # 单个租户的活跃 command 积压上限，避免异常 Agent loop 或大租户批量操作占满全平台执行资源。
        # 后续可按租户套餐、项目等级、工具成本和客户 SLA 分层配置。
        max-active-commands-per-tenant: 1000
        # 创建 task-management 任务时的默认调度建议。
        default-priority: MEDIUM
        default-max-retry-count: 3
        default-max-defer-count: 20
        # 默认不启用后台 dispatcher，避免本地没有 task-management 或 Kafka 时误投递。
        # 联调时可先调用 /async-task-commands/outbox/dispatch-once 手动投递一轮。
        dispatcher-enabled: ${DATASMART_AGENT_RUNTIME_ASYNC_COMMAND_DISPATCHER_ENABLED:false}
        dispatcher-initial-delay-ms: 10000
        dispatcher-fixed-delay-ms: 5000
        dispatcher-batch-size: 20
        dispatcher-max-attempts: 8
        retry-backoff-seconds: 30
        dispatcher-max-retry-backoff-seconds: 300
        dispatcher-recover-stale-publishing-enabled: true
        dispatcher-publishing-timeout-seconds: 300
        dispatcher-allow-no-targets-as-published: false
        # dispatcher 投递前 pre-check。
        # 开启后，command 在投递 Kafka/HTTP target 之前会重新复核 selected-node confirmation、当前 execution-policy、
        # sandbox verdict、runtime-protection verdict 和 policyVersion 证据。
        # 默认关闭是为了兼容本地学习环境和历史 Run 级 command；当 selected-node confirmation 已经作为生产主路径后，
        # 建议逐步打开，使缺确认、确认过期、沙箱拒绝等问题 fail-closed，使容量/熔断问题进入退避重试。
        dispatcher-pre-check-enabled: ${DATASMART_AGENT_RUNTIME_ASYNC_COMMAND_DISPATCHER_PRE_CHECK_ENABLED:false}
        # 是否由 command dispatcher 把 outbox payload 投递到 Kafka。
        # 这是未来生产主路径：agent-runtime outbox -> Kafka -> task-management Inbox。
        # 默认关闭，避免本地没有 Kafka 或 listener 未启用时误触发后台投递。
        dispatcher-kafka-enabled: ${DATASMART_AGENT_RUNTIME_ASYNC_COMMAND_DISPATCHER_KAFKA_ENABLED:false}
        # dispatcher 等待 Kafka broker ack 的超时时间。
        # 超时会进入 FAILED 并按退避重试，而不是把 command 误标为已发布。
        dispatcher-kafka-send-timeout-ms: 3000
        # Kafka target 已落地后，HTTP target 主要作为本地联调、灰度补偿或内网临时通道。
        # 生产环境应通过内网、mTLS、服务账号令牌或网关内部路由保护该地址。
        dispatcher-http-enabled: ${DATASMART_AGENT_RUNTIME_ASYNC_COMMAND_DISPATCHER_HTTP_ENABLED:false}
        task-management-consume-url: ${DATASMART_TASK_MANAGEMENT_AGENT_COMMAND_CONSUME_URL:http://localhost:8081/internal/agent-async-task-commands/consume}
        dispatcher-http-timeout-ms: 3000
    mcp-durable-worker:
      # Java agent-runtime -> Python Runtime MCP Durable Worker 的内部调用开关。
      # 默认关闭，避免只启动 Java 控制面时因为 Python Runtime 未启动而失败；完整 Compose/E2E 环境会通过环境变量显式打开。
      enabled: ${DATASMART_AGENT_RUNTIME_MCP_DURABLE_WORKER_ENABLED:false}
      # Python Runtime 内部 baseUrl。生产环境建议替换为内部 gateway、服务网格或服务发现地址，并叠加 mTLS/OIDC 服务账户保护。
      base-url: ${DATASMART_AGENT_RUNTIME_MCP_DURABLE_WORKER_BASE_URL:http://localhost:8090}
      # Python 侧 MCP Durable Worker 内部 API 路径。保留为配置项，便于未来灰度到 /api 前缀、网关重写或版本化路由。
      run-path: ${DATASMART_AGENT_RUNTIME_MCP_DURABLE_WORKER_RUN_PATH:/internal/agent/mcp/durable-worker/run}
      # 连接超时要短：Python Runtime 不可达时应交给 outbox 重试，而不是长时间占用 dispatcher。
      connect-timeout-ms: ${DATASMART_AGENT_RUNTIME_MCP_DURABLE_WORKER_CONNECT_TIMEOUT_MS:1500}
      # 读取超时覆盖 Python admission、MCP tools/call 和摘要生成；长耗时工具后续应走异步 worker 与 artifact 引用。
      read-timeout-ms: ${DATASMART_AGENT_RUNTIME_MCP_DURABLE_WORKER_READ_TIMEOUT_MS:30000}
      # 是否请求 Python 返回安全模型二轮反馈摘要；真正能否内联短结果仍由 Python 的敏感字段与大小预算判断。
      include-model-feedback: ${DATASMART_AGENT_RUNTIME_MCP_DURABLE_WORKER_INCLUDE_MODEL_FEEDBACK:true}
      # 当前推荐由 Java dispatcher 统一写 receipt/outbox/task projection，所以默认不让 Python 直接回写 Java。
      post-to-java: ${DATASMART_AGENT_RUNTIME_MCP_DURABLE_WORKER_POST_TO_JAVA:false}
      # 临执行时从 Agent 工具审计快照解析出的 arguments 最大 JSON 字节数。
      # 超过该值应改用 MinIO artifact reference，避免大参数同时放大 Java dispatcher、HTTP client 和 Python Runtime 内存。
      max-resolved-arguments-bytes: ${DATASMART_AGENT_RUNTIME_MCP_DURABLE_WORKER_MAX_RESOLVED_ARGUMENTS_BYTES:262144}
      # 服务间认证头与令牌。令牌必须从环境变量/Secret 注入，不应写入仓库、日志、runtime event 或 API 响应。
      auth-header-name: ${DATASMART_AGENT_RUNTIME_MCP_DURABLE_WORKER_AUTH_HEADER_NAME:Authorization}
      service-account-token: ${DATASMART_AGENT_RUNTIME_MCP_DURABLE_WORKER_SERVICE_ACCOUNT_TOKEN:}
    rag-command-worker:
      # Java agent-runtime -> Python Runtime RAG Command Worker 的内部调用开关。
      # 默认关闭，避免本地只启动 Java 控制面时后台 dispatcher 误调用 Python；完整 E2E/Compose/生产环境再显式打开。
      enabled: ${DATASMART_AGENT_RUNTIME_RAG_COMMAND_WORKER_ENABLED:false}
      # Python Runtime 内部 baseUrl。生产环境建议替换为内部 gateway、服务网格或服务发现地址，并叠加 OIDC/mTLS 服务账号保护。
      base-url: ${DATASMART_AGENT_RUNTIME_RAG_COMMAND_WORKER_BASE_URL:http://localhost:8090}
      # Python 侧 RAG Command Worker 内部 API 路径。保留为配置项，便于未来灰度到 /api 前缀、网关重写或版本化路由。
      run-path: ${DATASMART_AGENT_RUNTIME_RAG_COMMAND_WORKER_RUN_PATH:/internal/agent/rag/command-worker/run}
      # 连接超时要短：Python Runtime 不可达时应交给 outbox 重试，而不是长时间占用 dispatcher。
      connect-timeout-ms: ${DATASMART_AGENT_RUNTIME_RAG_COMMAND_WORKER_CONNECT_TIMEOUT_MS:1500}
      # 读取超时覆盖 RAG 检索、证据门控、可选生成、LangGraph checkpoint 和低敏 receipt 生成。
      read-timeout-ms: ${DATASMART_AGENT_RUNTIME_RAG_COMMAND_WORKER_READ_TIMEOUT_MS:30000}
      # 当前推荐由 Java dispatcher 统一写 receipt，所以默认不让 Python 直接回写 Java。
      post-to-java: ${DATASMART_AGENT_RUNTIME_RAG_COMMAND_WORKER_POST_TO_JAVA:false}
      # 服务间认证头与令牌。令牌必须从环境变量/Secret 注入，不应写入仓库、日志、runtime event 或 API 响应。
      auth-header-name: ${DATASMART_AGENT_RUNTIME_RAG_COMMAND_WORKER_AUTH_HEADER_NAME:Authorization}
      service-account-token: ${DATASMART_AGENT_RUNTIME_RAG_COMMAND_WORKER_SERVICE_ACCOUNT_TOKEN:}
    # 会话绑定工具时强制从工具目录继承元数据。
    # 生产环境建议保持 true，避免调用方伪造 toolType、targetService、riskLevel 或审批要求。
    strict-tool-registry-binding: true
    # Agent 命令安全预检。
    # 该配置服务 Codex/Claude Code/OpenClaw 类 Agent 的 run-program / shell / MCP tools/call 场景：
    # 模型或外部协议可以提出“想运行什么命令”，但是否允许进入受控 worker，必须先由 Java Host 检查
    # safe-cmd、dangerous-path、workspace root、联网、写入、超时和输出体量。
    # 注意：该预检不执行命令、不写 outbox、不创建审批单、不返回命令正文或真实路径。
    command-safety-precheck:
      # 生产环境建议保持 true。关闭后预检接口只会返回 POLICY_DISABLED，不会给出可执行结论。
      enabled: ${DATASMART_AGENT_RUNTIME_COMMAND_SAFETY_PRECHECK_ENABLED:true}
      # 没有 workspaceRoot 就无法证明 workingDirectory / referencedPaths 没有越界，因此默认要求必须传入。
      workspace-root-required: true
      # 命令行最大长度。大段脚本、SQL、prompt 或 base64 文件应转成 artifactReference，而不是塞进命令行。
      max-command-chars: ${DATASMART_AGENT_RUNTIME_COMMAND_MAX_CHARS:4096}
      # 默认和最大超时。真实 worker 仍必须再次强制服务端上限，不能信任客户端自报。
      default-timeout-seconds: ${DATASMART_AGENT_RUNTIME_COMMAND_DEFAULT_TIMEOUT_SECONDS:30}
      max-timeout-seconds: ${DATASMART_AGENT_RUNTIME_COMMAND_MAX_TIMEOUT_SECONDS:120}
      # 默认和最大输出字节数。stdout/stderr 可能包含敏感数据，必须按服务端预算裁剪。
      default-output-byte-limit: ${DATASMART_AGENT_RUNTIME_COMMAND_DEFAULT_OUTPUT_BYTES:16384}
      max-output-byte-limit: ${DATASMART_AGENT_RUNTIME_COMMAND_MAX_OUTPUT_BYTES:65536}
      # 写入、联网和未知命令默认需要 Human-in-the-loop。审批事实仍必须由 worker 回查 permission-admin。
      approval-required-for-write: true
      approval-required-for-network: true
      approval-required-for-unknown-command: true
      # 安全命令前缀只是第一层 allowlist，不代表直接执行；路径、预算、权限、审批和 receipt 仍要复核。
      safe-command-prefixes:
        - pwd
        - ls
        - dir
        - cat
        - type
        - rg
        - grep
        - findstr
        - head
        - tail
        - wc
        - git status
        - git diff
        - git log
        - mvn -v
        - mvn test
        - java -version
      # 命中这些危险片段时直接阻断，不靠审批绕过。
      dangerous-command-fragments:
        - rm -rf
        - del /s
        - rmdir /s
        - format
        - shutdown
        - reboot
        - diskpart
        - mkfs
        - dd if=
        - reg delete
        - chmod 777
        - chown -r
        - icacls
        - takeown
        - curl | sh
        - wget | sh
        - invoke-expression
        - iwr
        - iex
      # 命中这些片段时进入联网审批语义；后续可继续接域名 allowlist、代理和下载体量限制。
      network-command-fragments:
        - curl
        - wget
        - invoke-webrequest
        - iwr
        - git clone
        - git fetch
        - git pull
        - npm install
        - pnpm install
        - yarn install
        - pip install
        - uv pip install
        - docker pull
      # 命中这些片段时进入写入审批语义；真实执行仍应把写入转成 artifact 或受控 workspace 修改。
      write-command-fragments:
        - touch
        - mkdir
        - new-item
        - set-content
        - out-file
        - tee
        - sed -i
        - echo
        - cp
        - copy
        - mv
        - move
        - git add
        - git commit
        - npm run build
        - mvn package
      # 这些路径片段代表系统目录、凭据目录、VCS 内部目录或本机工具缓存目录。响应只返回分类，不返回路径值。
      blocked-path-fragments:
        - /etc
        - /root
        - /var/lib
        - /proc
        - /sys
        - c:\windows
        - c:\program files
        - \.ssh
        - /.ssh
        - \.aws
        - /.aws
        - \.kube
        - /.kube
        - \.codex
        - /.codex
        - \.git
        - /.git
        - \.m2
        - /.m2
        - \.npm
        - /.npm
    # Agent 工具调用沙箱。
    # 这里的沙箱是“执行前控制面沙箱”：它不启动容器，也不直接调用下游服务；
    # 它负责在真实工具适配器执行前检查工具目录一致性、目标服务范围、参数体量、同步超时、幂等重试和审批事实。
    # 后续如果引入容器级隔离、SQL dry-run、HTTP egress policy、工具健康熔断，也应把结果接入同一 sandbox verdict。
    tool-sandbox:
      # 生产环境建议保持 true。关闭后仅保留基础 Guard 校验，不再执行注册表漂移和目标服务治理。
      enabled: ${DATASMART_AGENT_RUNTIME_TOOL_SANDBOX_ENABLED:true}
      # 要求工具必须来自工具目录。这样模型或调用方不能随意伪造 toolCode、riskLevel 或 targetService。
      require-registered-tool: true
      # 要求 targetService 必须在 tool-service-base-urls 中配置，避免 Agent 调用未登记的内网服务。
      require-known-target-service: true
      # 工具参数最大体量。大对象、文件、样本数据应改为资源引用，不能直接塞进 tool arguments。
      max-argument-bytes: ${DATASMART_AGENT_RUNTIME_TOOL_SANDBOX_MAX_ARGUMENT_BYTES:65536}
      # 同步工具最长可接受超时。超过该阈值的工具应转 ASYNC_TASK/Kafka command/task-management worker。
      max-sync-timeout-ms: ${DATASMART_AGENT_RUNTIME_TOOL_SANDBOX_MAX_SYNC_TIMEOUT_MS:30000}
      # 非幂等工具不允许配置自动重试，除非后续实现业务幂等键、去重表和补偿流程。
      block-non-idempotent-retry: true
      # sensitive=true 的工具参数需要人工审批事实，避免模型在用户未确认时携带敏感上下文执行。
      block-sensitive-arguments-without-approval: true
      # 目标服务白名单为空时表示使用工具目录 + baseUrl 作为准入边界；生产可按租户或安全域显式配置。
      allowed-target-services: []
      # 目标服务黑名单优先级高于白名单，可用于维护窗口、事故止血或客户环境裁剪。
      blocked-target-services: []
      # 这些动作关键词默认要求审批，即使某个工具临时把风险等级配置得偏低，也不会绕过高危动作确认。
      approval-required-actions:
        - DELETE
        - EXPORT
        - EXECUTE_SQL
        - WRITE
        - ADMIN
        - APPROVE
        - PUBLISH
        - SYNC_RUN
        - TASK_SUBMIT
    # Agent 工具运行时保护。
    # 该配置和 tool-sandbox 不是同一件事：sandbox 负责判断“工具计划是否安全”，runtime-protection 负责判断“当前是否有容量执行”。
    # 当前实现是 agent-runtime 单实例 JVM 内存级保护，用于本地学习、早期联调和第一阶段商业化安全阀。
    # 多实例生产环境应继续升级为 Redis/DB 原子计数、租户套餐配额、服务网格熔断和 Prometheus 告警，否则每个实例只能看到自己的本地压力。
    tool-runtime-protection:
      # 是否启用工具运行时保护。生产环境建议保持 true，防止模型循环、重复点击或 DAG 批量推进把工具调用放大成下游故障。
      enabled: ${DATASMART_AGENT_RUNTIME_TOOL_RUNTIME_PROTECTION_ENABLED:true}
      # 当前 JVM 内所有工具执行的总并发上限。该值保护 agent-runtime 自身线程、连接池、内存和适配器调用链。
      max-global-in-flight: ${DATASMART_AGENT_RUNTIME_TOOL_MAX_GLOBAL_IN_FLIGHT:50}
      # 单租户在当前 JVM 内允许的工具执行并发上限，用于避免某个租户占满整个平台执行能力。
      max-tenant-in-flight: ${DATASMART_AGENT_RUNTIME_TOOL_MAX_TENANT_IN_FLIGHT:20}
      # 单目标服务在当前 JVM 内允许的工具执行并发上限，例如 datasource-management、data-quality、task-management 分别隔离。
      max-target-service-in-flight: ${DATASMART_AGENT_RUNTIME_TOOL_MAX_TARGET_SERVICE_IN_FLIGHT:10}
      # 是否启用连续失败熔断。开启后，同一 targetService 连续失败达到阈值会进入冷却期，避免故障被 Agent 自动重试放大。
      circuit-breaker-enabled: ${DATASMART_AGENT_RUNTIME_TOOL_CIRCUIT_BREAKER_ENABLED:true}
      # 同一 targetService 连续失败多少次后打开熔断。第一阶段按服务聚合，后续可细化为 service + toolCode。
      consecutive-failure-threshold: ${DATASMART_AGENT_RUNTIME_TOOL_CONSECUTIVE_FAILURE_THRESHOLD:3}
      # 熔断冷却时间，单位秒。冷却期内新的工具执行会被 runtime-protection-policy 拒绝。
      circuit-open-seconds: ${DATASMART_AGENT_RUNTIME_TOOL_CIRCUIT_OPEN_SECONDS:60}
      # 这些错误码不计入连续失败。参数错误、人工拒绝、业务状态冲突通常不代表下游服务故障，不应触发服务级熔断。
      ignored-circuit-failure-codes:
        - BAD_REQUEST
        - VALIDATION_ERROR
        - MISSING_PARAMETERS
        - USER_REJECTED
        - BUSINESS_STATE_CONFLICT
    # Agent 工具目录。
    # 当前只注册工具元数据，不直接执行工具；真实执行会在后续工具适配器中做权限、审批、幂等和审计。
    tool-service-base-urls:
      # 当前使用本地直连，便于开发环境不依赖服务发现也能调通第一条工具链路。
      # 后续生产环境可替换为 gateway 地址、Nacos 解析地址或服务网格地址。
      datasource-management: http://localhost:8082
      # data-quality 用于生成规则草案、扫描计划和未来质量任务工具。
      # 这里先配置本地直连地址，让 Agent Runtime 可以调用只读/草案型工具。
      data-quality: http://localhost:8083
      # task-management 用于保存任务草稿、提交审批以及后续转换真实任务。
      # 当前 `task.draft.persist` 只调用 /task-drafts 保存 DRAFT，不会直接写入 /tasks 队列。
      task-management: http://localhost:8081
      # data-sync 承担同步任务草稿、预检查、发布、运行和执行状态事实；Agent 不直接写 data_sync 数据库。
      data-sync: http://localhost:8086
      # Python Runtime 仅用于受控 RAG/模型工具；地址来自注册表，工具不能自行指定内部 URL。
      python-ai-runtime: http://localhost:8090
    tool-registry:
      "[datasource.metadata.read]":
        enabled: true
        tool-code: datasource.metadata.read
        tool-type: DATASOURCE_METADATA
        display-name: 数据源元数据读取
        description: 读取数据源能力画像、表结构、字段和连接健康状态，为 Agent 生成治理建议提供上下文。
        target-service: datasource-management
        target-endpoint: /datasources/{datasourceId}/metadata/discover
        read-only: true
        risk-level: LOW
        execution-mode: SYNC
        requires-approval: false
        idempotent: true
        tenant-scoped: true
        project-scoped: true
        memory-write-policy: SEMANTIC
        cache-policy: PROJECT_SAFE
        timeout-ms: 10000
        max-retries: 1
        allowed-actions:
          - USE
        input-schema:
          - name: datasourceId
            type: number
            required: true
            description: 数据源 ID，用于限定 Agent 只能读取被授权的数据源元数据。
            example: "1001"
            sensitive: false
            resolution: CAN_FILL_FROM_CONTEXT
      "[datasource.source.connection.test]":
        enabled: true
        tool-code: datasource.source.connection.test
        tool-type: DATASOURCE_METADATA
        display-name: 源端数据源连接测试
        description: 对用户已安全登记并选择的源端数据源执行真实连接测试；不读取或返回数据库密码。
        target-service: datasource-management
        target-endpoint: /datasources/{datasourceId}/test
