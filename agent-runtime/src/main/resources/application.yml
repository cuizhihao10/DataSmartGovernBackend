management:
  endpoints:
    web:
      exposure:
        # health/info 用于基础存活检查，metrics 用于本地排障，prometheus 用于 Prometheus 周期抓取。
        # 这里显式暴露 prometheus，是因为 pre-check 阻断率、暂缓率和 issueCode 分布需要进入 Grafana/Alertmanager。
        include: health,info,metrics,prometheus
  endpoint:
    health:
      # 与其他 Java 微服务保持一致：默认不把完整健康细节暴露给未授权调用方。
      show-details: when-authorized
    prometheus:
      # 显式开启 Prometheus 端点，便于从配置层理解“agent-runtime 已经具备可抓取指标出口”。
      enabled: true
  metrics:
    tags:
      # application 标签是低基数服务名，适合 Grafana 按模块筛选；不要在这里加入 tenant/run/trace 等业务主键。
      application: ${spring.application.name}

logging:
  level:
    com.czh.datasmart: INFO
