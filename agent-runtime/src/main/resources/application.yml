            type: object
            required: true
            description: 由系统注入的租户、项目、来源类型和标签过滤范围，必须在向量检索前生效。
            sensitive: false
            resolution: SYSTEM_INJECTED
          - name: evidencePolicy
            type: object
            required: true
            description: 由系统生成的证据数量、匹配强度、无证据失败关闭和引用约束。
            sensitive: false
            resolution: DERIVED
      "[task.create.draft]":
        enabled: true
        tool-code: task.create.draft
        tool-type: TASK_MANAGEMENT
        display-name: 任务草稿创建
        description: 为同步、质量检测或治理流程生成任务草稿，默认不直接调度执行，需要用户确认后再提交。
        target-service: task-management
        target-endpoint: /tasks
        read-only: false
        risk-level: HIGH
        execution-mode: APPROVAL_REQUIRED
        requires-approval: true
        idempotent: false
        tenant-scoped: true
        project-scoped: true
        memory-write-policy: EPISODIC
        cache-policy: SESSION_ONLY
        timeout-ms: 15000
        max-retries: 0
        allowed-actions:
          - CREATE
        input-schema:
          - name: taskType
            type: string
            required: true
            description: 任务类型，例如 DATA_SYNC、QUALITY_CHECK、MANUAL_REVIEW。
            example: QUALITY_CHECK
            sensitive: false
            resolution: USER_REQUIRED
          - name: projectId
            type: number
            required: true
            description: 任务所属项目 ID，用于保持 Agent 任务与项目权限边界一致。
            example: "20"
            sensitive: false
            resolution: SYSTEM_INJECTED
          - name: objective
            type: string
            required: true
            description: 任务目标说明，会进入任务描述和审计上下文。
            example: 对订单表执行质量检测并生成异常报告
            sensitive: true
            resolution: USER_REQUIRED
      "[task.draft.persist]":
        enabled: true
        tool-code: task.draft.persist
        tool-type: TASK_MANAGEMENT
        display-name: 任务草稿持久化
        description: 将 Agent 已生成并经过确认的任务草稿保存到 task-management 的 task_draft 表；该工具只创建 DRAFT，不提交审批、不审批通过、不转换真实任务。
        target-service: task-management
        target-endpoint: /task-drafts
        read-only: false
        risk-level: HIGH
        execution-mode: APPROVAL_REQUIRED
        requires-approval: true
        idempotent: false
        tenant-scoped: true
        project-scoped: true
        memory-write-policy: EPISODIC
        cache-policy: SESSION_ONLY
        timeout-ms: 15000
        max-retries: 0
        allowed-actions:
          - CREATE
        input-schema:
          - name: taskDraft
            type: object
            required: false
            description: 可选的完整任务草稿对象，通常来自前端确认页编辑后的结果；如果提供该字段，会优先用于持久化。
            example: '{"name":"DATA_QUALITY_SCAN 草稿 - ods_order","type":"DATA_QUALITY_SCAN","projectId":20}'
            sensitive: true
            resolution: USER_REQUIRED
          - name: taskDraftRef
            type: object
            required: false
            description: 可选的显式工具输出引用，用于从同一 Run 内读取 task.create.draft 的 taskDraft 输出，推荐包含 fromTool、fromAuditId、path。
            example: '{"fromTool":"task.create.draft","fromAuditId":"audit-task-draft","path":"taskDraft"}'
            sensitive: false
            resolution: CAN_FILL_FROM_CONTEXT
          - name: sourceRef
            type: string
            required: false
            description: 草稿来源引用，默认使用本次 task.draft.persist 的审计 ID；生产审批页可用它追溯是哪次 Agent 工具链生成了草稿。
            example: audit-task-draft
            sensitive: false
            resolution: SYSTEM_INJECTED
    # Agent Skill 注册表。
    # Skill 是比工具更高一层的能力包：它描述“某类治理目标应该如何组织工具、记忆、审批和审计”。
    # 当前先配置在 Java agent-runtime 中，让 Java 控制面成为 Skill 治理事实源；
    # Python Runtime 可以继续保留本地默认 Skill 作为降级，但生产环境应优先消费这里的 descriptor。
    skill-registry:
      "[knowledge.rag.answer]":
        enabled: true
        skill-code: knowledge.rag.answer
        display-name: 治理知识 RAG 问答 Skill
        description: 从平台产品文档、治理知识、错误码、历史案例和 Runbook 中检索证据，并在证据门控后生成带来源的回答。
        domain: KNOWLEDGE_QA
        required-tools:
          - knowledge.rag.query
        required-permissions:
          - agent:rag:query
        memory-dependencies:
          - SEMANTIC
          - PROCEDURAL
        risk-level: LOW
        approval-policy: NONE
        tenant-scoped: true
        project-scoped: true
        audit-required: true
        default-memory-scope: PROJECT
        retention-days: 30
        trigger-keywords:
          - RAG
          - 知识库
          - 产品文档
          - Runbook
          - 错误码
          - 为什么
          - 怎么
        examples:
          - 请结合产品文档解释这个同步任务错误并给出修复步骤
      "[sync.task.import.troubleshoot]":
        enabled: true
        skill-code: sync.task.import.troubleshoot
        display-name: 同步任务导入故障诊断 Skill
        description: 基于任务 Excel/CSV 导入的低敏结果引用，检索错误码、产品文档、历史案例和 Runbook，定位冲突与配置错误并给出修复步骤。
        domain: DATA_SYNC
        required-tools:
          - knowledge.rag.query
        required-permissions:
          - agent:rag:query
        memory-dependencies:
          - SEMANTIC
          - PROCEDURAL
        risk-level: LOW
        approval-policy: NONE
        tenant-scoped: true
        project-scoped: true
        audit-required: true
        default-memory-scope: PROJECT
        retention-days: 30
        trigger-keywords:
          - 任务导入
          - 导入任务
          - Excel 导入
          - XLSX 导入
          - CSV 导入
          - 导入失败
          - 导入报错
          - 唯一键冲突
        examples:
          - 任务 Excel 导入提示任务编码冲突，请结合产品文档告诉我怎么修复
      "[sync.execution.autonomous-recovery]":
        enabled: true
        skill-code: sync.execution.autonomous-recovery
        display-name: 同步执行自主恢复 Skill
        description: 基于真实执行账本与项目 RAG 证据诊断失败；经用户逐项确认后执行白名单结构修复、坏行隔离、失败对象重试或重放，验证成功后发布低敏案例。
        domain: DATA_SYNC
        required-tools:
          - sync.execution.diagnose
          - sync.execution.rag.lookup
          - sync.execution.failed-objects.retry
          - sync.dirty-record.quarantine.preview
          - sync.dirty-record.quarantine.apply
          - sync.dirty-record.replay
          - datasource.schema.repair.preview
          - datasource.schema.repair.apply
          - sync.execution.status
          - sync.recovery.case.publish
        required-permissions:
          - sync:execution:view
          - agent:rag:query
        memory-dependencies:
          - EPISODIC
          - SEMANTIC
          - PROCEDURAL
        risk-level: CRITICAL
        approval-policy: EXPLICIT_CONFIRMATION_PER_MUTATION
        tenant-scoped: true
        project-scoped: true
        audit-required: true
        default-memory-scope: PROJECT
        retention-days: 90
        trigger-keywords:
          - 同步失败
          - 任务失败
          - 执行报错
          - 排查同步任务
          - 修复同步任务
          - 脏数据
          - 失败分片重试
          - 字段不匹配
        examples:
          - 排查同步任务 31 的失败原因，检索类似案例，并在我确认后修复和重试
      "[datasource.profiling]":
        enabled: true
        skill-code: datasource.profiling
        display-name: 数据源画像分析 Skill
        description: 分析数据源结构、字段画像、主键索引和基础元数据风险，为后续质量规则和同步任务提供上下文。
        domain: DATASOURCE
        required-tools:
          - datasource.metadata.read
        required-permissions:
          - datasource:metadata:read
        memory-dependencies:
          - SEMANTIC
        risk-level: LOW
        approval-policy: NONE
        tenant-scoped: true
        project-scoped: true
        audit-required: true
        default-memory-scope: PROJECT
        retention-days: 30
        trigger-keywords:
          - 数据源
          - 表结构
          - metadata
          - mysql
          - postgresql
        examples:
          - 请分析这个 MySQL 数据源的表结构
      "[quality.rule.design]":
        enabled: true
        skill-code: quality.rule.design
        display-name: 质量规则设计 Skill
        description: 根据元数据、业务目标和历史异常生成数据质量规则草案，默认进入草案复核而不是直接启用。
        domain: DATA_QUALITY
        required-tools:
          - datasource.metadata.read
          - quality.rule.suggest
        required-permissions:
          - quality:rule:draft
        memory-dependencies:
          - SEMANTIC
          - EPISODIC
        risk-level: MEDIUM
        approval-policy: DRAFT_REVIEW
        tenant-scoped: true
        project-scoped: true
        audit-required: true
        default-memory-scope: PROJECT
        retention-days: 30
        trigger-keywords:
          - 质量
          - 规则
          - 校验
          - 异常
          - 清洗
        examples:
          - 请为客户主数据生成完整性和手机号格式校验规则
      "[quality.anomaly.remediation]":
        enabled: true
        skill-code: quality.anomaly.remediation
        display-name: 质量异常治理任务 Skill
        description: 将质量报告或异常工作台中的低敏异常聚合转成治理/复核任务草案，默认只生成 dry-run 预览，等待人工确认后再提交。
        domain: DATA_QUALITY
        required-tools:
          - quality.remediation.task.draft
        required-permissions:
          - quality:anomaly:remediation:create-draft
        memory-dependencies:
          - EPISODIC
        risk-level: MEDIUM
        approval-policy: DRAFT_REVIEW
        tenant-scoped: true
        project-scoped: true
        audit-required: true
        default-memory-scope: SESSION
        retention-days: 14
        trigger-keywords:
          - 治理任务
          - 异常复核
          - 派单
          - 整改
          - 修复任务
          - remediation
        examples:
          - 请基于这份质量报告生成异常治理任务草案
      "[governed.task.creation]":
        enabled: true
        skill-code: governed.task.creation
        display-name: 受控任务创建 Skill
        description: 将治理目标转换为任务草案，并进入审批、审计和任务管理链路，避免 Agent 直接执行高风险动作。
        domain: TASK_MANAGEMENT
        required-tools:
          - task.create.draft
          - task.draft.persist
        required-permissions:
          - task:create
        memory-dependencies:
          - PROCEDURAL
          - EPISODIC
        risk-level: HIGH
        approval-policy: HUMAN_APPROVAL_REQUIRED
        tenant-scoped: true
        project-scoped: true
        audit-required: true
        default-memory-scope: SESSION
        retention-days: 7
        trigger-keywords:
          - 创建任务
          - 调度
          - 执行
          - 同步任务
          - run
        examples:
          - 请创建一个同步任务并在审批后执行
      "[permission.boundary.explain]":
        enabled: true
        skill-code: permission.boundary.explain
        display-name: 权限边界解释 Skill
        description: 解释角色、项目范围、审批要求和越权风险，帮助用户理解为什么某些治理对象不可见或不可操作。
        domain: PERMISSION_ADMIN
        required-permissions:
          - permission:policy:view
        memory-dependencies:
          - EPISODIC
          - SEMANTIC
        risk-level: MEDIUM
        approval-policy: AUDIT_ONLY
        tenant-scoped: true
        project-scoped: true
        audit-required: true
        default-memory-scope: PROJECT
        retention-days: 90
        trigger-keywords:
          - 权限
          - 角色
          - 审批
          - 项目范围
          - 越权
        examples:
          - 解释为什么我不能访问这个项目的质量报告
    model-routes:
