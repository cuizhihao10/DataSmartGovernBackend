          - EPISODIC
        risk-level: MEDIUM
        approval-policy: DRAFT_REVIEW
        tenant-scoped: true
        project-scoped: true
        audit-required: true
        default-memory-scope: PROJECT
        retention-days: 30
        trigger-keywords:
          - 质量
          - 规则
          - 校验
          - 异常
          - 清洗
        examples:
          - 请为客户主数据生成完整性和手机号格式校验规则
      governed.task.creation:
        enabled: true
        skill-code: governed.task.creation
        display-name: 受控任务创建 Skill
        description: 将治理目标转换为任务草案，并进入审批、审计和任务管理链路，避免 Agent 直接执行高风险动作。
        domain: TASK_MANAGEMENT
        required-tools:
          - task.create.draft
          - task.draft.persist
        required-permissions:
          - task:create
        memory-dependencies:
          - PROCEDURAL
          - EPISODIC
        risk-level: HIGH
        approval-policy: HUMAN_APPROVAL_REQUIRED
        tenant-scoped: true
        project-scoped: true
        audit-required: true
        default-memory-scope: SESSION
        retention-days: 7
        trigger-keywords:
          - 创建任务
          - 调度
          - 执行
          - 同步任务
          - run
        examples:
          - 请创建一个同步任务并在审批后执行
      permission.boundary.explain:
        enabled: true
        skill-code: permission.boundary.explain
        display-name: 权限边界解释 Skill
        description: 解释角色、项目范围、审批要求和越权风险，帮助用户理解为什么某些治理对象不可见或不可操作。
        domain: PERMISSION_ADMIN
        required-permissions:
          - permission:policy:view
        memory-dependencies:
          - EPISODIC
          - SEMANTIC
        risk-level: MEDIUM
        approval-policy: AUDIT_ONLY
        tenant-scoped: true
        project-scoped: true
        audit-required: true
        default-memory-scope: PROJECT
        retention-days: 90
        trigger-keywords:
          - 权限
          - 角色
          - 审批
          - 项目范围
          - 越权
        examples:
          - 解释为什么我不能访问这个项目的质量报告
