# data-sync 是数据移动域的独立微服务。
# 它和 datasource-management 的边界不同：
# datasource-management 负责“连接登记、元数据、连接健康”，data-sync 负责“把数据从哪里搬到哪里、如何搬、何时搬、如何恢复”。
server:
  port: 8086

spring:
  application:
    # 服务名用于 Nacos 注册发现、日志标识、链路追踪和后续 gateway 路由。
    name: data-sync
  profiles:
    active: dev
  datasource:
    # 这里连接 data-sync 自己的“平台业务事实库”，不是源端或目标端客户业务库。
    # 源端/目标端连接串、账号、密钥仍由 datasource-management 管理；
    # data-sync 只保存 datasourceId、低敏 connector type、对象名、任务状态、checkpoint、错误样本和审计事实。
    # currentSchema=data_sync 让未限定表名默认落在本微服务 schema，降低跨微服务误读同名表的风险。
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/datasmart_govern?currentSchema=data_sync&ApplicationName=datasmart-data-sync}
    username: ${SPRING_DATASOURCE_USERNAME:datasmart}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
    hikari:
      # data-sync 的执行历史、checkpoint、幂等表和 outbox 都属于高频写入控制面事实。
      # 显式设置连接池边界，可以避免 worker 积压时单实例无限争抢 PostgreSQL 连接。
      maximum-pool-size: ${DATASMART_DATA_SYNC_DB_MAX_POOL_SIZE:20}
      minimum-idle: ${DATASMART_DATA_SYNC_DB_MIN_IDLE:2}
      connection-timeout: ${DATASMART_DATA_SYNC_DB_CONNECTION_TIMEOUT_MILLIS:3000}
      validation-timeout: ${DATASMART_DATA_SYNC_DB_VALIDATION_TIMEOUT_MILLIS:1000}
  flyway:
    enabled: true
    # Flyway 历史表和业务表都放在 data_sync schema。
    # schema 由 docker/postgresql/init/00-platform-schemas.sql 创建；应用负责迁移和校验，不在生产启动时悄悄创建新 schema。
    schemas: data_sync
    default-schema: data_sync
    create-schemas: false
    locations: classpath:db/migration/postgresql/data-sync
    validate-on-migrate: true
    clean-disabled: true
    baseline-on-migrate: false
  kafka:
    # 预留给同步任务状态事件、执行器调度事件、checkpoint 事件和告警事件。
    bootstrap-servers: localhost:9092
  cloud:
    compatibility-verifier:
      # data-sync 参与真实 E2E 时必须和其他 Java 服务使用同一套固定栈。
      # 因 Spring Cloud 2023 的校验器不认可 Boot 3.5.x，这里显式关闭硬校验，并通过启动与 smoke 结果验证实际兼容性。
      enabled: false
    nacos:
      discovery:
        server-addr: localhost:8848

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.czh.datasmart.govern.datasync.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # data-sync 的 PostgreSQL 表名全部是显式小写下划线命名，不需要迁移期表前缀。
      # 将该配置写清楚，可以避免未来误把 data_sync_* 当成某个公共前缀自动追加或剥离。
      table-prefix: ""

management:
  endpoints:
    web:
      exposure:
        # health/info 用于基础存活检查，metrics 用于本地排障，prometheus 用于 Prometheus 周期抓取。
        # data-sync 的自动恢复、幂等清理和运行数据清理都已经通过 Micrometer 输出指标，
        # 因此这里必须暴露 prometheus 端点，否则 docker/prometheus 无法采集这些生产运营信号。
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        # 显式开启 Prometheus 导出，便于从配置层理解“指标采集链路已经接通”。
        enabled: true

logging:
  level:
    com.czh.datasmart: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

datasmart:
  data-sync:
    datasource-capability:
      # 是否启用 datasource-management 的低敏能力快照读取。
      # 开启后，创建同步模板时如果调用方没有传 sourceConnectorType/targetConnectorType，
      # data-sync 会按 sourceDatasourceId/targetDatasourceId 调用
      # /internal/datasources/{datasourceId}/capability-snapshot 自动补全连接器类型。
      #
      # 业务意义：
      # 1. 前端或 Agent 不需要猜测 MYSQL、POSTGRESQL、KAFKA 等 connector type；
      # 2. data-sync 可以使用 datasource-management 已登记的可信事实做模板预检；
      # 3. 快照只包含低敏能力字段，不包含 JDBC URL、账号、密码、SQL、样本、topic、bucket 或内部 endpoint。
      #
      # 如果本地只单独启动 data-sync、没有启动 datasource-management，可以临时设为 false。
      # 但生产环境建议保持 true，否则模板会回退到“只做基础 datasourceId 校验”的历史兼容模式。
      enabled: true
      # 当调用方已经显式传入 sourceConnectorType/targetConnectorType 时，是否仍然回查 datasource-management 校验一致性。
      # 默认 false 是为了降低当前收敛阶段对远端服务的强依赖：完整传入 connector type 的旧链路可以继续稳定运行。
      # 商业化部署或高安全租户建议设置为 true，避免调用方把 datasourceId=MySQL 的数据源伪装成其他 connector type。
      validate-provided-connector-facts: false
      # datasource-management 本地默认端口是 8082。
      # 生产环境可以替换为服务发现地址、内网域名、gateway 内部路由或 service mesh 虚拟服务地址。
      base-url: http://localhost:8082
      # data-sync 作为后端微服务，默认调用 internal 快照路由。
      # 该路由仍只返回低敏快照，并要求 SOURCE_SERVICE=data-sync、ACTOR_ROLE=SERVICE_ACCOUNT。
      snapshot-path-template: /internal/datasources/{datasourceId}/capability-snapshot
      # 发送给 datasource-management 的服务身份 Header。
      # 当前是最小可信服务账号契约，后续可升级为 HMAC、mTLS 或服务网格鉴权。
      source-service: data-sync
      actor-role: SERVICE_ACCOUNT
      # 能力快照是轻量控制面查询，不应该长时间阻塞用户创建模板。
      # 如果 datasource-management 不可用，data-sync 会 fail-closed 返回模板预检错误，而不是猜测 connector type。
      connect-timeout-ms: 1000
      read-timeout-ms: 1500
    datasource-run-once:
      # 是否启用 data-sync -> datasource-management 的受控单批执行调用。
      # 该开关不同于 datasource-capability：capability 只是低敏控制面查询，而 run-once 会触发真实源端读取和目标端写入。
      # 因此关闭时不能让 execution 无限保持 RUNNING，调度服务会 fail-closed 并写入低敏错误样本。
      enabled: true
      # datasource-management 本地默认端口是 8082。
      # 生产环境可以替换为 Nacos 服务发现地址、内部 gateway、service mesh 虚拟服务或受控内网域名。
      # 不要在日志、runtime event 或用户响应中回显该地址，避免泄露内部拓扑。
      base-url: http://localhost:8082
      # datasource-management 暴露给 data-sync 的 internal 单批执行路径。
      # 该路径只允许 SOURCE_SERVICE=data-sync 且 ACTOR_ROLE=SERVICE_ACCOUNT 的服务账号调用。
      run-once-path: /internal/sync-batch-runs/run-once
      # 服务账号来源标识，会写入 X-DataSmart-Source-Service。
      source-service: data-sync
      # 服务账号角色标识，会写入 X-DataSmart-Actor-Role。
      actor-role: SERVICE_ACCOUNT
      # 建立 HTTP 连接的超时时间。
      # run-once 属于真实执行链路，连接建立不应长时间阻塞 worker 租约；真正的数据读写耗时由 read-timeout 与运行计划控制。
      connect-timeout-ms: 1500
      # 读取远端响应的超时时间。
      # 当前先支持单批闭环，默认 10 秒适合本地与小批量验证；生产应结合 fetchSize、目标端写入速度和 worker lease TTL 调整。
      read-timeout-ms: 10000
      # 传递给 connector runtime 的默认读取批大小建议。
      # 这不是强制值，具体 JDBC reader 仍可结合方言、表规模、连接器能力和租约剩余时间调整。
      default-fetch-size: 512
      # 传递给 connector runtime 的默认写入批大小建议。
      default-write-batch-size: 256
      # 默认事务提交间隔，按记录数表达。
      # 后续如果支持大表并发分片，可按目标端吞吐、事务日志压力和失败重试成本动态调整。
      default-commit-interval-records: 256
      # 单批执行默认超时时间，单位秒。
      default-timeout-seconds: 600
      # 当前 data-sync 外层多批循环和避让重试尚未实现，因此默认不让 run-once 自行重试。
      # 后续接入 worker loop、退避策略和幂等写入后，再统一纳入 retryPolicy。
      default-max-retry-count: 0
    task-management-receipt:
      # 是否把 data-sync execution 的完成/失败低敏事实投递到 task-management。
      # 该能力用于把“下游真实执行结果”纳入平台任务中心、Agent timeline、运维诊断和告警闭环。
      enabled: true
      # receipt 投递失败是否阻断 data-sync complete/fail 主流程。
      # 默认 false：task-management receipt 是投影与诊断面，短暂不可用不应反向卡死 data-sync 状态机。
      # 如果客户要求强一致任务中心，可以设置为 true，但必须配合重试、死信和告警，否则下游任务中心故障会放大为同步执行故障。
      delivery-required: false
      # task-management 本地默认端口是 8081。
      # 生产环境可替换为 Nacos 服务名、内部 gateway、service mesh 虚拟服务或受控内网域名。
      # 不要在日志、API 响应、runtime event 或 receipt 正文中回显该地址。
      base-url: http://localhost:8081
      # task-management 记录 DataSync worker execution receipt 的 internal 路由。
      record-path: /internal/data-sync-worker-execution-receipts/record
      # data-sync 作为 receipt 来源服务写入的服务名 Header 和请求字段。
      source-service: data-sync
      # 内部调用使用的服务账号角色。
      actor-role: SERVICE_ACCOUNT
      # receipt 是轻量投影写入，连接建立不应阻塞 worker 租约。
      connect-timeout-ms: 1000
      # task-management 写入 receipt 的读取超时。
      # 如果后续改为 Kafka/outbox 投递，这里会被消息投递超时替代。
      read-timeout-ms: 2000
      outbox:
        # 是否启用 data-sync 本地 receipt outbox。
        # 开启后，complete/fail 会先把低敏 receipt 请求写入 data_sync_task_management_receipt_outbox，
        # 再尝试投递 task-management。这样 task-management 短暂不可用、网络抖动或 data-sync 进程崩溃时，
        # receipt 投递意图仍然可恢复，而不是只丢在日志里。
        enabled: true
        # 是否在 outbox 入库后立即投递。
        # true 表示正常路径接近实时；失败后仍由后台 scheduler 按 nextRetryAt 补偿。
        # false 表示只落库不立即投递，通常只用于排障或对端限流保护。
        immediate-delivery-enabled: true
        # 是否启用后台定时补偿。
        # 生产建议开启；如果关闭，RETRY_WAIT/PENDING 记录只能通过 internal dispatch-due 手动触发。
        scheduler-enabled: true
        # 服务启动后首次扫描延迟，避免应用刚启动、连接池和服务注册尚未稳定时立刻补偿。
        initial-delay-ms: 45000
        # 上一轮补偿结束后多久再次扫描。
        fixed-delay-ms: 30000
        # 单轮最多处理多少条 due receipt。
        # 如果积压长期存在，应优先排查 task-management 可用性和网络，而不是无限调大批量。
        batch-size: 20
        # 单条 receipt 最大投递次数，达到后进入 DEAD_LETTER，等待运维介入。
        max-attempts: 6
        # 初始退避秒数；失败次数越多，nextRetryAt 会按指数退避增长。
        base-backoff-seconds: 30
        # 最大退避秒数，防止长期故障后 nextRetryAt 被推得过远。
        max-backoff-seconds: 1800
        # DELIVERING 最大停留秒数。
        # 如果 data-sync 在标记 DELIVERING 后崩溃，超过该时间会被后台调度器重新纳入重试范围。
        stale-delivering-seconds: 300
        # 后台补偿使用的平台系统 actorId。
        # 接入 OIDC service account 后，可替换为真实服务账号主体 ID。
        system-actor-id: 0
        # 后台补偿使用的平台系统角色。
        system-actor-role: SERVICE_ACCOUNT
        # 自动生成 traceId 的前缀，不承载业务参数、SQL、样本或内部 endpoint。
        trace-id-prefix: data-sync-task-management-receipt-outbox
    task-scheduler:
      # 是否启用 data-sync 任务级定时调度器。
      # task scheduler 只负责扫描 SCHEDULED 任务并创建 triggerType=SCHEDULED 的 execution，
      # 不直接读取源库、不写目标库、不调用 datasource-management。
      #
      # 它和 worker-loop 的区别非常重要：
      # 1. task-scheduler.enabled=true 只代表“到点生成执行记录”；
      # 2. worker-loop.scheduler-enabled=true 才代表“认领执行记录并触发真实数据搬运”；
      # 3. 预生产环境可以先打开 task-scheduler 验证多次执行历史、misfire 和并发冲突控制，
      #    再打开 worker-loop 验证真实 MySQL -> PostgreSQL 写入。
      scheduler-enabled: false
      # 单轮最多扫描多少个到期定时任务。
      # 这是任务数上限，不是 execution 数上限；CATCH_UP_LIMITED 任务可能在单轮创建多条 execution，
      # 但仍会受 max-catch-up-runs-per-task 保护。
      batch-size: 20
      # 单个任务单轮最多补偿多少个历史触发窗口。
      # 服务停机或队列阻塞后，不能无限制补出所有错过窗口，否则会造成执行队列风暴。
      max-catch-up-runs-per-task: 3
      # 可选租户过滤。为空表示平台级扫描所有租户；租户专属部署可指定 tenant-id。
      tenant-id:
      # 服务启动后首次扫描延迟，避免刚启动时数据库连接池、服务注册和下游依赖尚未稳定。
      initial-delay-ms: 30000
      # 上一轮扫描完成后多久启动下一轮。fixedDelay 可以避免单实例内调度重叠。
      fixed-delay-ms: 15000
      # 后台调度写审计时使用的平台系统 actorId。
      system-actor-id: 0
      # 后台调度写审计时使用的平台系统角色。
      system-actor-role: SERVICE_ACCOUNT
      # 自动生成 traceId 的前缀，不承载 scheduleConfig、SQL、对象清单或连接信息。
      trace-id-prefix: data-sync-task-scheduler
    worker-loop:
      # 是否启用 data-sync 内嵌 worker loop 定时调度。
      # worker loop 会真实认领 QUEUED execution，并可能触发 datasource-management 读取源端、写入目标端，
      # 因此默认关闭，避免开发者只启动 data-sync 时无意中执行历史任务。
      #
      # 商用或完整联调环境开启前，请至少确认：
      # 1. datasource-management 已启动，且 /internal/sync-batch-runs/run-once 可用；
      # 2. datasource-run-once.enabled=true，并配置了正确的内网地址或服务发现地址；
      # 3. 执行器签名、服务账号、OIDC/mTLS/service mesh 身份策略已经按环境要求开启；
      # 4. Prometheus 能抓取 worker loop 指标，运维人员能看到 failed/claimed/dispatched 的变化；
      # 5. 当前最小闭环只支持 FULL/ONE_TIME_MIGRATION 单批场景，增量、多批和分片并发仍会 fail-closed。
      scheduler-enabled: false
      # 内嵌 worker 默认执行器 ID。
      # 多实例生产部署时建议用环境变量覆盖为 data-sync-worker-${HOSTNAME}，
      # 这样 execution.executor_id 可以直接帮助定位是哪台实例认领了任务。
      executor-id: data-sync-embedded-worker
      # 单轮最多认领并处理多少条 execution。
      # 默认 3 是保守闭环值；如果队列积压严重，应优先增加 worker 实例或独立 worker 池，而不是无限调大单轮数量。
      max-executions-per-run: 3
      # claim 时申请的租约秒数。
      # 该值应大于 datasource-run-once.read-timeout-ms 对应秒数，并给 complete/fail 回写留出余量。
      lease-seconds: 180
      # 可选租户过滤。为空表示平台级 worker 可认领所有租户任务。
      # 租户专属部署或监管隔离客户可以指定 tenant-id。
      tenant-id:
      # 服务启动后首次运行 worker loop 的延迟。
      initial-delay-ms: 20000
      # 上一轮 worker loop 结束后多久启动下一轮。
      fixed-delay-ms: 10000
      # 调度器写审计时使用的平台系统 actorId。
      # 接入 Keycloak/OIDC service account 后，可替换为真实服务账号主体 ID。
      system-actor-id: 0
      # 调度器写审计时使用的角色，保持和服务账号委托契约一致。
      system-actor-role: SERVICE_ACCOUNT
      # 自动生成 traceId 的前缀，不承载业务参数或敏感执行信息。
      trace-id-prefix: data-sync-worker-loop
    executor:
      # 单条 execution 允许被 defer 或过期租约恢复回队列的最大次数。
      # 达到该阈值后，系统会停止自动 requeue，把 execution 标记为 FAILED，
      # 同时把任务主状态标记为 AWAITING_OPERATOR_ACTION，避免故障任务无限消耗 worker。
      # 生产环境可以按连接器稳定性、目标端限流策略、worker 数量和运维响应能力调整。
      max-defer-count: 5
      security:
        # 是否启用执行器服务账号签名校验。
        # 当前默认关闭，保证本地开发、接口联调和还没有接入真实 worker 的环境不被阻断。
        # 商用部署时建议开启，并要求 claim/heartbeat/defer/start/checkpoint/complete/fail 等机器协议接口
        # 携带服务账号 ID、时间戳、nonce 和 HMAC 签名，避免只依赖可伪造的 actorRole Header。
        enabled: false
        # 允许的签名时间窗口，单位秒。
        # worker 与 data-sync 运行在不同机器时会存在时钟偏差，窗口过小容易误拒绝正常请求；
        # 窗口过大则会扩大重放攻击可利用时间，因此默认 300 秒。
        allowed-clock-skew-seconds: 300
        # 本实例内 nonce 防重放缓存最大容量。
        # 当前阶段是内存缓存，适合单实例或开发环境；多实例生产环境建议升级 Redis/Caffeine 集群缓存，
        # 让同一个 nonce 被重放到其他 data-sync 实例时也能被拒绝。
        max-nonce-cache-size: 100000
        # HMAC 算法。默认 HmacSHA256 兼顾通用性、安全性和跨语言实现成本。
        signature-algorithm: HmacSHA256
        # 以下 Header 是执行器签名协议的线缆格式。
        # worker 计算 canonical string：
        # HTTP_METHOD + "\n" + requestPathWithQuery + "\n" + traceId + "\n" + serviceAccountId + "\n" + timestamp + "\n" + nonce
        # 然后使用对应 secret 计算 HMAC，签名值可传 Base64 或十六进制。
        service-account-id-header: X-DataSmart-Service-Account-Id
        timestamp-header: X-DataSmart-Service-Account-Timestamp
        nonce-header: X-DataSmart-Service-Account-Nonce
        signature-header: X-DataSmart-Service-Account-Signature
        # 服务账号密钥映射。这里留空是为了避免把生产密钥提交到仓库。
        # 示例：
        # secrets:
        #   sync-executor-default: ${DATASMART_SYNC_EXECUTOR_SECRET}
        secrets: {}
      recovery:
        # 是否启用过期租约自动恢复。
        # 开启后，data-sync 会周期性扫描 RUNNING 且 lease_expire_time 已过期的 execution，
        # 并复用手动恢复接口同一套逻辑：可恢复则重新入队，超过最大退避次数则进入人工介入。
        enabled: true
        # 服务启动后首次扫描延迟，避免应用刚启动、数据库连接池和服务注册尚未稳定时立即恢复。
        initial-delay-ms: 30000
        # 上一轮扫描完成后多久启动下一轮；使用 fixedDelay 可以避免单实例内扫描重叠。
        fixed-delay-ms: 60000
        # 每轮最多处理多少条过期租约；生产环境可根据 worker 数量、数据库压力和积压规模调整。
        batch-size: 50
        # 可选租户 ID；为空表示全平台扫描。租户专属部署时可以指定单个租户。
        tenant-id:
        # 自动恢复写入审计和 errorSummary 的原因摘要。
        reason: "自动定时扫描发现执行器租约过期，系统恢复执行记录"
      idempotency-cleanup:
        # 是否启用执行器回调与租约动作幂等记录的后台清理。
        # 幂等表用于保护近期重复请求，但 heartbeat、checkpoint、defer 等动作会持续写入；
        # 长期不清理会导致唯一索引膨胀、备份变慢、重复请求裁决成本升高。
        enabled: true
        # 幂等记录保留天数。
        # 默认 30 天用于覆盖常见排障窗口。高合规客户可以提升到 90/180/365；
        # 高频执行器或存储压力较大的环境可以降低到 7/14，并通过审计表保留关键业务动作。
        retention-days: 30
        # 服务启动后首次清理延迟；清理任务不是主业务路径，延后启动可减少和恢复扫描、服务注册的资源竞争。
        initial-delay-ms: 60000
        # 上一轮清理完成后多久启动下一轮。当前默认 5 分钟，适合小批量渐进式删除。
        fixed-delay-ms: 300000
        # 单轮最多删除多少条历史幂等记录。
        # 如果删除量长期等于该值，说明历史积压仍较多，可结合数据库负载临时调高或缩短 fixed-delay。
        batch-size: 1000
    maintenance:
      operational-data-cleanup:
        # 是否启用 data-sync 运行数据保留期清理。
        # 运行数据包括 checkpoint、错误样本、审计记录、已关闭事故记录。
        # 它们不是任务主表，但会随同步执行持续增长；开启清理可以降低数据库索引、备份和查询压力。
        enabled: true
        # 服务启动后首次清理延迟。
        # 维护任务不需要抢在业务恢复之前执行，因此比租约恢复和幂等清理稍晚启动。
        initial-delay-ms: 90000
        # 上一轮清理完成后多久启动下一轮。默认 10 分钟，适合温和后台维护。
        fixed-delay-ms: 600000
        # 单轮每张表最多删除多少条。
        # 注意这是每张表上限，不是总上限；一次调度可能分别清理 checkpoint/error/audit/incident。
        batch-size: 500
        # checkpoint 保留天数。
        # checkpoint 直接影响断点续行和补跑，但过老 checkpoint 通常不再参与恢复，默认保留 30 天。
        checkpoint-retention-days: 30
        # 错误样本保留天数。
        # 错误样本帮助排查坏数据、字段映射、目标库写入等问题，默认保留 90 天。
        error-sample-retention-days: 90
        # 审计记录保留天数。
        # 审计记录用于回答“谁在什么时候做了什么动作”，默认保留 365 天以满足基础合规追溯。
        audit-record-retention-days: 365
        # 已关闭事故保留天数。
        # 只会清理 CLOSED 且 closed_at 超过保留期的事故，OPEN/ACKNOWLEDGED/RESOLVED 永远不会被该任务清理。
        closed-incident-retention-days: 180
