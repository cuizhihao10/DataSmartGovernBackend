        - path-pattern: /api/quality/quality-rules/**
          resource-type: QUALITY_RULE
          default-action: EXECUTE
          description: 数据质量规则管理兜底入口，用于规则创建、查询、更新和删除。
          method-actions:
            GET: VIEW
            POST: CREATE
            PUT: UPDATE
            PATCH: UPDATE
            DELETE: DELETE

        - path-pattern: /api/quality/**
          resource-type: QUALITY_RULE
          default-action: EXECUTE
          description: 数据质量模块兼容兜底入口；新增端点应优先补充更具体的 route-metadata。
          method-actions:
            GET: VIEW
            POST: CREATE
            PUT: UPDATE
            PATCH: UPDATE
            DELETE: DELETE

        # agent-runtime 内部服务账号入口必须先于普通 /api/agent/** 语义声明。
        # 它不是用户发起的会话控制面，而是 worker lease、worker receipt、payload materialization 等机器协议。
        # 因此 GET 只允许内部查看，POST/PUT/PATCH/DELETE 均归为 EXECUTE_INTERNAL，方便 permission-admin
        # 单独配置服务账号策略、审计服务间调用和后续接入 mTLS/HMAC/服务网格策略。
        - path-pattern: /api/internal/agent-runtime/**
          resource-type: AI_RUNTIME
          default-action: EXECUTE_INTERNAL
          description: Agent Runtime 内部服务账号控制面入口，用于 worker lease、worker receipt、payload materialization 等机器协议调用。
          method-actions:
            GET: VIEW_INTERNAL
            POST: EXECUTE_INTERNAL
            PUT: EXECUTE_INTERNAL
            PATCH: EXECUTE_INTERNAL
            DELETE: EXECUTE_INTERNAL

        - path-pattern: /api/agent/events/ws
          resource-type: AI_RUNTIME
          default-action: SUBSCRIBE
          description: Agent Runtime 实时事件 WebSocket 订阅入口，用于前端订阅 run/session 进度、断线续传、ack 和 heartbeat。
          method-actions:
            GET: SUBSCRIBE

        # Python Runtime 低敏诊断与闭口检查入口。
        # 这些路径虽然同属于 /api/agent/**，但目标服务是 Python AI Runtime，而不是 Java agent-runtime：
        # - capabilities/closure-readiness 用于上线前确认 Agent Host 能力是否闭口；
        # - Skill Publication diagnostics/refresh 用于确认 Python 是否看见 Java scoped Manifest；
        # - model diagnostics 用于查看 Provider 健康、模型能力适配和成熟推理服务指标缺口；
        # - gateway signature/checkpoint/platform convergence 诊断用于排查信任链、恢复点和整个平台收敛状态；
        # - metrics 用于暴露 Prometheus 低基数指标，使 LangGraph、长期记忆、模型网关和 checkpoint 的运行状态能被统一抓取。
        # 所有接口都只允许返回低敏摘要，不允许输出 token、完整 claim、prompt、SQL、工具参数、样本数据、
        # 模型输出、内部 endpoint、artifact 正文或长期记忆正文。metrics 也只能输出固定枚举 label，
        # 不能把 tenant/project/run/memoryId 等高基数字段放入 Prometheus。POST refresh 只归为 DIAGNOSE，
        # 因为它刷新的是运行时诊断缓存，不创建业务对象、不触发工具执行、不写 worker outbox。
        - path-pattern: /api/agent/rag/query
          resource-type: AI_RUNTIME
          default-action: EXECUTE
          description: Python Runtime RAG 产品查询入口，用于治理知识问答和调试检索、压缩、引用绑定链路；响应仍必须遵守低敏引用与上下文摘要策略。
          method-actions:
            POST: EXECUTE

        - path-pattern: /api/agent/rag/diagnostics
          resource-type: AI_RUNTIME
          default-action: DIAGNOSE
          description: Python Runtime RAG 管线诊断入口，用于确认检索、证据门禁、LangGraph checkpoint 和模型生成摘要是否闭合。
          method-actions:
            GET: DIAGNOSE

        - path-pattern: /api/agent/capabilities/**
          resource-type: AI_RUNTIME
          default-action: DIAGNOSE
          description: Python Runtime Agent 能力矩阵与闭口门禁诊断入口，用于上线前检查 tools、skills、memory、query engine、context、permission、sessions、LLM 等能力是否闭合。
          method-actions:
            GET: DIAGNOSE

        - path-pattern: /api/agent/skills/publication/diagnostics
          resource-type: AI_RUNTIME
          default-action: DIAGNOSE
          description: Python Runtime Skill Publication Manifest 诊断入口，用于查看当前是否看见 Java scoped Manifest、指纹和 READY/非 READY 统计。
          method-actions:
            GET: DIAGNOSE

        - path-pattern: /api/agent/skills/publication/refresh
          resource-type: AI_RUNTIME
          default-action: DIAGNOSE
          description: Python Runtime Skill Publication Manifest 受控刷新入口，只刷新低敏诊断缓存并遵守 TTL、冷却和远端错误重试策略。
          method-actions:
            POST: DIAGNOSE

        - path-pattern: /api/agent/models/*/diagnostics
          resource-type: AI_RUNTIME
          default-action: DIAGNOSE
          description: Python Runtime 模型 Provider 健康、模型能力适配和推理优化诊断入口，用于上线前确认模型层控制面缺口。
          method-actions:
            GET: DIAGNOSE

        - path-pattern: /api/agent/security/gateway-signature/diagnostics
          resource-type: AI_RUNTIME
          default-action: DIAGNOSE
          description: Python Runtime gateway HMAC 签名验真诊断入口，用于确认可信 Header 是否只能由统一 gateway 注入。
          method-actions:
            GET: DIAGNOSE

        - path-pattern: /api/agent/tool-actions/checkpoints/diagnostics
          resource-type: AI_RUNTIME
          default-action: DIAGNOSE
          description: Python Runtime 工具动作 checkpoint store 诊断入口，用于确认恢复点存储实现、TTL 和容量边界。
          method-actions:
            GET: DIAGNOSE

        - path-pattern: /api/agent/platform/convergence/diagnostics
          resource-type: AI_RUNTIME
          default-action: DIAGNOSE
          description: Python Runtime 平台收敛诊断入口，用于从宏观模块维度查看 gateway、permission、agent-runtime、Python Runtime 和数据治理微服务闭口状态。
          method-actions:
            GET: DIAGNOSE

        - path-pattern: /api/agent/metrics
          resource-type: AI_RUNTIME
          default-action: DIAGNOSE
          description: Python Runtime Prometheus 低基数指标入口，用于统一观测 LangGraph、长期记忆、模型网关、checkpoint 和执行门禁等运行状态；该入口只允许 GET，不承载工具执行或业务写入。
          method-actions:
            GET: DIAGNOSE

        # Agent 工具执行事件 outbox 是 Java 控制面与实时事件流之间的可靠投递缓冲区。
        # 查询、诊断、重新入队、忽略和备注的风险等级不同，不能全部退化为普通 GET/POST 语义：
        # 1. GET 查询用于排障和审计复核，后续应结合数据范围、脱敏和事件保留策略继续收紧；
        # 2. diagnostics 展示投递积压与阻断状态，属于运维诊断视角；
        # 3. requeue 会让 dispatcher 再次投递历史事件，必须作为恢复类动作单独授权；
        # 4. ignore 会把事件转为人工归档，不代表投递成功，必须有独立审计语义；
        # 5. notes 用于记录排障过程，虽然不改变投递状态，但会影响后续人工判断，也需要可追溯。
        - path-pattern: /api/agent/tool-execution-events/outbox/diagnostics
          resource-type: AI_RUNTIME
          default-action: DIAGNOSE
          description: Agent 工具执行事件 outbox 诊断接口，用于查看 pending、publishing、failed、blocked 和 ignored 等状态分布。
          method-actions:
            GET: DIAGNOSE

        - path-pattern: /api/agent/tool-execution-events/outbox/{outboxId}/requeue
          resource-type: AI_RUNTIME
          default-action: REQUEUE_OUTBOX
          description: Agent 工具执行事件 outbox 人工重新入队入口；仅用于下游故障修复后恢复投递，不能按普通 CREATE 授权。
          method-actions:
            POST: REQUEUE_OUTBOX

        - path-pattern: /api/agent/tool-execution-events/outbox/{outboxId}/ignore
          resource-type: AI_RUNTIME
          default-action: IGNORE_OUTBOX
          description: Agent 工具执行事件 outbox 人工忽略入口；表示管理员确认该事件无需继续投递，必须保留独立审计语义。
          method-actions:
            POST: IGNORE_OUTBOX

        - path-pattern: /api/agent/tool-execution-events/outbox/{outboxId}/notes
          resource-type: AI_RUNTIME
          default-action: ANNOTATE_OUTBOX
          description: Agent 工具执行事件 outbox 人工备注入口；用于记录排障判断、客户确认或恢复前置条件。
          method-actions:
            POST: ANNOTATE_OUTBOX

        - path-pattern: /api/agent/tool-execution-events/outbox/**
          resource-type: AI_RUNTIME
          default-action: VIEW_OUTBOX_EVENTS
          description: Agent 工具执行事件 outbox 查询接口，用于排查工具状态事件是否进入待投递事件箱以及是否发生堆积或阻断。
          method-actions:
            GET: VIEW_OUTBOX_EVENTS

        # Agent 长期记忆写入候选是“工具结果/治理经验进入长期记忆前”的审批资源。
        # 这里必须把查看、批准、拒绝拆成不同 action，而不是复用普通 GET/POST：
        # 1. 查看候选可能暴露工具审计 ID、候选摘要、scope、敏感字段提示和写入理由，适合审计员/运营人员只读复核；
        # 2. 批准候选会让内容未来进入 Chroma、Neo4j、MySQL 或对象存储，影响后续 Agent 检索和规划，属于高风险治理动作；
        # 3. 拒绝候选会形成“为什么不允许写入长期记忆”的治理事实，也需要独立审计和后续策略分析。
        # 更具体的 approve/reject 规则必须放在通配查询规则之前，避免被 /write-candidates/** 先命中。
        - path-pattern: /api/agent/memory/write-candidates/{candidateId}/approve
          resource-type: AI_RUNTIME
          default-action: APPROVE_MEMORY_WRITE
          description: Agent 长期记忆写入候选批准入口；批准后候选未来可以进入长期记忆持久层，因此不能按普通 POST CREATE 授权。
          method-actions:
            POST: APPROVE_MEMORY_WRITE

        - path-pattern: /api/agent/memory/write-candidates/{candidateId}/reject
          resource-type: AI_RUNTIME
          default-action: REJECT_MEMORY_WRITE
          description: Agent 长期记忆写入候选拒绝入口；拒绝用于阻断敏感、过期、低质量或越权内容进入长期记忆，并形成审计事实。
          method-actions:
            POST: REJECT_MEMORY_WRITE

        - path-pattern: /api/agent/memory/write-candidates/**
          resource-type: AI_RUNTIME
          default-action: VIEW_MEMORY_WRITE_CANDIDATES
          description: Agent 长期记忆写入候选查询入口；用于审批台、审计台和运维台查看候选状态、范围、来源和治理理由。
          method-actions:
            GET: VIEW_MEMORY_WRITE_CANDIDATES

        # Agent Runtime 事件诊断必须比 /api/agent/runtime-events/** 更靠前。
        # 原因：诊断接口展示的是 consumer、投影窗口、拒绝原因和处理耗时等运行状态，
        # 它的权限语义更接近“运维诊断”，不应被普通事件查看权限覆盖。
        - path-pattern: /api/agent/runtime-events/diagnostics
          resource-type: AI_RUNTIME
          default-action: DIAGNOSE
          description: Agent Runtime 运行时事件消费诊断接口，用于运维确认 Kafka consumer、投影窗口、拒绝原因和平均处理耗时。
          method-actions:
            GET: DIAGNOSE

        - path-pattern: /api/agent/runtime-events/skill-visibility-snapshots/diagnostics
          resource-type: AI_RUNTIME
          default-action: DIAGNOSE
          description: Agent Runtime Skill 可见性快照索引诊断入口，用于确认 Java 控制面是否已收到 Python Runtime 发布的 Skill visibility projection。
          method-actions:
            GET: DIAGNOSE

        # runtime event replay ack 是客户端消费位置写入动作，不应退化为 VIEW_EVENTS。
        # 后续 WebSocket 断线重连、Python Runtime 桥接和前端时间线恢复都会依赖该 cursor。
        - path-pattern: /api/agent/runtime-events/replay/acks
          resource-type: AI_RUNTIME
          default-action: ACK_EVENTS
          description: Agent Runtime 事件回放客户端 ack 游标入口，用于确认已消费到的 replaySequence。
          method-actions:
            GET: VIEW_EVENTS
            POST: ACK_EVENTS

        # Agent Runtime 运行时事件投影查询入口。
        # 它不是普通的 GET VIEW：事件里可能包含工具调用、审批等待、异常原因、模型规划阶段和上下文关联 ID，
        # 因此单独使用 VIEW_EVENTS，方便 permission-admin 后续按普通用户、项目负责人、审计员和运维人员拆分策略。
        - path-pattern: /api/agent/runtime-events/**
          resource-type: AI_RUNTIME
          default-action: VIEW_EVENTS
          description: Agent Runtime 运行时事件投影查询接口，用于查看 run/session/request 维度的 Agent 执行事件。
          method-actions:
            GET: VIEW_EVENTS

        - path-pattern: /api/agent/models/routes
          resource-type: AI_RUNTIME
          default-action: VIEW
          description: Agent Runtime 模型路由表查看接口，用于排障模型选择和 Provider 配置。
          method-actions:
            GET: VIEW

        - path-pattern: /api/agent/models/chat
          resource-type: AI_RUNTIME
          default-action: EXECUTE
          description: Agent Runtime 模型推理入口；当前为 dry-run 契约验证，后续接入真实模型 Provider。
          method-actions:
            POST: EXECUTE

        - path-pattern: /api/agent/tools/**
          resource-type: AI_RUNTIME
          default-action: VIEW
          description: Agent 工具目录只读接口，用于查看可绑定工具、风险等级、输入 schema 和下游服务映射。
          method-actions:
            GET: VIEW

        - path-pattern: /api/agent/sessions/{sessionId}/runs/{runId}/cancel
          resource-type: AI_RUNTIME
          default-action: CANCEL
          description: Agent Run 取消入口；用于用户或运营人员停止尚未完成的智能体运行。
          method-actions:
            POST: CANCEL

        - path-pattern: /api/agent/sessions/{sessionId}/runs
          resource-type: AI_RUNTIME
          default-action: EXECUTE
          description: Agent Run 创建入口；用于在既有会话内发起一次智能体规划或执行。
          method-actions:
            POST: EXECUTE

        - path-pattern: /api/agent/sessions/{sessionId}/tools
          resource-type: AI_RUNTIME
          default-action: UPDATE
          description: Agent 会话工具绑定入口；用于声明该会话可调用哪些平台工具能力。
          method-actions:
            POST: UPDATE

        # 推荐生产入口：只允许把已经经过 DAG dry-run 指纹复核的明确选中节点送入 outbox。
        # 该动作会产生后台任务副作用，不能被 sessions/** 通配规则解释成普通 CREATE。
        - path-pattern: /api/agent/sessions/{sessionId}/runs/{runId}/tool-executions/dag-selected-node-outbox/enqueue
          resource-type: AI_RUNTIME
          default-action: ENQUEUE_SELECTED_ASYNC_TOOL
          description: DAG 已确认选中节点异步入箱入口；服务端会重新 dry-run、校验指纹并只推进异步 ready 节点。
          method-actions:
            POST: ENQUEUE_SELECTED_ASYNC_TOOL

        # selected-node confirmation 查询是只读审计能力，但它展示的是“谁确认了哪版预案、哪些节点进入 outbox、
        # 命中了哪版策略和委托证据”，比普通会话详情更敏感，因此不能被 /api/agent/** 的普通 VIEW 吞掉。
        - path-pattern: /api/agent/sessions/{sessionId}/runs/{runId}/tool-executions/dag-confirmations/**
          resource-type: AI_RUNTIME
          default-action: VIEW_TOOL_CONFIRMATIONS
          description: DAG selected-node 确认记录详情查询接口，用于审计 human-in-the-loop 确认与 durable action 证据。
          method-actions:
            GET: VIEW_TOOL_CONFIRMATIONS

        - path-pattern: /api/agent/sessions/{sessionId}/runs/{runId}/tool-executions/dag-confirmations
          resource-type: AI_RUNTIME
          default-action: VIEW_TOOL_CONFIRMATIONS
          description: DAG selected-node 确认记录列表查询接口，用于按 run 查看确认历史、策略版本和 outbox 关联。
          method-actions:
            GET: VIEW_TOOL_CONFIRMATIONS

        # 兼容入口：按整个 Run 扫描可下发异步草案。它适合联调、运维补偿和后续管理员操作，
        # 但生产网关应给它更严格的策略，不能和 selected-node 推荐入口共用普通 CREATE 权限。
        - path-pattern: /api/agent/sessions/{sessionId}/runs/{runId}/tool-executions/async-command-outbox/enqueue
          resource-type: AI_RUNTIME
          default-action: ENQUEUE_RUN_ASYNC_TOOLS
          description: 兼容 Run 级异步命令批量入箱入口；生产应收口为内部补偿或管理员动作。
          method-actions:
            POST: ENQUEUE_RUN_ASYNC_TOOLS

        - path-pattern: /api/agent/async-task-commands/outbox/diagnostics
          resource-type: AI_RUNTIME
          default-action: DIAGNOSE
          description: Agent Runtime 异步命令 outbox 诊断入口，用于查看待投递、失败、死信和恢复状态，不能退化为普通 VIEW。
          method-actions:
            GET: DIAGNOSE

        - path-pattern: /api/agent/sessions/{sessionId}/runs/{runId}/tool-executions/{auditId}/approve
          resource-type: AI_RUNTIME
          default-action: APPROVE
          description: Agent 高风险工具计划人工确认入口；只解除审批等待，不直接执行下游工具。
          method-actions:
            PATCH: APPROVE

        - path-pattern: /api/agent/sessions/{sessionId}/runs/{runId}/tool-executions/{auditId}/reject
          resource-type: AI_RUNTIME
          default-action: APPROVE
          description: Agent 高风险工具计划人工拒绝入口；拒绝后工具计划进入 SKIPPED，后续编排器应跳过该工具。
          method-actions:
            PATCH: APPROVE

        - path-pattern: /api/agent/sessions/{sessionId}/runs/{runId}/tool-executions/{auditId}/execute
          resource-type: AI_RUNTIME
          default-action: EXECUTE
          description: Agent 工具计划执行入口；仅允许执行已完成审批且处于 PLANNED 的工具计划。
          method-actions:
            PATCH: EXECUTE

        - path-pattern: /api/agent/sessions/**
          resource-type: AI_RUNTIME
          default-action: VIEW
          description: Agent 会话控制面；用于创建、查询会话与查看运行上下文。
          method-actions:
            GET: VIEW
            POST: CREATE

        - path-pattern: /api/permission/project-memberships/batch-upsert
          resource-type: PROJECT_MEMBERSHIP
          default-action: IMPORT
          description: 批量导入或同步项目成员授权，风险高于单条创建，需要独立动作语义。
          method-actions:
            POST: IMPORT

        - path-pattern: /api/permission/project-memberships/*/enable
          resource-type: PROJECT_MEMBERSHIP
          default-action: ENABLE
          description: 启用项目成员授权，会让授权重新参与 PROJECT 数据范围物化。
          method-actions:
            POST: ENABLE

        - path-pattern: /api/permission/project-memberships/*/disable
          resource-type: PROJECT_MEMBERSHIP
          default-action: DISABLE
          description: 禁用项目成员授权，保留审计记录但停止下发 projectId。
          method-actions:
            POST: DISABLE

        - path-pattern: /api/permission/project-memberships/**
          resource-type: PROJECT_MEMBERSHIP
          default-action: UPDATE
          description: 项目成员授权管理；它决定 PROJECT 数据范围会把哪些 projectId 下发给业务模块。
          method-actions:
            GET: VIEW
            POST: CREATE
            PUT: UPDATE
            PATCH: UPDATE
            DELETE: DISABLE

        - path-pattern: /api/identity/users/register
          resource-type: IDENTITY_USER
          default-action: CREATE
          description: Keycloak/企业 IdP 账号供应创建入口；密码只转发给 IdP，DataSmart 只保存影子身份和审计。
          method-actions:
            POST: CREATE

        - path-pattern: /api/identity/users/*/disable
          resource-type: IDENTITY_USER
          default-action: DISABLE
          description: 禁用外部身份账号并同步本地影子状态，属于高风险账号生命周期动作。
          method-actions:
            POST: DISABLE

        - path-pattern: /api/identity/users/*/password/reset
          resource-type: IDENTITY_USER
          default-action: RESET_PASSWORD
          description: 重置 Keycloak/企业 IdP 密码；响应和审计均不得包含密码明文。
          method-actions:
            POST: RESET_PASSWORD

        - path-pattern: /api/identity/**
          resource-type: IDENTITY_USER
          default-action: EXECUTE
          description: 身份账号供应兜底入口，覆盖能力查询、账号生命周期和影子身份治理。
          method-actions:
            GET: VIEW
            POST: CREATE
            PUT: UPDATE
            PATCH: UPDATE
            DELETE: DISABLE

        - path-pattern: /api/permission/**
          resource-type: SYSTEM_SETTING
          default-action: EXECUTE
          description: 角色、菜单、路由策略、数据范围和平台管理能力。
          method-actions:
            GET: VIEW
            POST: CREATE
            PUT: UPDATE
            PATCH: UPDATE
            DELETE: DELETE

        - path-pattern: /api/observability/**
          resource-type: AUDIT_LOG
          default-action: EXECUTE
          description: 审计、日志、指标、告警和运维视角。
          method-actions:
            GET: VIEW
            POST: CREATE
            PUT: UPDATE
            PATCH: UPDATE
            DELETE: DELETE

logging:
  level:
    com.czh.datasmart: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        # health/info 用于基础探活，metrics 用于本地排障，prometheus 用于 docker/prometheus 周期抓取。
        # gateway 处在所有外部流量入口，后续限流、授权、WebSocket 连接数和 Python Runtime 代理指标都需要进入统一监控。
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
