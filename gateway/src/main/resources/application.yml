# Gateway 是当前阶段的统一外部入口，
# 因而这个配置文件本质上就是平台公开路由契约的一部分。
server:
  port: 8080

spring:
  application:
    name: datasmart-govern-gateway
  profiles:
    active: dev
  cloud:
    compatibility-verifier:
      # gateway 是所有服务的统一入口，若被 Spring Cloud 版本矩阵硬校验拦截，真实 E2E 无法继续。
      # 当前项目先遵守既定 Spring Boot 3.5.11 / Spring Cloud 2023.0.3 约束关闭硬校验；
      # 后续商业化发布前仍建议用完整回归和压测评估该固定栈组合。
      enabled: false
    gateway:
      # 路由显式声明出来，更适合作为学习资料。
      # 只看配置也能直接理解“哪个前缀转到哪个模块”。
      routes:
        - id: task-management
          uri: lb://task-management
          predicates:
            - Path=/api/task/**
          filters:
            # 外部统一暴露 /api/task/**，下游 task-management 仍保持 /tasks、/tasks/operations 等模块内路径。
            # 通过 RewritePath 统一剥离网关前缀，可以让网关契约和服务内部控制器职责解耦。
            - RewritePath=/api/task/(?<segment>.*), /$\{segment}
        - id: permission-admin
          uri: lb://permission-admin
          predicates:
            - Path=/api/permission/**
          filters:
            # permission-admin 内部主路径是 /permissions/**。
            # 当前 Controller 同时兼容 /api/permission/**，但网关侧仍推荐显式改写，避免下游长期感知外部 API 前缀。
            - RewritePath=/api/permission/(?<segment>.*), /permissions/$\{segment}
        - id: identity-provisioning
          uri: lb://permission-admin
          predicates:
            - Path=/api/identity/**
          filters:
            # 身份供应属于 permission-admin 的账号治理能力，但外部 API 独立使用 /api/identity/**。
            # 网关在这里改写为 /identity/**，让下游 controller 保持身份中心语义而不是感知外部前缀。
            - RewritePath=/api/identity/(?<segment>.*), /identity/$\{segment}
        - id: datasource-management
          uri: lb://datasource-management
          predicates:
            - Path=/api/datasource/**
          filters:
            # datasource-management 内部保留 /datasources、/sync/templates 等领域路径。
            - RewritePath=/api/datasource/(?<segment>.*), /$\{segment}
        - id: data-sync
          uri: lb://data-sync
          predicates:
            - Path=/api/sync/**
          filters:
            # data-sync 是独立微服务，内部 Controller 使用 /sync-tasks、/sync-templates、/sync-incidents 等路径。
            # 外部 /api/sync/** 只属于网关公开契约，转发前必须去掉该前缀，否则请求会到达服务但无法命中 Controller。
            - RewritePath=/api/sync/(?<segment>.*), /$\{segment}
        - id: data-quality
          uri: lb://data-quality
          predicates:
            - Path=/api/quality/**
          filters:
            # data-quality 内部保持 /quality-rules/**，网关统一暴露 /api/quality/**。
            - RewritePath=/api/quality/(?<segment>.*), /$\{segment}
        - id: python-ai-runtime-events-ws
          # Python AI Runtime 的实时事件 WebSocket 桥接路由。
          # 设计意图：
          # 1. 前端只访问 Java gateway 暴露的 /api/agent/events/ws，不直接感知 Python Runtime 地址；
          # 2. Gateway 原生 WebSocket Routing Filter 会根据 ws:// scheme 处理 Upgrade 转发，不需要我们手写 socket 代理；
          # 3. 默认端口使用 8090，避免和 docker-compose 中 Chroma 的 8000 端口冲突；
          # 4. 后续生产环境可以通过 DATASMART_PYTHON_AI_RUNTIME_WS_URI 切换为 wss://、内网域名或服务发现地址。
          uri: ${DATASMART_PYTHON_AI_RUNTIME_WS_URI:ws://localhost:8090}
          predicates:
            - Path=/api/agent/events/ws
          filters:
            # Python FastAPI 内部路由是 /agent/events/ws，外部网关路径仍归入 /api/agent/** 产品入口。
            - RewritePath=/api/agent/events/ws, /agent/events/ws
        - id: python-ai-runtime-agent-plans
          # Agent 规划入口由 Python AI Runtime 承担，而不是由 Java agent-runtime 直接生成模型计划。
          # 该路由必须放在通用 /api/agent/** 路由之前，否则请求会先被更宽泛的规则转发给 Java 控制面。
          # gateway 过滤器会在转发前清理外部伪造的 X-DataSmart-*，再写入已认证或开发期受控身份上下文。
          # Python API 边界随后只根据这些 Header 重建 trustedControlPlane，拒绝相信请求体自报的可信事实。
          uri: ${DATASMART_PYTHON_AI_RUNTIME_URI:http://localhost:8090}
          predicates:
            - Path=/api/agent/plans
          filters:
            - RewritePath=/api/agent/plans, /agent/plans
        - id: python-ai-runtime-rag
          # RAG 查询与诊断由 Python AI Runtime 承担。
          # 该路由必须放在通用 /api/agent/** -> Java agent-runtime 之前，否则前端通过统一 /api
          # 调用 /api/agent/rag/query 时会被错误转发到 Java 控制面，导致已经实现的 Python RAG
          # 产品查询入口无法形成真实闭环。
          uri: ${DATASMART_PYTHON_AI_RUNTIME_URI:http://localhost:8090}
          predicates:
            - Path=/api/agent/rag/query,/api/agent/rag/diagnostics
          filters:
            - RewritePath=/api/agent/rag/(?<segment>.*), /agent/rag/$\{segment}
        - id: python-ai-runtime-runtime-diagnostics
          # Python Runtime 低敏诊断与闭口检查入口。
          #
          # 为什么要在通用 /api/agent/** -> Java agent-runtime 之前显式声明：
          # 1. `/api/agent/**` 同时承载 Java Agent 控制面和 Python Agent Host 运行时诊断；
          # 2. 如果不先匹配这些 Python 路径，Skill Manifest 刷新、能力闭口、模型 Provider 健康等接口会被误转到
          #    Java `agent-runtime`，导致本地 E2E 看起来“gateway 可访问”，但实际 AI Runtime 诊断链路没有闭合；
          # 3. 这些接口只返回低敏控制面摘要或 Prometheus 低基数指标，不执行工具、不创建任务、不读取业务数据、不返回 prompt/SQL/模型输出；
          # 4. POST `/api/agent/skills/publication/refresh` 只刷新 Python 进程内 Manifest 诊断缓存，仍然不绕过
          #    OIDC、permission-admin、HITL、tool readiness 或 runtime protection。
          uri: ${DATASMART_PYTHON_AI_RUNTIME_URI:http://localhost:8090}
          predicates:
            - Path=/api/agent/capabilities/**,/api/agent/skills/publication/diagnostics,/api/agent/skills/publication/refresh,/api/agent/models/provider-health/diagnostics,/api/agent/models/capabilities/diagnostics,/api/agent/models/inference-optimization/diagnostics,/api/agent/security/gateway-signature/diagnostics,/api/agent/tool-actions/checkpoints/diagnostics,/api/agent/platform/convergence/diagnostics,/api/agent/metrics
          filters:
            # Python Runtime 内部统一使用 /agent/** 作为运行时能力域；外部仍然挂在 /api/agent/**，由 gateway 负责收口。
            - RewritePath=/api/agent/(?<segment>.*), /agent/$\{segment}
        - id: agent-runtime-internal
          # agent-runtime 的内部服务账号入口。
          # 这些路径承载 worker lease、worker receipt、payload materialization 等机器协议，
          # 不应作为普通 /api/agent/** 用户控制面暴露；网关会在授权过滤器里额外要求
          # actorRole=SERVICE_ACCOUNT 且 actorType=SERVICE_ACCOUNT，再继续交给 permission-admin 做策略审计。
          uri: lb://agent-runtime
          predicates:
            - Path=/api/internal/agent-runtime/**
          filters:
            - RewritePath=/api/internal/agent-runtime/(?<segment>.*), /internal/agent-runtime/$\{segment}
        - id: agent-runtime
          uri: lb://agent-runtime
          predicates:
            - Path=/api/agent/**
          filters:
            # agent-runtime 内部使用 /agent-runtime/** 表达“AI 控制面”领域路径。
            # 外部统一使用 /api/agent/**，便于前端和未来智能网关把 Agent 能力视为平台级入口。
            - RewritePath=/api/agent/(?<segment>.*), /agent-runtime/$\{segment}
        - id: observability
          uri: lb://observability
          predicates:
            - Path=/api/observability/**
          filters:
            # observability 内部使用 /observability/** 表达可观测性控制面领域路径。
            # 外部统一暴露 /api/observability/**，由 gateway 去掉外部前缀并补回服务内领域前缀，
            # 避免下游 Controller 长期感知网关 API 目录结构。
            - RewritePath=/api/observability/(?<segment>.*), /observability/$\{segment}
      discovery:
        locator:
          # 打开服务发现定位器，便于后续按服务名动态发现下游服务。
          enabled: true
  kafka:
    # Kafka 预留给网关侧事件采集、审计打点或限流扩展。
    bootstrap-servers: localhost:9092
  redis:
    # Redis 后续可用于网关级限流、会话态和热点控制。
    host: localhost
    port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          # OIDC/JWT Resource Server issuer。
          # Keycloak 17+ 默认路径通常是 http://<host>:<port>/realms/<realm>；
          # 生产环境应替换为企业 IdP、Keycloak 集群或云 IAM 的真实 issuer，并确保 gateway 可以访问其
          # /.well-known/openid-configuration 与 jwks_uri。
          issuer-uri: ${DATASMART_GATEWAY_OIDC_ISSUER_URI:http://localhost:18080/realms/datasmart}

datasmart:
  gateway:
    agent-events:
      websocket:
        # Agent 实时事件 WebSocket 入口治理开关。
        # 该能力只保护 /api/agent/events/ws 长连接入口，不影响普通 REST API。
        # 商业化场景里，WebSocket 连接会持续占用 gateway、Python Runtime、事件 outbox 与前端订阅资源，
        # 因此即使权限中心允许订阅，也仍然需要在网关层先做粗粒度容量保护。
        enabled: true
        # 网关对外暴露的 Agent 实时事件路径。
        # 这里必须与 spring.cloud.gateway.routes 中的 python-ai-runtime-events-ws 路由保持一致。
        # 后续如果拆出审计员事件流、运营大屏事件流或移动端轻量事件流，可以把该配置演进为列表。
        path: /api/agent/events/ws
        # 是否要求请求携带 WebSocket Upgrade 握手头。
        # 普通 HTTP GET 误打到该路径时，如果继续转发给 Python Runtime，调用方会得到不清晰的下游协议错误；
        # 在 gateway 早期返回 400 能让前端、测试脚本和运维排障更容易定位问题。
        require-upgrade-header: true
        # 单个 gateway 实例允许的最大活跃 Agent 事件连接数。
        # 当前是单实例内存计数，不代表全局集群配额；多 gateway 实例生产部署时应升级为 Redis 租约或统一限流中心。
        max-active-connections: 500
        # 单个租户在当前 gateway 实例上的最大活跃连接数。
        # 该值用于避免单个租户或异常客户脚本把共享实时事件入口占满，后续可以按租户套餐、项目规模或 SLA 动态配置。
        max-connections-per-tenant: 100
        # 单个操作者在当前 gateway 实例上的最大活跃连接数。
        # 该值主要防浏览器多标签页、前端重连 bug、脚本化压测或服务账号异常重试造成的连接风暴。
        max-connections-per-actor: 8
        # 触发配额限制时返回给客户端的 Retry-After 秒数。
        # 前端 WebSocket SDK 应读取该值并采用退避重连，避免 429 后立即重试进一步放大故障。
        retry-after-seconds: 5
    context:
      # 是否信任外部请求传入的 X-DataSmart-Tenant-Id、X-DataSmart-Actor-Id、X-DataSmart-Actor-Role 等身份上下文。
      # 默认必须为 false，因为这些字段会直接影响后续权限、审计和租户边界；如果客户端可以随便伪造，就会产生越权风险。
      # 本地联调或前置企业网关已经完成认证时，可以临时打开；生产环境更推荐由 JWT 解析过滤器写入这些 Header。
      trust-incoming-platform-context: false
      # 下游服务通过该字段知道请求来自统一网关，便于审计、日志排查和后续区分外部网关、内部网关、Agent 网关。
      source-service: datasmart-govern-gateway
      # 当前还未完整接入登录态和多入口识别，因此未知外部请求先标记为 OPEN_API。
      # 后续可扩展为 WEB_UI、SCHEDULER、AGENT_TOOL_CALL、SERVICE_ACCOUNT_CALL 等更细粒度来源。
      default-request-source: OPEN_API
      # 兼容早期过滤器使用的 X-Request-Id。新代码应优先读取 X-DataSmart-Trace-Id。
      legacy-request-id-header: X-Request-Id
      # 迁移期把平台 traceId 同步写回 X-Request-Id，避免旧调试脚本、日志模板或调用方暂时读不到链路 ID。
      mirror-trace-id-to-legacy-request-id: true
      # 这两个 Header 只用于调试和排障，不应该作为权限判断依据。
      route-prefix-header: X-Gateway-Route-Prefix
      original-path-header: X-Gateway-Original-Path
      skill-visibility-cache:
        # 会话级 READY Skill 可见性缓存上下文。
        #
        # 它不是响应缓存：
        # - 不缓存用户 objective、prompt、模型输出或工具参数；
        # - 不在 gateway 保存 AgentPlan；
        # - 只生成一个由租户、操作者、角色、workspace、数据范围、租户套餐、workspace 风险和预算策略版本
        #   派生出的低敏 key，让 Python Runtime 可以缓存“当前控制面边界下哪些 Skill 通过准入”。
        #
        # 为什么放在 gateway：
        # 1. gateway 已经完成 Header 清理、身份注入和 permission-admin 路由授权；
        # 2. 这些 Header 会被后续 python-runtime-signature 签名，Python Runtime 可以验证它们确实来自 gateway；
        # 3. 未来权限策略变更事件、租户套餐变更或 workspace 风险升高时，可以在 gateway/Redis 层做主动失效。
        enabled: ${DATASMART_GATEWAY_SKILL_VISIBILITY_CACHE_ENABLED:true}
        # 当前协议版本。若 key 因子发生不兼容变化，应升级版本并同步 Python Runtime。
        version: ${DATASMART_GATEWAY_SKILL_VISIBILITY_CACHE_VERSION:v1}
        # 缓存语义范围：当前只缓存“会话控制面边界下的 Skill 准入结果”，不缓存完整响应。
        scope: ${DATASMART_GATEWAY_SKILL_VISIBILITY_CACHE_SCOPE:session-ready-skill-admission}
        # TTL 秒数。生产环境建议保持较短，并配合权限/套餐/风险策略变更事件主动失效。
        ttl-seconds: ${DATASMART_GATEWAY_SKILL_VISIBILITY_CACHE_TTL_SECONDS:300}
        # 需要生成缓存上下文的 gateway 原始路径。
        # 当前只覆盖 /api/agent/plans，因为只有该入口会触发 Skill admission、工具预算和模型规划。
        target-paths:
          - /api/agent/plans
        # 当前租户套餐默认值。后续应由 permission-admin 或租户中心返回真实套餐事实。
        default-tenant-plan-code: ${DATASMART_GATEWAY_DEFAULT_TENANT_PLAN_CODE:STANDARD}
        # 当前 workspace 风险默认值。后续应由 workspace 风险评估、数据分类分级或人工标记返回真实值。
        default-workspace-risk-level: ${DATASMART_GATEWAY_DEFAULT_WORKSPACE_RISK_LEVEL:NORMAL}
        # 工具预算策略版本默认值。策略变化时应改变该值或通过权限策略事件主动失效缓存。
        default-tool-budget-policy-version: ${DATASMART_GATEWAY_DEFAULT_TOOL_BUDGET_POLICY_VERSION:gateway-default-v1}
      tool-policy-envelope:
        # Agent 工具治理策略信封。
        #
        # 它会写入 X-DataSmart-Tool-Policy-Envelope，并由后续 python-runtime-signature 一起签名。
        # Python Runtime 验签后会把其中的 toolCallBudget 与 toolExecutionReadinessPolicy 注入
        # trustedControlPlane，避免预算 provider 与 readiness provider 在同一 /agent/plans 请求中重复回源。
        #
        # 安全边界：
        # - 只允许低敏策略摘要进入 Header；
        # - 不允许 prompt、SQL、工具参数值、样本数据、模型输出、凭证、内部 endpoint 或 artifact 正文；
        # - Header 大小默认限制 4KB，和 Python Runtime 解析上限保持一致。
        enabled: ${DATASMART_GATEWAY_TOOL_POLICY_ENVELOPE_ENABLED:true}
        target-paths:
          - /api/agent/plans
        # 本地默认不强依赖 permission-admin，方便只启动 gateway/Python Runtime 学习联调。
        # 生产或集成环境建议打开，让 gateway 使用 Java 控制面真实策略生成 envelope。
        remote-evaluation-enabled: ${DATASMART_GATEWAY_TOOL_POLICY_ENVELOPE_REMOTE_ENABLED:false}
        permission-admin-evaluate-url: ${DATASMART_GATEWAY_TOOL_POLICY_ENVELOPE_EVALUATE_URL:http://localhost:8085/permissions/agent/tool-budget-policies/evaluate}
        timeout: ${DATASMART_GATEWAY_TOOL_POLICY_ENVELOPE_TIMEOUT:500ms}
        # true：远程异常时回退 gateway 本地保守策略；false：远程异常时拒绝本次 Agent 规划请求。
        # 生产强治理环境可以设置为 false，避免策略中心不可用时继续放行。
        fail-open-on-remote-error: ${DATASMART_GATEWAY_TOOL_POLICY_ENVELOPE_FAIL_OPEN_ON_ERROR:true}
        max-header-bytes: ${DATASMART_GATEWAY_TOOL_POLICY_ENVELOPE_MAX_HEADER_BYTES:4096}
        default-worker-backlog-level: ${DATASMART_GATEWAY_DEFAULT_WORKER_BACKLOG_LEVEL:NORMAL}
        default-requested-tool-risk-level: ${DATASMART_GATEWAY_DEFAULT_REQUESTED_TOOL_RISK_LEVEL:LOW}
        default-max-proposed-tool-calls: ${DATASMART_GATEWAY_DEFAULT_MAX_PROPOSED_TOOL_CALLS:5}
        default-max-auto-executable-tool-calls: ${DATASMART_GATEWAY_DEFAULT_MAX_AUTO_EXECUTABLE_TOOL_CALLS:2}
        default-max-high-risk-tool-calls: ${DATASMART_GATEWAY_DEFAULT_MAX_HIGH_RISK_TOOL_CALLS:0}
        default-max-single-arguments-bytes: ${DATASMART_GATEWAY_DEFAULT_MAX_SINGLE_ARGUMENT_BYTES:16384}
        default-max-total-arguments-bytes: ${DATASMART_GATEWAY_DEFAULT_MAX_TOTAL_ARGUMENT_BYTES:48000}
      python-runtime-signature:
        # gateway -> Python AI Runtime 的内部签名开关。
        #
        # 为什么不默认开启：
        # 1. 当前仓库仍支持“只启动 Python Runtime 做学习/单测/离线规划”的模式；
        # 2. 如果默认开启但没有配置密钥，gateway 会失败关闭，可能让本地新同学误以为路由或模型服务坏了；
        # 3. 因此本地默认 false，生产或集成环境应显式打开，并在 Python Runtime 同步配置强制验签。
        #
        # 推荐生产组合：
        # - DATASMART_GATEWAY_PYTHON_RUNTIME_SIGNATURE_ENABLED=true
        # - DATASMART_GATEWAY_PYTHON_RUNTIME_SIGNATURE_SECRET=<从 Secret Manager 注入的强随机密钥>
        # - Python Runtime 同步设置 DATASMART_GATEWAY_SIGNATURE_REQUIRED=true
        # - Python Runtime 同步设置 DATASMART_GATEWAY_SIGNATURE_SECRET=<同一把密钥>
        enabled: ${DATASMART_GATEWAY_PYTHON_RUNTIME_SIGNATURE_ENABLED:false}
        # HMAC-SHA256 共享密钥，严禁写入 Git。
        # 该值必须通过环境变量、Kubernetes Secret、Docker secret 或云厂商 Secret Manager 注入。
        # 开启 enabled 但 secret 为空时，过滤器会失败关闭，避免“安全开关已开但实际没有签名”的误判。
        secret: ${DATASMART_GATEWAY_PYTHON_RUNTIME_SIGNATURE_SECRET:}
        # 密钥标识不是秘密，用于灰度轮换和排障。
        # 后续可以扩展为 current/previous 双 key，让 gateway 与 Python Runtime 在滚动升级期间同时接受两把密钥。
        key-id: ${DATASMART_GATEWAY_PYTHON_RUNTIME_SIGNATURE_KEY_ID:gateway-local-v1}
        # 需要签名保护的 gateway 原始路径。
        # 当前先保护 /api/agent/plans，因为它会把租户、操作者、角色、workspace、数据范围等 Header
        # 变成 Python Runtime 内部的 trustedControlPlane。后续如果 replay/control/WebSocket 也开始消费高敏
        # 控制面事实，应继续把这些路径加入列表，而不是只依赖 source-service 自报。
        target-paths:
          - /api/agent/plans
    authentication-center:
      # 网关认证中心门面开关。
      #
      # 当前阶段它不是自研用户中心，而是 OIDC/JWT 认证能力的统一收口：
      # - /auth/capabilities 用于说明当前认证模式和生产替代建议；
      # - /auth/session 用于查看 gateway 当前把请求解析成哪个平台身份；
      #
      # 生产建议：
      # 1. 使用 Keycloak/OIDC/企业 IdP 负责登录、MFA、SSO、token 签发和 refresh token 轮换；
      # 2. gateway 只验证 access token，并把已验证 claim 映射为 X-DataSmart-*；
      # 3. 继续让 permission-admin 负责“能不能访问”的授权判断。
      enabled: ${DATASMART_GATEWAY_AUTH_CENTER_ENABLED:true}
      # 当前认证提供方模式。OIDC_RESOURCE_SERVER 表示 gateway 作为资源服务器校验 Bearer JWT。
      provider-mode: ${DATASMART_GATEWAY_AUTH_CENTER_PROVIDER_MODE:OIDC_RESOURCE_SERVER}
      # 认证中心对外展示的 issuer 标识，应与 spring.security.oauth2.resourceserver.jwt.issuer-uri 保持一致。
      issuer: ${DATASMART_GATEWAY_AUTH_CENTER_ISSUER:${DATASMART_GATEWAY_OIDC_ISSUER_URI:http://localhost:18080/realms/datasmart}}
      oidc:
        # 是否启用 OIDC/JWT 认证和 claim 到平台上下文 Header 的映射。
        enabled: ${DATASMART_GATEWAY_OIDC_ENABLED:true}
        # JWT 公钥集合地址。它和 issuer 分离，是为了支持“外部 issuer + 内部 JWKS 地址”的部署模式：
        # - issuer 仍用于校验 token 的 iss，代表安全语义；
        # - jwk-set-uri 只用于 gateway 拉取验签公钥，代表网络寻址语义；
        # - 本地全容器 E2E 中，token issuer 是宿主机可访问的 localhost，但 gateway 容器需要通过 keycloak 服务名取公钥。
        # 生产环境如果 gateway 可以直接访问 issuer discovery，可以留空该字段。
        jwk-set-uri: ${DATASMART_GATEWAY_OIDC_JWK_SET_URI:}
        # JWT 通过签名校验但缺少 DataSmart 必需 claim 时是否失败关闭。
        # 生产必须 true，避免请求退化成匿名租户或默认角色继续进入业务系统。
        fail-closed-on-missing-required-claims: ${DATASMART_GATEWAY_OIDC_FAIL_CLOSED_ON_MISSING_CLAIMS:true}
        # 是否校验 JWT audience。
        # 生产必须启用。issuer 只能证明 token 来自可信 IdP，audience 才能证明 token 是签发给 DataSmart gateway 的。
        audience-validation-enabled: ${DATASMART_GATEWAY_OIDC_AUDIENCE_VALIDATION_ENABLED:true}
        # gateway 接受的资源 audience。
        # Keycloak 推荐通过 Audience Mapper 把 datasmart-gateway 写入 access token 的 aud；
        # 企业 IdP 中通常对应 API Identifier / Resource Server Identifier / Application ID URI。
        required-audiences:
          - ${DATASMART_GATEWAY_OIDC_REQUIRED_AUDIENCE:datasmart-gateway}
        # 租户 ID claim。Keycloak 可通过 Client Scope Mapper 添加该自定义 claim。
        tenant-id-claim: ${DATASMART_GATEWAY_OIDC_TENANT_ID_CLAIM:datasmart_tenant_id}
        # 操作者数字 ID claim。当前 Java 控制面仍使用 Long actorId，因此不直接使用标准 sub。
        actor-id-claim: ${DATASMART_GATEWAY_OIDC_ACTOR_ID_CLAIM:datasmart_actor_id}
        # 单角色 claim，优先级高于 roles 数组和 Keycloak realm_access.roles。
        actor-role-claim: ${DATASMART_GATEWAY_OIDC_ACTOR_ROLE_CLAIM:datasmart_actor_role}
        # 操作者类型 claim：USER、SERVICE_ACCOUNT、AGENT、SYSTEM_SCHEDULER。
        actor-type-claim: ${DATASMART_GATEWAY_OIDC_ACTOR_TYPE_CLAIM:datasmart_actor_type}
        # 工作空间 claim，用于 Agent 工作区、任务隔离和资产目录边界。
        workspace-id-claim: ${DATASMART_GATEWAY_OIDC_WORKSPACE_ID_CLAIM:datasmart_workspace_id}
        # 角色数组 claim。如果 actor-role-claim 不存在，则从这里选择第一个平台认可的角色。
        roles-claim: ${DATASMART_GATEWAY_OIDC_ROLES_CLAIM:datasmart_roles}
        # Keycloak 默认角色结构兼容：realm_access.roles。
        keycloak-realm-access-claim: ${DATASMART_GATEWAY_OIDC_KEYCLOAK_REALM_ACCESS_CLAIM:realm_access}
        keycloak-roles-field: ${DATASMART_GATEWAY_OIDC_KEYCLOAK_ROLES_FIELD:roles}
        default-actor-type: ${DATASMART_GATEWAY_OIDC_DEFAULT_ACTOR_TYPE:USER}
        default-workspace-id: ${DATASMART_GATEWAY_OIDC_DEFAULT_WORKSPACE_ID:default}
        allowed-roles:
          - ORDINARY_USER
          - PROJECT_OWNER
          - OPERATOR
          - AUDITOR
          - TENANT_ADMINISTRATOR
          - PLATFORM_ADMINISTRATOR
          - SERVICE_ACCOUNT
        role-prefixes-to-strip:
          - ROLE_
          - DATASMART_
    development-identity:
      # 开发期身份注入默认关闭。它只用于本地联调和测试环境模拟用户身份，不是生产认证方案。
      # 为什么需要它：permission-admin 已经开始参与权限判定，但真实 JWT/IdP 还没有完整接入；
      # 如果没有一个受控的身份输入方式，网关只能长期使用默认匿名/普通用户身份，无法验证多角色、多租户、服务账号等策略。
      enabled: false
      # 是否允许从 Authorization: Bearer dev:... 中读取开发令牌。
      # 注意：只有带 dev: 前缀的 Bearer Token 才会被解析，真实 JWT 不会被当作开发身份处理。
      allow-authorization-bearer-token: true
      # 专用开发身份 Header。它优先于 Authorization，适合 curl/Postman/自动化测试快速切换身份。
      # 示例：X-DataSmart-Dev-Identity: dev:1:1001:PLATFORM_ADMINISTRATOR:USER:global
      identity-header: X-DataSmart-Dev-Identity
      # 开发令牌格式：dev:{tenantId}:{actorId}:{actorRole}[:actorType][:workspaceId]
      # 示例1：dev:1:1001:ORDINARY_USER
      # 示例2：dev:1:9001:PLATFORM_ADMINISTRATOR:USER:global
      # 示例3：dev:1:7001:SERVICE_ACCOUNT:SERVICE_ACCOUNT:sync-executor
      token-prefix: "dev:"
      # 令牌格式错误时建议直接返回 401，避免请求悄悄退化成默认身份，导致排查权限问题时产生误判。
      reject-malformed-identity: true
      # 没有显式传 actorType 时默认模拟人类用户；模拟执行器、调度器、Agent 时请在令牌中显式传入。
      default-actor-type: USER
      # 工作区是后续 Agent Runtime、任务执行隔离、资产目录隔离的关键上下文；当前先保留默认值。
      default-workspace-id: default
      # 允许开发期模拟的角色白名单。这里与 permission-admin 的推荐角色编码保持一致，但不形成编译期依赖。
      allowed-roles:
        - ORDINARY_USER
        - PROJECT_OWNER
        - OPERATOR
        - AUDITOR
        - TENANT_ADMINISTRATOR
        - PLATFORM_ADMINISTRATOR
        - SERVICE_ACCOUNT
    authorization:
      # 是否启用 gateway 调用 permission-admin 做路由级授权判定。
      # 当前默认 false，是为了保证本地只启动单个业务模块时仍然可以联调。
      # 当 permission-admin、MySQL、Nacos 都能稳定启动后，可以改为 true，进入真实授权链路。
      enabled: false
      # 影子模式：调用权限中心并记录允许/拒绝结果，但不真正拦截请求。
      # 推荐从 false->true 的强制拦截之前，先使用影子模式观察一段时间，确认权限矩阵不会误杀正常流量。
      shadow-mode: true
      # 权限中心不可用时是否继续放行。
      # 开发环境可以 true；生产环境建议 false，否则权限中心故障时可能扩大越权风险。
      fail-open-on-error: true
      # 权限中心判定接口。
      # 当前使用本地直连地址，后续可演进为 lb://permission-admin/permissions/evaluate 或带负载均衡的 WebClient。
      decision-endpoint: http://localhost:8085/permissions/evaluate
      # 网关处于请求关键路径，不能无限等待权限中心；该超时既保护网关，也倒逼权限中心做缓存和性能优化。
      timeout: 500ms
      # JWT/IdP 还未接入时的开发期默认角色。生产环境应通过认证过滤器写入 X-DataSmart-Actor-Role。
      default-actor-role: ORDINARY_USER
      # 未携带租户上下文时的默认租户。0 表示使用平台默认策略，不代表真实业务租户。
      default-tenant-id: 0
      # 未携带操作者 ID 时使用 0，表示“当前无法追溯到具体人”。生产环境应尽量避免长期出现该值。
      anonymous-actor-id: 0
      # 跳过授权判定的公开路径。健康检查和网关契约说明不应依赖权限中心，否则权限中心故障时也无法排查。
      public-path-patterns:
        - /actuator/**
        - /gateway/contracts/**
        - /auth/**
        - /api/auth/**
      cache:
        # 是否启用网关本地授权判定缓存。
        # 当前默认 false：因为权限矩阵、路由策略和身份来源仍在建设期，过早缓存会影响调试和策略一致性。
        # 当 permission-admin 策略稳定、缓存失效机制可用后，可以逐步开启以降低远程授权调用压力。
        enabled: false
        # 影子模式下默认不缓存。影子模式的价值是观察真实流量下 permission-admin 的判定和审计；
        # 如果缓存命中后不再回源权限中心，观察样本会减少，不利于灰度验证权限矩阵。
        cache-shadow-mode-decisions: false
        # 是否缓存拒绝结果。缓存拒绝可以降低恶意探测压力，但 TTL 必须短，避免刚授权后仍被旧拒绝影响太久。
        cache-denied-decisions: true
        # 需要审批的判定通常代表高风险动作，例如导出、权限变更、强制终止任务；默认不缓存，优先保证实时审计。
        cache-approval-required-decisions: false
        # 允许结果 TTL。商业目标可向“本地缓存 P95 < 20ms，远程权限中心 P95 < 80ms”推进。
        allow-ttl: 30s
        # 拒绝结果 TTL。默认明显短于允许结果，减少权限变更后的旧拒绝影响窗口。
        deny-ttl: 5s
        # 本地缓存最大条目数，防止恶意构造大量不同路径、租户或身份导致网关内存不可控。
        max-entries: 10000
        management-endpoint:
          # 本地缓存管理端点默认关闭。打开后会暴露 /gateway/authorization/cache，
          # 用于查询缓存快照、全量清理、按租户清理；生产环境应优先使用正式管理员权限或服务账号签名。
          enabled: false
          # 临时管理 Header 名称。当前阶段用于保护缓存管理端点，后续应替换为 JWT 管理员权限或服务账号签名。
          token-header-name: X-DataSmart-Gateway-Admin-Token
          # 默认留空；只要为空，即使端点被误开启，也会拒绝所有管理请求。
          token: ""
      policy-events:
        # 是否消费 permission-admin 发布的权限策略变更事件。
        # 默认关闭：避免本地没有 Kafka 时 gateway 启动失败或不断重连。
        # 开启后，gateway 会监听 topic 中的策略变更事件，并清理本地授权判定缓存。
        enabled: false
        # 权限策略变更事件 Topic，需要与 permission-admin 的 datasmart.permission.policy-events.topic 保持一致。
        topic: datasmart.permission.policy.changed
        # 消费者组 ID。
        # 注意：生产多 gateway 实例如果使用同一个 groupId，Kafka 只会让部分实例收到消息；
        # 而本地缓存失效需要所有实例都收到。生产应使用实例级 groupId，或改为 Redis/共享缓存。
        group-id: datasmart-gateway-permission-policy-cache-invalidator
      # 路由授权元数据：把“某个路径属于哪类资源、HTTP 方法默认对应什么业务动作”配置化。
      # 这一步是为了摆脱过滤器代码里的硬编码推断，让后续新增 data-asset、compliance-masking、agent-runtime 等模块时，
      # 只需要补配置或未来从 permission-admin 拉取元数据，而不是频繁修改网关核心过滤器。
      #
      # 当前仍是“模块前缀级”基线，不是最终的端点级权限模型。
      # 未来更细的规则可以放在列表更靠前的位置，例如：
      # - path-pattern: /api/task/*/retry
      #   resource-type: TASK
      #   default-action: RETRY
      #
      # 配置含义：
      # path-pattern：支持完全匹配和 /** 后缀通配；越具体的规则越应该放前面。
      # resource-type：传给 permission-admin 的资源类型，用于路由策略、数据范围和审计归类。
      # default-action：当 method-actions 没有命中时的兜底动作。
      # method-actions：HTTP 方法到平台动作的映射，当前先采用通用 REST 语义。
      route-metadata:
        - path-pattern: /api/datasource/datasources/*/authorizations
          resource-type: DATASOURCE
          default-action: ASSIGN
          description: 数据源实例授权清单与授权创建入口；GET/POST 都属于授权关系治理，不应退化为普通数据源查看或创建。
          method-actions:
            GET: ASSIGN
            POST: ASSIGN

        - path-pattern: /api/datasource/datasources/*/authorizations/*
          resource-type: DATASOURCE
          default-action: ASSIGN
          description: 数据源实例授权撤销入口；撤销授权会改变其他用户或服务账号能否使用该连接，因此按 ASSIGN 高风险动作治理。
          method-actions:
            DELETE: ASSIGN

        - path-pattern: /api/datasource/**
          resource-type: DATASOURCE
          default-action: EXECUTE
          description: 数据源、连接器、元数据与同步控制面。
          method-actions:
            GET: VIEW
            POST: CREATE
            PUT: UPDATE
            PATCH: UPDATE
            DELETE: DELETE

        # data-sync 的端点需要比普通模块更细，因为同一微服务内同时包含：
        # 模板配置、任务运行、执行器租约、执行器回调、事故工作台和人工介入运营动作。
        # 这些动作的调用主体、风险等级、审计要求和未来审批策略都不一样。
        - path-pattern: /api/sync/internal/sync-workers/run-once
          resource-type: SYNC_EXECUTION
          default-action: CLAIM
          description: data-sync 本地/受控 worker-loop 单次执行入口；只能由服务账号调用，用于 E2E、补偿或受控执行器认领并处理 execution。
          method-actions:
            POST: CLAIM

        - path-pattern: /api/sync/internal/sync-task-schedulers/dispatch-due
          resource-type: SYNC_TASK
          default-action: SCHEDULE_DISPATCH
          description: data-sync 任务级调度器到期派发入口；只能由服务账号或未来受控调度器调用，把 SCHEDULED 任务转换为 execution。
          method-actions:
            POST: SCHEDULE_DISPATCH

        - path-pattern: /api/sync/sync-templates/*/validate
          resource-type: SYNC_TEMPLATE
          default-action: VALIDATE
          description: data-sync 同步模板校验接口，用于检查源端、目标端、字段映射和写入策略是否可运行。
          method-actions:
            POST: VALIDATE

        - path-pattern: /api/sync/sync-templates/*/offline-job-plan
          resource-type: SYNC_TEMPLATE
          default-action: VIEW
          description: data-sync 同步模板离线作业计划接口，只返回低敏 Reader/Writer、调度、checkpoint 和审批规划，不触发真实执行。
          method-actions:
            POST: VIEW

        - path-pattern: /api/sync/sync-tasks/export
          resource-type: SYNC_TASK
          default-action: EXPORT
          description: data-sync 同步任务定义导出接口，下载低敏 CSV/XLSX 任务定义包，不包含连接串、密码、SQL 正文或样本数据。
          method-actions:
            GET: EXPORT

        - path-pattern: /api/sync/sync-tasks/import
          resource-type: SYNC_TASK
          default-action: IMPORT
          description: data-sync 同步任务定义导入接口，支持 dry-run、冲突检测、导入为 DRAFT 或立即创建 MANUAL execution。
          method-actions:
            POST: IMPORT

        - path-pattern: /api/sync/sync-tasks/batch/export
          resource-type: SYNC_TASK
          default-action: BATCH_EXPORT
          description: data-sync 同步任务按选中 ID 批量导出接口，下载低敏 CSV/XLSX 任务定义包，不包含连接串、密码、SQL 正文或样本数据。
          method-actions:
            POST: BATCH_EXPORT

        - path-pattern: /api/sync/sync-tasks/batch/import
          resource-type: SYNC_TASK
          default-action: BATCH_IMPORT
          description: data-sync 同步任务批量导入语义入口，复用 CSV/XLSX 多行导入、dry-run、冲突检测和导入后立即执行规则。
          method-actions:
            POST: BATCH_IMPORT

        - path-pattern: /api/sync/sync-tasks/batch/manual-dispatch
          resource-type: SYNC_TASK
          default-action: BATCH_MANUAL_DISPATCH
          description: data-sync 同步任务批量手工调度接口，逐个任务创建 MANUAL execution 并返回逐条结果。
          method-actions:
            POST: BATCH_MANUAL_DISPATCH

        - path-pattern: /api/sync/sync-tasks/batch/offline
          resource-type: SYNC_TASK
          default-action: BATCH_OFFLINE
          description: data-sync 同步任务批量下线接口，逐个关闭自动调度并清空 nextFireTime，是批量删除前置动作。
          method-actions:
            POST: BATCH_OFFLINE

        - path-pattern: /api/sync/sync-tasks/batch/recycle
          resource-type: SYNC_TASK
          default-action: BATCH_RECYCLE
          description: data-sync 同步任务批量移入回收站接口，仅允许已下线任务进入 RECYCLED。
          method-actions:
            POST: BATCH_RECYCLE

        - path-pattern: /api/sync/sync-tasks/batch/hard-delete
          resource-type: SYNC_TASK
          default-action: BATCH_HARD_DELETE
          description: data-sync 同步任务批量彻底删除接口，当前为逻辑 DELETED 并保留历史审计证据。
          method-actions:
            POST: BATCH_HARD_DELETE

        - path-pattern: /api/sync/sync-tasks/recycle-bin
          resource-type: SYNC_TASK
          default-action: VIEW_RECYCLE_BIN
          description: data-sync 同步任务回收站列表接口，只展示已进入 RECYCLED 的任务，用于查看、克隆或彻底删除前复核。
          method-actions:
            GET: VIEW_RECYCLE_BIN

        - path-pattern: /api/sync/sync-tasks/groups
          resource-type: SYNC_TASK_GROUP
          default-action: LIST_GROUPS
          description: data-sync 同步任务分组汇总与创建入口；GET 返回低敏分组计数，POST 创建正式分组资源。该规则必须放在 /api/sync/sync-tasks/* 前面，避免分组菜单接口被单任务详情通配路由抢先命中。
          method-actions:
            GET: LIST_GROUPS
            POST: CREATE_GROUP

        - path-pattern: /api/sync/sync-tasks/groups/tree
          resource-type: SYNC_TASK_GROUP
          default-action: LIST_GROUP_TREE
          description: data-sync 同步任务分组树入口，服务前端左侧导航栏和内容页中间分组菜单栏，返回多级父子结构、默认分组标记和任务计数。
          method-actions:
            GET: LIST_GROUP_TREE

        - path-pattern: /api/sync/sync-tasks/groups/*
          resource-type: SYNC_TASK_GROUP
          default-action: DELETE_GROUP
          description: data-sync 同步任务分组删除入口；删除普通分组会把任务迁回 DEFAULT/默认分组，属于高影响管理动作，必须独立授权。
          method-actions:
            DELETE: DELETE_GROUP

        - path-pattern: /api/sync/sync-tasks/metadata/objects/discover
          resource-type: SYNC_TASK_METADATA
          default-action: DISCOVER_METADATA
          description: data-sync 创建同步任务阶段的低敏元数据发现入口；通过 datasource-management 获取 schema/table/field 摘要，不返回样本数据、凭据或连接串。
          method-actions:
            POST: DISCOVER_METADATA

        - path-pattern: /api/sync/sync-tasks/create-wizard/metadata/objects/discover
          resource-type: SYNC_TASK_METADATA
          default-action: DISCOVER_METADATA
          description: data-sync 创建向导低敏元数据发现别名；语义必须与正式 metadata 路径一致，避免别名落入 /api/sync/** 兜底权限后绕过 SYNC_TASK_METADATA 数据范围策略。
          method-actions:
