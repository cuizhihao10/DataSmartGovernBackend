        # data-quality 权限闭环：
        # 这里不要把整个 /api/quality/** 都压成 QUALITY_RULE。质量模块已经包含“规则配置、治理总览、
        # 报告证据、异常工作台、执行器回调/诊断”等不同风险等级的入口，真实商业化权限矩阵必须能区分：
        # 1. 普通用户/审计员可以看低敏治理态势，不等于能改规则；
        # 2. 项目负责人可以管理项目质量规则，不等于能伪造 worker 回调；
        # 3. 运营人员可以诊断执行器与触发运行，不等于能查看或导出未来可能出现的高敏样本；
        # 4. SERVICE_ACCOUNT 可以调用机器协议，但不能自动获得人类管理页面权限。
        # GatewayAuthorizationFilter 会按声明顺序命中第一条规则，所以具体端点必须放在兜底规则前面。
        - path-pattern: /api/quality/quality-rules/governance/overview
          resource-type: QUALITY_GOVERNANCE
          default-action: VIEW
          description: 数据质量治理总览低敏聚合入口，用于查看项目/工作空间级规则、报告、异常和执行态势。
          method-actions:
            GET: VIEW

        - path-pattern: /api/quality/quality-rules/remediation-tasks
          resource-type: QUALITY_ANOMALY
          default-action: CREATE_REMEDIATION_TASK
          description: 质量异常治理任务创建入口，用于把低敏异常聚合转成 task-management 治理或复核任务；它是异常处置动作，不是质量规则创建。
          method-actions:
            POST: CREATE_REMEDIATION_TASK

        - path-pattern: /api/quality/quality-rules/reports/*/anomalies
          resource-type: QUALITY_ANOMALY
          default-action: VIEW
          description: 按报告查看质量异常入口，异常比报告摘要更接近业务问题定位，因此单独授权。
          method-actions:
            GET: VIEW

        - path-pattern: /api/quality/quality-rules/anomalies/**
          resource-type: QUALITY_ANOMALY
          default-action: VIEW
          description: 质量异常工作台入口，用于异常聚合、异常列表和后续清洗任务线索查看。
          method-actions:
            GET: VIEW

        - path-pattern: /api/quality/quality-rules/reports/**
