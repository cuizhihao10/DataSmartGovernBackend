# Gateway 是当前阶段的统一外部入口，
# 因而这个配置文件本质上就是平台公开路由契约的一部分。
server:
  port: 8080

spring:
  application:
    name: datasmart-govern-gateway
  profiles:
    active: dev
  cloud:
    gateway:
      # 路由显式声明出来，更适合作为学习资料。
      # 只看配置也能直接理解“哪个前缀转到哪个模块”。
      routes:
        - id: task-management
          uri: lb://task-management
          predicates:
            - Path=/api/task/**
          filters:
            # 外部统一暴露 /api/task/**，下游 task-management 仍保持 /tasks、/tasks/operations 等模块内路径。
            # 通过 RewritePath 统一剥离网关前缀，可以让网关契约和服务内部控制器职责解耦。
            - RewritePath=/api/task/(?<segment>.*), /$\{segment}
        - id: permission-admin
          uri: lb://permission-admin
          predicates:
            - Path=/api/permission/**
          filters:
            # permission-admin 内部主路径是 /permissions/**。
            # 当前 Controller 同时兼容 /api/permission/**，但网关侧仍推荐显式改写，避免下游长期感知外部 API 前缀。
            - RewritePath=/api/permission/(?<segment>.*), /permissions/$\{segment}
        - id: datasource-management
          uri: lb://datasource-management
          predicates:
            - Path=/api/datasource/**
          filters:
            # datasource-management 内部保留 /datasources、/sync/templates 等领域路径。
            - RewritePath=/api/datasource/(?<segment>.*), /$\{segment}
        - id: data-sync
          uri: lb://data-sync
          predicates:
            - Path=/api/sync/**
          filters:
            # data-sync 是独立微服务，内部 Controller 使用 /sync-tasks、/sync-templates、/sync-incidents 等路径。
            # 外部 /api/sync/** 只属于网关公开契约，转发前必须去掉该前缀，否则请求会到达服务但无法命中 Controller。
            - RewritePath=/api/sync/(?<segment>.*), /$\{segment}
        - id: data-quality
          uri: lb://data-quality
          predicates:
            - Path=/api/quality/**
          filters:
            # data-quality 内部保持 /quality-rules/**，网关统一暴露 /api/quality/**。
            - RewritePath=/api/quality/(?<segment>.*), /$\{segment}
        - id: python-ai-runtime-events-ws
          # Python AI Runtime 的实时事件 WebSocket 桥接路由。
          # 设计意图：
          # 1. 前端只访问 Java gateway 暴露的 /api/agent/events/ws，不直接感知 Python Runtime 地址；
          # 2. Gateway 原生 WebSocket Routing Filter 会根据 ws:// scheme 处理 Upgrade 转发，不需要我们手写 socket 代理；
          # 3. 默认端口使用 8090，避免和 docker-compose 中 Chroma 的 8000 端口冲突；
          # 4. 后续生产环境可以通过 DATASMART_PYTHON_AI_RUNTIME_WS_URI 切换为 wss://、内网域名或服务发现地址。
          uri: ${DATASMART_PYTHON_AI_RUNTIME_WS_URI:ws://localhost:8090}
          predicates:
            - Path=/api/agent/events/ws
          filters:
            # Python FastAPI 内部路由是 /agent/events/ws，外部网关路径仍归入 /api/agent/** 产品入口。
            - RewritePath=/api/agent/events/ws, /agent/events/ws
        - id: python-ai-runtime-agent-plans
          # Agent 规划入口由 Python AI Runtime 承担，而不是由 Java agent-runtime 直接生成模型计划。
          # 该路由必须放在通用 /api/agent/** 路由之前，否则请求会先被更宽泛的规则转发给 Java 控制面。
          # gateway 过滤器会在转发前清理外部伪造的 X-DataSmart-*，再写入已认证或开发期受控身份上下文。
          # Python API 边界随后只根据这些 Header 重建 trustedControlPlane，拒绝相信请求体自报的可信事实。
          uri: ${DATASMART_PYTHON_AI_RUNTIME_URI:http://localhost:8090}
          predicates:
            - Path=/api/agent/plans
          filters:
            - RewritePath=/api/agent/plans, /agent/plans
        - id: agent-runtime
          uri: lb://agent-runtime
          predicates:
            - Path=/api/agent/**
          filters:
            # agent-runtime 内部使用 /agent-runtime/** 表达“AI 控制面”领域路径。
            # 外部统一使用 /api/agent/**，便于前端和未来智能网关把 Agent 能力视为平台级入口。
            - RewritePath=/api/agent/(?<segment>.*), /agent-runtime/$\{segment}
        - id: observability
          uri: lb://observability
          predicates:
            - Path=/api/observability/**
      discovery:
        locator:
          # 打开服务发现定位器，便于后续按服务名动态发现下游服务。
          enabled: true
  kafka:
    # Kafka 预留给网关侧事件采集、审计打点或限流扩展。
    bootstrap-servers: localhost:9092
  redis:
    # Redis 后续可用于网关级限流、会话态和热点控制。
    host: localhost
    port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          # 认证服务虽然尚未完整落地，但先把 issuer 契约写清楚，
          # 后续接入统一安全体系时更稳。
          issuer-uri: http://localhost:8080/auth/realms/datasmart

datasmart:
  gateway:
    agent-events:
      websocket:
        # Agent 实时事件 WebSocket 入口治理开关。
        # 该能力只保护 /api/agent/events/ws 长连接入口，不影响普通 REST API。
        # 商业化场景里，WebSocket 连接会持续占用 gateway、Python Runtime、事件 outbox 与前端订阅资源，
        # 因此即使权限中心允许订阅，也仍然需要在网关层先做粗粒度容量保护。
        enabled: true
        # 网关对外暴露的 Agent 实时事件路径。
        # 这里必须与 spring.cloud.gateway.routes 中的 python-ai-runtime-events-ws 路由保持一致。
        # 后续如果拆出审计员事件流、运营大屏事件流或移动端轻量事件流，可以把该配置演进为列表。
        path: /api/agent/events/ws
        # 是否要求请求携带 WebSocket Upgrade 握手头。
        # 普通 HTTP GET 误打到该路径时，如果继续转发给 Python Runtime，调用方会得到不清晰的下游协议错误；
        # 在 gateway 早期返回 400 能让前端、测试脚本和运维排障更容易定位问题。
        require-upgrade-header: true
        # 单个 gateway 实例允许的最大活跃 Agent 事件连接数。
        # 当前是单实例内存计数，不代表全局集群配额；多 gateway 实例生产部署时应升级为 Redis 租约或统一限流中心。
        max-active-connections: 500
        # 单个租户在当前 gateway 实例上的最大活跃连接数。
        # 该值用于避免单个租户或异常客户脚本把共享实时事件入口占满，后续可以按租户套餐、项目规模或 SLA 动态配置。
        max-connections-per-tenant: 100
        # 单个操作者在当前 gateway 实例上的最大活跃连接数。
        # 该值主要防浏览器多标签页、前端重连 bug、脚本化压测或服务账号异常重试造成的连接风暴。
        max-connections-per-actor: 8
        # 触发配额限制时返回给客户端的 Retry-After 秒数。
        # 前端 WebSocket SDK 应读取该值并采用退避重连，避免 429 后立即重试进一步放大故障。
        retry-after-seconds: 5
    context:
      # 是否信任外部请求传入的 X-DataSmart-Tenant-Id、X-DataSmart-Actor-Id、X-DataSmart-Actor-Role 等身份上下文。
      # 默认必须为 false，因为这些字段会直接影响后续权限、审计和租户边界；如果客户端可以随便伪造，就会产生越权风险。
      # 本地联调或前置企业网关已经完成认证时，可以临时打开；生产环境更推荐由 JWT 解析过滤器写入这些 Header。
      trust-incoming-platform-context: false
      # 下游服务通过该字段知道请求来自统一网关，便于审计、日志排查和后续区分外部网关、内部网关、Agent 网关。
      source-service: datasmart-govern-gateway
      # 当前还未完整接入登录态和多入口识别，因此未知外部请求先标记为 OPEN_API。
      # 后续可扩展为 WEB_UI、SCHEDULER、AGENT_TOOL_CALL、SERVICE_ACCOUNT_CALL 等更细粒度来源。
      default-request-source: OPEN_API
      # 兼容早期过滤器使用的 X-Request-Id。新代码应优先读取 X-DataSmart-Trace-Id。
      legacy-request-id-header: X-Request-Id
      # 迁移期把平台 traceId 同步写回 X-Request-Id，避免旧调试脚本、日志模板或调用方暂时读不到链路 ID。
      mirror-trace-id-to-legacy-request-id: true
      # 这两个 Header 只用于调试和排障，不应该作为权限判断依据。
      route-prefix-header: X-Gateway-Route-Prefix
      original-path-header: X-Gateway-Original-Path
      python-runtime-signature:
        # gateway -> Python AI Runtime 的内部签名开关。
        #
        # 为什么不默认开启：
        # 1. 当前仓库仍支持“只启动 Python Runtime 做学习/单测/离线规划”的模式；
        # 2. 如果默认开启但没有配置密钥，gateway 会失败关闭，可能让本地新同学误以为路由或模型服务坏了；
        # 3. 因此本地默认 false，生产或集成环境应显式打开，并在 Python Runtime 同步配置强制验签。
        #
        # 推荐生产组合：
        # - DATASMART_GATEWAY_PYTHON_RUNTIME_SIGNATURE_ENABLED=true
        # - DATASMART_GATEWAY_PYTHON_RUNTIME_SIGNATURE_SECRET=<从 Secret Manager 注入的强随机密钥>
        # - Python Runtime 同步设置 DATASMART_GATEWAY_SIGNATURE_REQUIRED=true
        # - Python Runtime 同步设置 DATASMART_GATEWAY_SIGNATURE_SECRET=<同一把密钥>
        enabled: ${DATASMART_GATEWAY_PYTHON_RUNTIME_SIGNATURE_ENABLED:false}
        # HMAC-SHA256 共享密钥，严禁写入 Git。
        # 该值必须通过环境变量、Kubernetes Secret、Docker secret 或云厂商 Secret Manager 注入。
        # 开启 enabled 但 secret 为空时，过滤器会失败关闭，避免“安全开关已开但实际没有签名”的误判。
        secret: ${DATASMART_GATEWAY_PYTHON_RUNTIME_SIGNATURE_SECRET:}
        # 密钥标识不是秘密，用于灰度轮换和排障。
        # 后续可以扩展为 current/previous 双 key，让 gateway 与 Python Runtime 在滚动升级期间同时接受两把密钥。
        key-id: ${DATASMART_GATEWAY_PYTHON_RUNTIME_SIGNATURE_KEY_ID:gateway-local-v1}
        # 需要签名保护的 gateway 原始路径。
        # 当前先保护 /api/agent/plans，因为它会把租户、操作者、角色、workspace、数据范围等 Header
        # 变成 Python Runtime 内部的 trustedControlPlane。后续如果 replay/control/WebSocket 也开始消费高敏
        # 控制面事实，应继续把这些路径加入列表，而不是只依赖 source-service 自报。
        target-paths:
          - /api/agent/plans
    development-identity:
      # 开发期身份注入默认关闭。它只用于本地联调和测试环境模拟用户身份，不是生产认证方案。
      # 为什么需要它：permission-admin 已经开始参与权限判定，但真实 JWT/IdP 还没有完整接入；
      # 如果没有一个受控的身份输入方式，网关只能长期使用默认匿名/普通用户身份，无法验证多角色、多租户、服务账号等策略。
      enabled: false
      # 是否允许从 Authorization: Bearer dev:... 中读取开发令牌。
      # 注意：只有带 dev: 前缀的 Bearer Token 才会被解析，真实 JWT 不会被当作开发身份处理。
      allow-authorization-bearer-token: true
      # 专用开发身份 Header。它优先于 Authorization，适合 curl/Postman/自动化测试快速切换身份。
      # 示例：X-DataSmart-Dev-Identity: dev:1:1001:PLATFORM_ADMINISTRATOR:USER:global
      identity-header: X-DataSmart-Dev-Identity
      # 开发令牌格式：dev:{tenantId}:{actorId}:{actorRole}[:actorType][:workspaceId]
      # 示例1：dev:1:1001:ORDINARY_USER
      # 示例2：dev:1:9001:PLATFORM_ADMINISTRATOR:USER:global
      # 示例3：dev:1:7001:SERVICE_ACCOUNT:SERVICE_ACCOUNT:sync-executor
      token-prefix: "dev:"
      # 令牌格式错误时建议直接返回 401，避免请求悄悄退化成默认身份，导致排查权限问题时产生误判。
      reject-malformed-identity: true
      # 没有显式传 actorType 时默认模拟人类用户；模拟执行器、调度器、Agent 时请在令牌中显式传入。
      default-actor-type: USER
      # 工作区是后续 Agent Runtime、任务执行隔离、资产目录隔离的关键上下文；当前先保留默认值。
      default-workspace-id: default
      # 允许开发期模拟的角色白名单。这里与 permission-admin 的推荐角色编码保持一致，但不形成编译期依赖。
      allowed-roles:
        - ORDINARY_USER
        - PROJECT_OWNER
        - OPERATOR
        - AUDITOR
        - TENANT_ADMINISTRATOR
        - PLATFORM_ADMINISTRATOR
        - SERVICE_ACCOUNT
    authorization:
      # 是否启用 gateway 调用 permission-admin 做路由级授权判定。
      # 当前默认 false，是为了保证本地只启动单个业务模块时仍然可以联调。
      # 当 permission-admin、MySQL、Nacos 都能稳定启动后，可以改为 true，进入真实授权链路。
      enabled: false
      # 影子模式：调用权限中心并记录允许/拒绝结果，但不真正拦截请求。
      # 推荐从 false->true 的强制拦截之前，先使用影子模式观察一段时间，确认权限矩阵不会误杀正常流量。
      shadow-mode: true
      # 权限中心不可用时是否继续放行。
      # 开发环境可以 true；生产环境建议 false，否则权限中心故障时可能扩大越权风险。
      fail-open-on-error: true
      # 权限中心判定接口。
      # 当前使用本地直连地址，后续可演进为 lb://permission-admin/permissions/evaluate 或带负载均衡的 WebClient。
      decision-endpoint: http://localhost:8085/permissions/evaluate
      # 网关处于请求关键路径，不能无限等待权限中心；该超时既保护网关，也倒逼权限中心做缓存和性能优化。
      timeout: 500ms
      # JWT/IdP 还未接入时的开发期默认角色。生产环境应通过认证过滤器写入 X-DataSmart-Actor-Role。
      default-actor-role: ORDINARY_USER
      # 未携带租户上下文时的默认租户。0 表示使用平台默认策略，不代表真实业务租户。
      default-tenant-id: 0
      # 未携带操作者 ID 时使用 0，表示“当前无法追溯到具体人”。生产环境应尽量避免长期出现该值。
      anonymous-actor-id: 0
      # 跳过授权判定的公开路径。健康检查和网关契约说明不应依赖权限中心，否则权限中心故障时也无法排查。
      public-path-patterns:
        - /actuator/**
        - /gateway/contracts/**
      cache:
        # 是否启用网关本地授权判定缓存。
        # 当前默认 false：因为权限矩阵、路由策略和身份来源仍在建设期，过早缓存会影响调试和策略一致性。
        # 当 permission-admin 策略稳定、缓存失效机制可用后，可以逐步开启以降低远程授权调用压力。
        enabled: false
        # 影子模式下默认不缓存。影子模式的价值是观察真实流量下 permission-admin 的判定和审计；
        # 如果缓存命中后不再回源权限中心，观察样本会减少，不利于灰度验证权限矩阵。
        cache-shadow-mode-decisions: false
        # 是否缓存拒绝结果。缓存拒绝可以降低恶意探测压力，但 TTL 必须短，避免刚授权后仍被旧拒绝影响太久。
        cache-denied-decisions: true
        # 需要审批的判定通常代表高风险动作，例如导出、权限变更、强制终止任务；默认不缓存，优先保证实时审计。
        cache-approval-required-decisions: false
        # 允许结果 TTL。商业目标可向“本地缓存 P95 < 20ms，远程权限中心 P95 < 80ms”推进。
        allow-ttl: 30s
        # 拒绝结果 TTL。默认明显短于允许结果，减少权限变更后的旧拒绝影响窗口。
        deny-ttl: 5s
        # 本地缓存最大条目数，防止恶意构造大量不同路径、租户或身份导致网关内存不可控。
        max-entries: 10000
        management-endpoint:
          # 本地缓存管理端点默认关闭。打开后会暴露 /gateway/authorization/cache，
          # 用于查询缓存快照、全量清理、按租户清理；生产环境应优先使用正式管理员权限或服务账号签名。
          enabled: false
          # 临时管理 Header 名称。当前阶段用于保护缓存管理端点，后续应替换为 JWT 管理员权限或服务账号签名。
          token-header-name: X-DataSmart-Gateway-Admin-Token
          # 默认留空；只要为空，即使端点被误开启，也会拒绝所有管理请求。
          token: ""
      policy-events:
        # 是否消费 permission-admin 发布的权限策略变更事件。
        # 默认关闭：避免本地没有 Kafka 时 gateway 启动失败或不断重连。
        # 开启后，gateway 会监听 topic 中的策略变更事件，并清理本地授权判定缓存。
        enabled: false
        # 权限策略变更事件 Topic，需要与 permission-admin 的 datasmart.permission.policy-events.topic 保持一致。
        topic: datasmart.permission.policy.changed
        # 消费者组 ID。
        # 注意：生产多 gateway 实例如果使用同一个 groupId，Kafka 只会让部分实例收到消息；
        # 而本地缓存失效需要所有实例都收到。生产应使用实例级 groupId，或改为 Redis/共享缓存。
        group-id: datasmart-gateway-permission-policy-cache-invalidator
      # 路由授权元数据：把“某个路径属于哪类资源、HTTP 方法默认对应什么业务动作”配置化。
      # 这一步是为了摆脱过滤器代码里的硬编码推断，让后续新增 data-asset、compliance-masking、agent-runtime 等模块时，
      # 只需要补配置或未来从 permission-admin 拉取元数据，而不是频繁修改网关核心过滤器。
      #
      # 当前仍是“模块前缀级”基线，不是最终的端点级权限模型。
      # 未来更细的规则可以放在列表更靠前的位置，例如：
      # - path-pattern: /api/task/*/retry
      #   resource-type: TASK
      #   default-action: RETRY
      #
      # 配置含义：
      # path-pattern：支持完全匹配和 /** 后缀通配；越具体的规则越应该放前面。
      # resource-type：传给 permission-admin 的资源类型，用于路由策略、数据范围和审计归类。
      # default-action：当 method-actions 没有命中时的兜底动作。
      # method-actions：HTTP 方法到平台动作的映射，当前先采用通用 REST 语义。
      route-metadata:
        - path-pattern: /api/datasource/**
          resource-type: DATASOURCE
          default-action: EXECUTE
          description: 数据源、连接器、元数据与同步控制面。
          method-actions:
            GET: VIEW
            POST: CREATE
            PUT: UPDATE
            PATCH: UPDATE
            DELETE: DELETE

        # data-sync 的端点需要比普通模块更细，因为同一微服务内同时包含：
        # 模板配置、任务运行、执行器租约、执行器回调、事故工作台和人工介入运营动作。
        # 这些动作的调用主体、风险等级、审计要求和未来审批策略都不一样。
        - path-pattern: /api/sync/sync-templates/*/validate
          resource-type: SYNC_TEMPLATE
          default-action: VALIDATE
          description: data-sync 同步模板校验接口，用于检查源端、目标端、字段映射和写入策略是否可运行。
          method-actions:
            POST: VALIDATE

        - path-pattern: /api/sync/sync-tasks/*/run
          resource-type: SYNC_TASK
          default-action: RUN
          description: data-sync 同步任务手动运行接口，属于显式触发执行动作。
          method-actions:
            POST: RUN

        - path-pattern: /api/sync/sync-tasks/*/executions/*/**
          resource-type: SYNC_EXECUTION
          default-action: CALLBACK
          description: data-sync 执行器回调协议，通常只允许服务账号或受控 worker 调用。
          method-actions:
            POST: CALLBACK

        - path-pattern: /api/sync/sync-tasks/*/attention/acknowledge
          resource-type: SYNC_OPERATION
          default-action: ACKNOWLEDGE
          description: data-sync 人工介入确认接手动作。
          method-actions:
            POST: ACKNOWLEDGE

        - path-pattern: /api/sync/sync-tasks/*/attention/resolve
          resource-type: SYNC_OPERATION
          default-action: RESOLVE
          description: data-sync 人工介入解决动作。
          method-actions:
            POST: RESOLVE

        - path-pattern: /api/sync/sync-tasks/*/attention/rerun
          resource-type: SYNC_OPERATION
          default-action: RETRY
          description: data-sync 人工介入后重跑动作。
          method-actions:
            POST: RETRY

        - path-pattern: /api/sync/sync-tasks/*/attention/cancel
          resource-type: SYNC_OPERATION
          default-action: CANCEL
          description: data-sync 人工介入取消动作。
          method-actions:
            POST: CANCEL

        - path-pattern: /api/sync/sync-tasks/*/attention/archive
          resource-type: SYNC_OPERATION
          default-action: ARCHIVE
          description: data-sync 人工介入归档动作。
          method-actions:
            POST: ARCHIVE

        - path-pattern: /api/sync/sync-tasks/*/attention/incidents
          resource-type: SYNC_OPERATION
          default-action: CREATE
          description: data-sync 人工介入创建事故动作。
          method-actions:
            POST: CREATE

        - path-pattern: /api/sync/sync-tasks/*/attention/**
          resource-type: SYNC_OPERATION
          default-action: EXECUTE
          description: data-sync 人工介入处理动作，包含确认、解决、重跑、取消、归档和创建事故。
          method-actions:
            POST: EXECUTE

        - path-pattern: /api/sync/sync-incidents/*/acknowledge
          resource-type: SYNC_INCIDENT
          default-action: ACKNOWLEDGE
          description: data-sync 事故确认接手动作。
          method-actions:
            POST: ACKNOWLEDGE

        - path-pattern: /api/sync/sync-incidents/*/assign
          resource-type: SYNC_INCIDENT
          default-action: ASSIGN
          description: data-sync 事故分派负责人动作。
          method-actions:
            POST: ASSIGN

        - path-pattern: /api/sync/sync-incidents/*/resolve
          resource-type: SYNC_INCIDENT
          default-action: RESOLVE
          description: data-sync 事故解决动作。
          method-actions:
            POST: RESOLVE

        - path-pattern: /api/sync/sync-incidents/*/close
          resource-type: SYNC_INCIDENT
          default-action: CLOSE
          description: data-sync 事故关闭动作。
          method-actions:
            POST: CLOSE

        - path-pattern: /api/sync/sync-incidents/**
          resource-type: SYNC_INCIDENT
          default-action: EXECUTE
          description: data-sync 事故工作台，支持事故查询、确认、分派、解决和关闭。
          method-actions:
            GET: VIEW
            POST: EXECUTE

        - path-pattern: /api/sync/sync-executions/claim
          resource-type: SYNC_EXECUTION
          default-action: CLAIM
          description: data-sync 执行器认领下一条 execution 的协议入口。
          method-actions:
            POST: CLAIM

        - path-pattern: /api/sync/sync-executions/*/heartbeat
          resource-type: SYNC_EXECUTION
          default-action: HEARTBEAT
          description: data-sync 执行器续租和上报轻量进度的协议入口。
          method-actions:
            POST: HEARTBEAT

        - path-pattern: /api/sync/sync-executions/*/defer
          resource-type: SYNC_EXECUTION
          default-action: DEFER
          description: data-sync 执行器因容量或窗口限制延迟回队列的协议入口。
          method-actions:
            POST: DEFER

        - path-pattern: /api/sync/sync-executions/recover-expired-leases
          resource-type: SYNC_EXECUTION
          default-action: RECOVER
          description: data-sync 过期租约恢复入口，属于运维恢复动作。
          method-actions:
            POST: RECOVER

        - path-pattern: /api/sync/sync-executions/**
          resource-type: SYNC_EXECUTION
          default-action: EXECUTE
          description: data-sync 执行租约控制面，包含执行器认领、心跳、延期和过期租约恢复。
          method-actions:
            POST: EXECUTE

        - path-pattern: /api/sync/sync-templates/**
          resource-type: SYNC_TEMPLATE
          default-action: EXECUTE
          description: data-sync 同步模板配置面，控制源端、目标端、同步模式和写入策略。
          method-actions:
            GET: VIEW
            POST: CREATE
            PUT: UPDATE
            PATCH: UPDATE
            DELETE: DELETE

        - path-pattern: /api/sync/**
          resource-type: SYNC_TASK
          default-action: EXECUTE
          description: 数据同步模板、同步任务、运行触发、回放补数与执行治理。
          method-actions:
            GET: VIEW
            POST: CREATE
            PUT: UPDATE
            PATCH: UPDATE
            DELETE: DELETE

        # 任务运营接口必须放在 /api/task/** 之前。
        # 原理：GatewayAuthorizationFilter 会按 route-metadata 的声明顺序寻找第一条命中的规则。
        # 如果这里缺少更具体的 /api/task/operations/**，队列健康、死信、延期和执行器租约接口就会退化成普通 TASK + VIEW。
        # 这会导致“普通用户查看任务”的权限误覆盖“运营人员查看队列健康”的权限边界，是典型的商用权限设计漏洞。
        - path-pattern: /api/task/operations/**
          resource-type: TASK_OPERATION
          default-action: EXECUTE
          description: 任务队列、死信、延期、执行器租约等运营工作台接口。
          method-actions:
            GET: VIEW
            POST: EXECUTE
            PUT: UPDATE
            PATCH: UPDATE
            DELETE: DELETE

        - path-pattern: /api/task/task-drafts/**
          resource-type: TASK_DRAFT
          default-action: EXECUTE
          description: 任务草稿、审批和转换真实任务入口；草稿不会直接进入执行队列。
          method-actions:
            GET: VIEW
            POST: CREATE
            PUT: UPDATE
            PATCH: UPDATE
            DELETE: DELETE

        - path-pattern: /api/task/**
          resource-type: TASK
          default-action: EXECUTE
          description: 全平台任务编排、调度、重试、取消和执行记录。
          method-actions:
            GET: VIEW
            POST: CREATE
            PUT: UPDATE
            PATCH: UPDATE
            DELETE: DELETE

        - path-pattern: /api/quality/**
          resource-type: QUALITY_RULE
          default-action: EXECUTE
          description: 数据质量规则、检测执行、异常明细和质量报告。
          method-actions:
            GET: VIEW
            POST: CREATE
            PUT: UPDATE
            PATCH: UPDATE
            DELETE: DELETE

        - path-pattern: /api/agent/events/ws
          resource-type: AI_RUNTIME
          default-action: SUBSCRIBE
          description: Agent Runtime 实时事件 WebSocket 订阅入口，用于前端订阅 run/session 进度、断线续传、ack 和 heartbeat。
          method-actions:
            GET: SUBSCRIBE

        # Agent 工具执行事件 outbox 是 Java 控制面与实时事件流之间的可靠投递缓冲区。
        # 查询、诊断、重新入队、忽略和备注的风险等级不同，不能全部退化为普通 GET/POST 语义：
        # 1. GET 查询用于排障和审计复核，后续应结合数据范围、脱敏和事件保留策略继续收紧；
        # 2. diagnostics 展示投递积压与阻断状态，属于运维诊断视角；
        # 3. requeue 会让 dispatcher 再次投递历史事件，必须作为恢复类动作单独授权；
        # 4. ignore 会把事件转为人工归档，不代表投递成功，必须有独立审计语义；
        # 5. notes 用于记录排障过程，虽然不改变投递状态，但会影响后续人工判断，也需要可追溯。
        - path-pattern: /api/agent/tool-execution-events/outbox/diagnostics
          resource-type: AI_RUNTIME
          default-action: DIAGNOSE
          description: Agent 工具执行事件 outbox 诊断接口，用于查看 pending、publishing、failed、blocked 和 ignored 等状态分布。
          method-actions:
            GET: DIAGNOSE

        - path-pattern: /api/agent/tool-execution-events/outbox/{outboxId}/requeue
          resource-type: AI_RUNTIME
          default-action: REQUEUE_OUTBOX
          description: Agent 工具执行事件 outbox 人工重新入队入口；仅用于下游故障修复后恢复投递，不能按普通 CREATE 授权。
          method-actions:
            POST: REQUEUE_OUTBOX

        - path-pattern: /api/agent/tool-execution-events/outbox/{outboxId}/ignore
          resource-type: AI_RUNTIME
          default-action: IGNORE_OUTBOX
          description: Agent 工具执行事件 outbox 人工忽略入口；表示管理员确认该事件无需继续投递，必须保留独立审计语义。
          method-actions:
            POST: IGNORE_OUTBOX

        - path-pattern: /api/agent/tool-execution-events/outbox/{outboxId}/notes
          resource-type: AI_RUNTIME
          default-action: ANNOTATE_OUTBOX
          description: Agent 工具执行事件 outbox 人工备注入口；用于记录排障判断、客户确认或恢复前置条件。
          method-actions:
            POST: ANNOTATE_OUTBOX

        - path-pattern: /api/agent/tool-execution-events/outbox/**
          resource-type: AI_RUNTIME
          default-action: VIEW_OUTBOX_EVENTS
          description: Agent 工具执行事件 outbox 查询接口，用于排查工具状态事件是否进入待投递事件箱以及是否发生堆积或阻断。
          method-actions:
            GET: VIEW_OUTBOX_EVENTS

        # Agent 长期记忆写入候选是“工具结果/治理经验进入长期记忆前”的审批资源。
        # 这里必须把查看、批准、拒绝拆成不同 action，而不是复用普通 GET/POST：
        # 1. 查看候选可能暴露工具审计 ID、候选摘要、scope、敏感字段提示和写入理由，适合审计员/运营人员只读复核；
        # 2. 批准候选会让内容未来进入 Chroma、Neo4j、MySQL 或对象存储，影响后续 Agent 检索和规划，属于高风险治理动作；
        # 3. 拒绝候选会形成“为什么不允许写入长期记忆”的治理事实，也需要独立审计和后续策略分析。
        # 更具体的 approve/reject 规则必须放在通配查询规则之前，避免被 /write-candidates/** 先命中。
        - path-pattern: /api/agent/memory/write-candidates/{candidateId}/approve
          resource-type: AI_RUNTIME
          default-action: APPROVE_MEMORY_WRITE
          description: Agent 长期记忆写入候选批准入口；批准后候选未来可以进入长期记忆持久层，因此不能按普通 POST CREATE 授权。
          method-actions:
            POST: APPROVE_MEMORY_WRITE

        - path-pattern: /api/agent/memory/write-candidates/{candidateId}/reject
          resource-type: AI_RUNTIME
          default-action: REJECT_MEMORY_WRITE
          description: Agent 长期记忆写入候选拒绝入口；拒绝用于阻断敏感、过期、低质量或越权内容进入长期记忆，并形成审计事实。
          method-actions:
            POST: REJECT_MEMORY_WRITE

        - path-pattern: /api/agent/memory/write-candidates/**
          resource-type: AI_RUNTIME
          default-action: VIEW_MEMORY_WRITE_CANDIDATES
          description: Agent 长期记忆写入候选查询入口；用于审批台、审计台和运维台查看候选状态、范围、来源和治理理由。
          method-actions:
            GET: VIEW_MEMORY_WRITE_CANDIDATES

        # Agent Runtime 事件诊断必须比 /api/agent/runtime-events/** 更靠前。
        # 原因：诊断接口展示的是 consumer、投影窗口、拒绝原因和处理耗时等运行状态，
        # 它的权限语义更接近“运维诊断”，不应被普通事件查看权限覆盖。
        - path-pattern: /api/agent/runtime-events/diagnostics
          resource-type: AI_RUNTIME
          default-action: DIAGNOSE
          description: Agent Runtime 运行时事件消费诊断接口，用于运维确认 Kafka consumer、投影窗口、拒绝原因和平均处理耗时。
          method-actions:
            GET: DIAGNOSE

        # runtime event replay ack 是客户端消费位置写入动作，不应退化为 VIEW_EVENTS。
        # 后续 WebSocket 断线重连、Python Runtime 桥接和前端时间线恢复都会依赖该 cursor。
        - path-pattern: /api/agent/runtime-events/replay/acks
          resource-type: AI_RUNTIME
          default-action: ACK_EVENTS
          description: Agent Runtime 事件回放客户端 ack 游标入口，用于确认已消费到的 replaySequence。
          method-actions:
            GET: VIEW_EVENTS
            POST: ACK_EVENTS

        # Agent Runtime 运行时事件投影查询入口。
        # 它不是普通的 GET VIEW：事件里可能包含工具调用、审批等待、异常原因、模型规划阶段和上下文关联 ID，
        # 因此单独使用 VIEW_EVENTS，方便 permission-admin 后续按普通用户、项目负责人、审计员和运维人员拆分策略。
        - path-pattern: /api/agent/runtime-events/**
          resource-type: AI_RUNTIME
          default-action: VIEW_EVENTS
          description: Agent Runtime 运行时事件投影查询接口，用于查看 run/session/request 维度的 Agent 执行事件。
          method-actions:
            GET: VIEW_EVENTS

        - path-pattern: /api/agent/models/routes
          resource-type: AI_RUNTIME
          default-action: VIEW
          description: Agent Runtime 模型路由表查看接口，用于排障模型选择和 Provider 配置。
          method-actions:
            GET: VIEW

        - path-pattern: /api/agent/models/chat
          resource-type: AI_RUNTIME
          default-action: EXECUTE
          description: Agent Runtime 模型推理入口；当前为 dry-run 契约验证，后续接入真实模型 Provider。
          method-actions:
            POST: EXECUTE

        - path-pattern: /api/agent/tools/**
          resource-type: AI_RUNTIME
          default-action: VIEW
          description: Agent 工具目录只读接口，用于查看可绑定工具、风险等级、输入 schema 和下游服务映射。
          method-actions:
            GET: VIEW

        - path-pattern: /api/agent/sessions/{sessionId}/runs/{runId}/cancel
          resource-type: AI_RUNTIME
          default-action: CANCEL
          description: Agent Run 取消入口；用于用户或运营人员停止尚未完成的智能体运行。
          method-actions:
            POST: CANCEL

        - path-pattern: /api/agent/sessions/{sessionId}/runs
          resource-type: AI_RUNTIME
          default-action: EXECUTE
          description: Agent Run 创建入口；用于在既有会话内发起一次智能体规划或执行。
          method-actions:
            POST: EXECUTE

        - path-pattern: /api/agent/sessions/{sessionId}/tools
          resource-type: AI_RUNTIME
          default-action: UPDATE
          description: Agent 会话工具绑定入口；用于声明该会话可调用哪些平台工具能力。
          method-actions:
            POST: UPDATE

        # 推荐生产入口：只允许把已经经过 DAG dry-run 指纹复核的明确选中节点送入 outbox。
        # 该动作会产生后台任务副作用，不能被 sessions/** 通配规则解释成普通 CREATE。
        - path-pattern: /api/agent/sessions/{sessionId}/runs/{runId}/tool-executions/dag-selected-node-outbox/enqueue
          resource-type: AI_RUNTIME
          default-action: ENQUEUE_SELECTED_ASYNC_TOOL
          description: DAG 已确认选中节点异步入箱入口；服务端会重新 dry-run、校验指纹并只推进异步 ready 节点。
          method-actions:
            POST: ENQUEUE_SELECTED_ASYNC_TOOL

        # selected-node confirmation 查询是只读审计能力，但它展示的是“谁确认了哪版预案、哪些节点进入 outbox、
        # 命中了哪版策略和委托证据”，比普通会话详情更敏感，因此不能被 /api/agent/** 的普通 VIEW 吞掉。
        - path-pattern: /api/agent/sessions/{sessionId}/runs/{runId}/tool-executions/dag-confirmations/**
          resource-type: AI_RUNTIME
          default-action: VIEW_TOOL_CONFIRMATIONS
          description: DAG selected-node 确认记录详情查询接口，用于审计 human-in-the-loop 确认与 durable action 证据。
          method-actions:
            GET: VIEW_TOOL_CONFIRMATIONS

        - path-pattern: /api/agent/sessions/{sessionId}/runs/{runId}/tool-executions/dag-confirmations
          resource-type: AI_RUNTIME
          default-action: VIEW_TOOL_CONFIRMATIONS
          description: DAG selected-node 确认记录列表查询接口，用于按 run 查看确认历史、策略版本和 outbox 关联。
          method-actions:
            GET: VIEW_TOOL_CONFIRMATIONS

        # 兼容入口：按整个 Run 扫描可下发异步草案。它适合联调、运维补偿和后续管理员操作，
        # 但生产网关应给它更严格的策略，不能和 selected-node 推荐入口共用普通 CREATE 权限。
        - path-pattern: /api/agent/sessions/{sessionId}/runs/{runId}/tool-executions/async-command-outbox/enqueue
          resource-type: AI_RUNTIME
          default-action: ENQUEUE_RUN_ASYNC_TOOLS
          description: 兼容 Run 级异步命令批量入箱入口；生产应收口为内部补偿或管理员动作。
          method-actions:
            POST: ENQUEUE_RUN_ASYNC_TOOLS

        - path-pattern: /api/agent/sessions/{sessionId}/runs/{runId}/tool-executions/{auditId}/approve
          resource-type: AI_RUNTIME
          default-action: APPROVE
          description: Agent 高风险工具计划人工确认入口；只解除审批等待，不直接执行下游工具。
          method-actions:
            PATCH: APPROVE

        - path-pattern: /api/agent/sessions/{sessionId}/runs/{runId}/tool-executions/{auditId}/reject
          resource-type: AI_RUNTIME
          default-action: APPROVE
          description: Agent 高风险工具计划人工拒绝入口；拒绝后工具计划进入 SKIPPED，后续编排器应跳过该工具。
          method-actions:
            PATCH: APPROVE

        - path-pattern: /api/agent/sessions/{sessionId}/runs/{runId}/tool-executions/{auditId}/execute
          resource-type: AI_RUNTIME
          default-action: EXECUTE
          description: Agent 工具计划执行入口；仅允许执行已完成审批且处于 PLANNED 的工具计划。
          method-actions:
            PATCH: EXECUTE

        - path-pattern: /api/agent/sessions/**
          resource-type: AI_RUNTIME
          default-action: VIEW
          description: Agent 会话控制面；用于创建、查询会话与查看运行上下文。
          method-actions:
            GET: VIEW
            POST: CREATE

        - path-pattern: /api/permission/project-memberships/batch-upsert
          resource-type: PROJECT_MEMBERSHIP
          default-action: IMPORT
          description: 批量导入或同步项目成员授权，风险高于单条创建，需要独立动作语义。
          method-actions:
            POST: IMPORT

        - path-pattern: /api/permission/project-memberships/*/enable
          resource-type: PROJECT_MEMBERSHIP
          default-action: ENABLE
          description: 启用项目成员授权，会让授权重新参与 PROJECT 数据范围物化。
          method-actions:
            POST: ENABLE

        - path-pattern: /api/permission/project-memberships/*/disable
          resource-type: PROJECT_MEMBERSHIP
          default-action: DISABLE
          description: 禁用项目成员授权，保留审计记录但停止下发 projectId。
          method-actions:
            POST: DISABLE

        - path-pattern: /api/permission/project-memberships/**
          resource-type: PROJECT_MEMBERSHIP
          default-action: UPDATE
          description: 项目成员授权管理；它决定 PROJECT 数据范围会把哪些 projectId 下发给业务模块。
          method-actions:
            GET: VIEW
            POST: CREATE
            PUT: UPDATE
            PATCH: UPDATE
            DELETE: DISABLE

        - path-pattern: /api/permission/**
          resource-type: SYSTEM_SETTING
          default-action: EXECUTE
          description: 角色、菜单、路由策略、数据范围和平台管理能力。
          method-actions:
            GET: VIEW
            POST: CREATE
            PUT: UPDATE
            PATCH: UPDATE
            DELETE: DELETE

        - path-pattern: /api/observability/**
          resource-type: AUDIT_LOG
          default-action: EXECUTE
          description: 审计、日志、指标、告警和运维视角。
          method-actions:
            GET: VIEW
            POST: CREATE
            PUT: UPDATE
            PATCH: UPDATE
            DELETE: DELETE

logging:
  level:
    com.czh.datasmart: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
