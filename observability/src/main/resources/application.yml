# 可观测性模块独立运行，避免监控能力和业务模块发布节奏强绑定。
server:
  port: 8084

spring:
  application:
    name: observability
  profiles:
    active: dev
  # observability 是 MySQL -> PostgreSQL 迁移的首个试点服务。
  # currentSchema 把未限定表名约束在 observability schema，避免微服务误访问其他模块表。
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/datasmart_govern?currentSchema=observability&ApplicationName=datasmart-observability}
    username: ${SPRING_DATASOURCE_USERNAME:datasmart}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
    hikari:
      # 运维服务流量通常不高，但在故障风暴中会集中查询；连接池保持有界，避免反向压垮数据库。
      maximum-pool-size: ${DATASMART_OBSERVABILITY_DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DATASMART_OBSERVABILITY_DB_MIN_IDLE:1}
      connection-timeout: ${DATASMART_OBSERVABILITY_DB_CONNECTION_TIMEOUT_MILLIS:3000}
      validation-timeout: ${DATASMART_OBSERVABILITY_DB_VALIDATION_TIMEOUT_MILLIS:1000}
  flyway:
    enabled: true
    # Flyway 历史表和本服务业务表都位于 observability schema。
    schemas: observability
    default-schema: observability
    create-schemas: false
    locations: classpath:db/migration/postgresql/observability
    validate-on-migrate: true
    clean-disabled: true
    baseline-on-migrate: false
  # Kafka 后续可承载告警事件和日志流事件。
  kafka:
    bootstrap-servers: localhost:9092
  cloud:
    compatibility-verifier:
      # observability 是本地 E2E 排障入口，如果它在 Spring Cloud 版本硬校验阶段失败，
      # 运维人员就无法继续看到平台健康、告警覆盖和闭环 readiness。
      # 当前项目固定栈已经由父 POM、Toolchains、Maven 测试和真实 smoke 共同约束，
      # 因此这里与 gateway/data-quality 保持一致关闭 compatibility verifier。
      enabled: false
    nacos:
      discovery:
        server-addr: localhost:8848

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.czh.datasmart.govern.observability.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # PostgreSQL 使用小写下划线标识符；禁止 MyBatis-Plus 自动给表名增加前缀。
      table-prefix: ""

datasmart:
  observability:
    platform-health:
      # 单个下游 health/metrics 探针的超时时间。
      # observability 是排障入口，不能因为某个业务服务卡死就把自身请求也长时间挂住。
      timeout-millis: 800
      # 默认只探 health，调用接口时可通过 includeMetricsProbe=true 临时同时探 metrics。
      # 这样 smoke 检查保持轻量，运维排障时又能确认 Prometheus 出口是否具备。
      include-metrics-probe-by-default: false
      # 单次最多探测的运行时数量。当前项目远小于该值，保留该边界是为了未来扩展 worker/connector 后防止探针风暴。
      max-probe-targets: 32
      # 服务根地址按模块代码配置。默认仍是 localhost，保证开发者直接运行 Spring Boot 进程时无需额外配置；
      # Compose 会用环境变量覆盖成容器服务 DNS。这里只配置根地址，health/metrics 路径由服务目录统一维护。
      service-base-urls:
        gateway: ${DATASMART_OBSERVABILITY_GATEWAY_BASE_URL:http://localhost:8080}
        permission-admin: ${DATASMART_OBSERVABILITY_PERMISSION_ADMIN_BASE_URL:http://localhost:8085}
        task-management: ${DATASMART_OBSERVABILITY_TASK_MANAGEMENT_BASE_URL:http://localhost:8081}
        datasource-management: ${DATASMART_OBSERVABILITY_DATASOURCE_MANAGEMENT_BASE_URL:http://localhost:8082}
        data-sync: ${DATASMART_OBSERVABILITY_DATA_SYNC_BASE_URL:http://localhost:8086}
        data-quality: ${DATASMART_OBSERVABILITY_DATA_QUALITY_BASE_URL:http://localhost:8083}
        agent-runtime: ${DATASMART_OBSERVABILITY_AGENT_RUNTIME_BASE_URL:http://localhost:8091}
        observability: ${DATASMART_OBSERVABILITY_SELF_BASE_URL:http://localhost:8084}
        python-ai-runtime: ${DATASMART_OBSERVABILITY_PYTHON_AI_RUNTIME_BASE_URL:http://localhost:8090}

logging:
  level:
    com.czh.datasmart: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      # Prometheus 抓取指标时依赖这个端点暴露出来。
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
