# 可观测性模块独立运行，避免监控能力和业务模块发布节奏强绑定。
server:
  port: 8084

spring:
  application:
    name: observability
  profiles:
    active: dev
  # MySQL 预留给告警规则、订阅配置和其他监控配置持久化。
  datasource:
    url: jdbc:mysql://localhost:3306/datasmart_govern?useSSL=false&serverTimezone=UTC
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  # Kafka 后续可承载告警事件和日志流事件。
  kafka:
    bootstrap-servers: localhost:9092
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.czh.datasmart.govern.observability.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.czh.datasmart: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      # Prometheus 抓取指标时依赖这个端点暴露出来。
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
