# permission-admin 是平台级权限与管理中心，不属于某个业务域。
# 它的职责是沉淀角色、菜单、路由、数据范围、审批策略和审计事实，
# 让 gateway、task-management、datasource-management、data-quality 等模块可以消费统一权限语义。
server:
  port: 8085

spring:
  application:
    # 服务名会被 Nacos 和 gateway 使用，后续网关路由 lb://permission-admin 依赖该名称。
    name: permission-admin
  profiles:
    active: dev
  datasource:
    # permission-admin 已迁移到 PostgreSQL。
    # currentSchema=permission_admin 会把未显式限定 schema 的表名约束在权限中心自己的命名空间内，
    # 防止权限服务误读 data_quality、task_management、agent_runtime 等其他微服务的同名或相似表。
    # 生产环境应通过配置中心、Secret Manager 或容器环境变量注入 URL、用户名和密码。
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/datasmart_govern?currentSchema=permission_admin&ApplicationName=datasmart-permission-admin}
    username: ${SPRING_DATASOURCE_USERNAME:datasmart}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
    hikari:
      # 权限判定是 gateway 高频调用链路，连接池必须有清晰上限，避免策略查询抖动时把 PostgreSQL 连接耗尽。
      maximum-pool-size: ${DATASMART_PERMISSION_DB_MAX_POOL_SIZE:20}
      # 保留少量空闲连接，降低 gateway 首次授权或策略缓存失效后的冷启动延迟。
      minimum-idle: ${DATASMART_PERMISSION_DB_MIN_IDLE:2}
      # 授权链路不应长时间等待数据库连接；超过该时间应快速失败并让 gateway 走降级或拒绝策略。
      connection-timeout: ${DATASMART_PERMISSION_DB_CONNECTION_TIMEOUT_MILLIS:3000}
      # 连接校验超时单独收口，避免健康检查或连接借用被慢网络长时间拖住。
      validation-timeout: ${DATASMART_PERMISSION_DB_VALIDATION_TIMEOUT_MILLIS:1000}
  flyway:
    enabled: true
    # Flyway 历史表和业务表都归属 permission_admin schema。
    # schema 由 docker/postgresql/init/00-platform-schemas.sql 统一创建，服务启动只负责版本迁移。
    schemas: permission_admin
    default-schema: permission_admin
    create-schemas: false
    locations: classpath:db/migration/postgresql/permission-admin
    validate-on-migrate: true
    # 权限、审计和 outbox 都是高价值事实，clean 会直接删除授权与审计证据，商业环境必须禁用。
    clean-disabled: true
    baseline-on-migrate: false
    # 数据范围策略中会保存 `${actorId}`、`${tenantId}`、`${actorProjectIds}` 这类业务表达式模板。
    # 它们不是 Flyway 占位符，而是 permission-admin 后续在授权判定时解析的 DSL 片段；
    # 因此必须关闭 Flyway placeholder 替换，否则启动迁移时会把这些模板误判为缺失配置。
    placeholder-replacement: false
  kafka:
    # Kafka 预留给后续权限变更事件、审计事件、权限缓存失效通知等异步能力。
    bootstrap-servers: localhost:9092
  cloud:
    compatibility-verifier:
      # 项目当前按既定技术栈固定 Spring Boot 3.5.11 与 Spring Cloud 2023.0.3。
      # Spring Cloud 的内置校验器只维护官方推荐组合，会在启动阶段拦截 3.5.x；
      # 这里显式关闭“启动硬拦截”，但不代表忽略兼容风险，真实兼容性仍通过本地 E2E、Maven 构建和 smoke check 验证。
      enabled: false
    nacos:
      discovery:
        # 注册到 Nacos 后，gateway 才能通过 lb://permission-admin 做服务发现转发。
        server-addr: localhost:8848

mybatis-plus:
  # 目前权限模块优先使用 MyBatis-Plus 的基础 CRUD 能力，保留 mapper-locations 便于后续复杂矩阵查询落 XML。
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.czh.datasmart.govern.permission.entity
  configuration:
    # 数据库使用下划线字段，Java 使用驼峰字段；开启映射可以减少重复注解。
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # PostgreSQL 使用小写下划线标识符；这里禁止给表名追加迁移期前缀。
      table-prefix: ""

logging:
  level:
    com.czh.datasmart: INFO
  pattern:
    # 控制台日志保留模块、时间、线程和级别，便于本地联调时追踪权限判定链路。
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        # health/info 用于基础探活，metrics 用于本地排障，prometheus 用于 docker/prometheus 周期抓取。
        # permission-admin 是 gateway 授权决策的控制面，授权延迟、策略缓存和事件消费状态必须进入统一监控。
        include: health,info,metrics,prometheus
  endpoint:
    health:
      # 生产环境下健康详情不应无条件公开，避免泄露数据库、Nacos 等内部依赖状态。
      show-details: when-authorized

datasmart:
  permission:
    identity-provisioning:
      # 身份供应不是“DataSmart 自己保存密码并签发登录态”，而是由 permission-admin 通过 Keycloak/企业 IdP Admin API
      # 创建、禁用、重置外部账号，再把低敏影子身份写入 PostgreSQL，供权限、审计、租户隔离和用户画像使用。
      enabled: ${DATASMART_PERMISSION_IDENTITY_PROVISIONING_ENABLED:true}
      # 当前默认接 Keycloak Admin API；后续企业 IdP、SCIM、LDAP bridge 可在不改变 controller/service 契约的前提下增加适配器。
      provider-mode: ${DATASMART_PERMISSION_IDENTITY_PROVIDER_MODE:KEYCLOAK_ADMIN_API}
      keycloak:
        # 本地开发默认访问宿主机 Keycloak；容器内通过 docker-compose.application.yml 覆盖为 http://keycloak:18080。
        base-url: ${DATASMART_KEYCLOAK_BASE_URL:http://localhost:18080}
        # admin-realm 用于获取管理 token；本地默认 master，生产建议使用专用 confidential client 最小授权。
        admin-realm: ${DATASMART_KEYCLOAK_ADMIN_REALM:master}
        # target-realm 是 DataSmart 用户真正登录的 realm，需要与 gateway OIDC issuer 对齐。
        target-realm: ${DATASMART_KEYCLOAK_TARGET_REALM:datasmart}
        admin-client-id: ${DATASMART_KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
        # 非空时使用 client_credentials；为空时使用 admin username/password，仅建议本地 smoke 使用。
        admin-client-secret: ${DATASMART_KEYCLOAK_ADMIN_CLIENT_SECRET:}
        admin-username: ${DATASMART_KEYCLOAK_ADMIN_USERNAME:admin}
        admin-password: ${DATASMART_KEYCLOAK_ADMIN_PASSWORD:admin}
        # 创建账号时同步绑定 DATASMART_* realm role，便于 gateway 从 JWT claim 中还原 actorRole。
        assign-realm-role: ${DATASMART_KEYCLOAK_ASSIGN_REALM_ROLE:true}
        realm-role-prefix: ${DATASMART_KEYCLOAK_REALM_ROLE_PREFIX:DATASMART_}
        connect-timeout: ${DATASMART_KEYCLOAK_ADMIN_CONNECT_TIMEOUT:2s}
        read-timeout: ${DATASMART_KEYCLOAK_ADMIN_READ_TIMEOUT:5s}
    policy-cache:
      # permission-admin 内部权限事实缓存开关。
      # 它缓存的是 evaluate 需要读取的路由策略和数据范围策略，不是 gateway 那一层最终 allow/deny 判定结果。
      # 启用后可以降低高频授权判定对 PostgreSQL 的重复读取压力；本地排障时可临时关闭。
      enabled: true
      # 路由策略缓存 TTL。策略变更成功后会主动清理对应租户缓存，TTL 是兜底一致性保护。
      route-policy-ttl: 30s
      # 数据范围策略缓存 TTL。数据范围会影响业务查询边界，因此默认保持短 TTL。
      data-scope-policy-ttl: 30s
      # 本地缓存最大条目数。超过上限会先清理过期条目，仍超限时执行保守全量清理，避免 JVM 内存不可控。
      max-entries: 1000
    policy-events:
      # 是否发布权限策略变更事件。
      # 默认关闭：便于本地只启动 permission-admin + PostgreSQL 时仍能联调管理 API。
      # 开启后，路由策略创建、更新、启停成功会向 Kafka 发布事件，gateway 可消费后清理授权缓存。
      enabled: false
      # 权限策略变更事件 Topic。
      # 生产环境中应确保所有 gateway 实例都消费该 Topic，并结合消费者组策略完成多实例缓存失效。
      topic: datasmart.permission.policy.changed
      # 是否启用 outbox 后台投递器。
      # enabled=true 代表策略变更会写入 outbox；dispatcher-enabled=true 才会由当前服务实例主动投递 Kafka。
      # 如果只想先验证 outbox 入库，可以开启 enabled、关闭 dispatcher-enabled。
      dispatcher-enabled: false
      # 单次最多投递多少条 outbox 事件，避免一次调度占用太久。
      dispatch-batch-size: 50
      # 投递器固定延迟，单位毫秒。
      dispatch-fixed-delay-ms: 5000
      # Kafka send future 等待超时。超时后事件会进入 FAILED/DEAD 重试流程。
      send-timeout: 3s
      # 发送失败后的重试间隔。
      retry-delay: 30s
      # 单条事件最大尝试次数，超过后进入 DEAD，等待后续管理 API 或运维脚本人工处理。
      max-attempts: 10
      # SENDING 状态超时时间。服务在发送过程中崩溃后，投递器会把超时 SENDING 恢复为 FAILED。
      sending-timeout: 5m
