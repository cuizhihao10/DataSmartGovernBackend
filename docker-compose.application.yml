# DataSmart Govern 应用运行层 Compose overlay。
#
# 使用方式：
#   docker compose -f docker-compose.yml -f docker-compose.application.yml up -d --build
#
# 基础 docker-compose.yml 负责 MySQL、Redis、Kafka、Nacos、Keycloak、Prometheus 等中间件；
# 本文件负责 8 个 Java 微服务和 Python AI Runtime。拆成 overlay 的原因是：
# 1. 开发者可以只启动中间件，再用 IDE 调试单个服务；
# 2. 全平台验收时叠加本文件即可构建并启动全部运行时；
# 3. 生产部署迁移到 Kubernetes/Helm 时，应用镜像与基础设施边界更清晰。

x-java-common-environment: &java-common-environment
  # 本地开发、演示和全平台 E2E 默认使用北京时间。
  # `TZ` 影响容器内系统时间和部分 native 库；`-Duser.timezone` 明确约束 JVM 默认时区，
  # 避免 Spring Boot 日志、LocalDateTime.now()、MyBatis 自动填充时间和调度计算继续按 UTC 慢 8 小时。
  TZ: ${DATASMART_TIME_ZONE:-Asia/Shanghai}
  JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError -Dfile.encoding=UTF-8 -Duser.timezone=${DATASMART_TIME_ZONE:-Asia/Shanghai}"
  # Jackson 的时区主要影响 Date/Calendar/部分 Offset 类型的 JSON 展示；LocalDateTime 本身不带时区，
  # 仍依赖 JVM 默认时区和业务层写入策略，因此这里与 JVM 时区保持一致。
  SPRING_JACKSON_TIME_ZONE: ${DATASMART_TIME_ZONE:-Asia/Shanghai}
  # container profile 当前用于标识运行环境；没有同名配置文件时，仍以 application.yml 为基础。
  SPRING_PROFILES_ACTIVE: ${DATASMART_RUNTIME_PROFILE:-container}
  # 所有业务服务共享治理库。密码只提供本地默认值，生产必须由 Secret Manager 注入。
  SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/datasmart_govern?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
  SPRING_DATASOURCE_USERNAME: root
  SPRING_DATASOURCE_PASSWORD: ${DATASMART_MYSQL_PASSWORD:-password}
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
  # gateway 当前配置使用 spring.redis，未来升级到 spring.data.redis 时也能复用同一容器地址。
  SPRING_REDIS_HOST: redis
  SPRING_DATA_REDIS_HOST: redis

x-java-common: &java-common
  restart: unless-stopped
  networks:
    - datasmart-network
  security_opt:
    - no-new-privileges:true
  # Java 服务仅需临时目录；应用 jar 和容器根文件系统保持只读，降低运行时篡改面。
  read_only: true
  tmpfs:
    - /tmp
  depends_on:
    - mysql
    - redis
    - kafka
    - nacos

services:
  gateway:
    <<: *java-common
    image: datasmart/gateway:${DATASMART_IMAGE_TAG:-local}
    container_name: datasmart-gateway
    build:
      context: .
      dockerfile: docker/runtime/java-service.Dockerfile
      args:
        MODULE: gateway
        SERVER_PORT: 8080
    environment:
      <<: *java-common-environment
      DATASMART_PYTHON_AI_RUNTIME_URI: http://python-ai-runtime:8090
      DATASMART_PYTHON_AI_RUNTIME_WS_URI: ws://python-ai-runtime:8090
      # 应用层 Compose 用于“全平台闭环验收”，不同于只启动单个模块的开发模式。
      # 因此这里显式开启 gateway -> permission-admin 的强制授权：
      # 1. OIDC 只回答“你是谁”，不能回答“你能否创建数据源、触发同步或调用 worker 协议”；
      # 2. permission-admin 负责路由策略、动作语义、数据范围和审计事实；
      # 3. shadow-mode=false 与 fail-open=false 可以避免 E2E 在权限中心不可用时假绿。
      DATASMART_GATEWAY_AUTHORIZATION_ENABLED: "true"
      DATASMART_GATEWAY_AUTHORIZATION_SHADOW_MODE: "false"
      DATASMART_GATEWAY_AUTHORIZATION_FAIL_OPEN_ON_ERROR: "false"
      DATASMART_GATEWAY_AUTHORIZATION_DECISION_ENDPOINT: http://permission-admin:8085/permissions/evaluate
      DATASMART_GATEWAY_TOOL_POLICY_ENVELOPE_REMOTE_ENABLED: "true"
      DATASMART_GATEWAY_TOOL_POLICY_ENVELOPE_EVALUATE_URL: http://permission-admin:8085/permissions/agent/tool-budget-policies/evaluate
      # issuer 保持宿主机可见的 localhost 地址；JWK 则通过容器内 DNS 拉取，避免 gateway 在容器内访问自己的 localhost。
      DATASMART_GATEWAY_OIDC_ISSUER_URI: ${DATASMART_GATEWAY_OIDC_ISSUER_URI:-http://localhost:18080/realms/datasmart}
      DATASMART_GATEWAY_OIDC_JWK_SET_URI: http://keycloak:18080/realms/datasmart/protocol/openid-connect/certs
      DATASMART_GATEWAY_PYTHON_RUNTIME_SIGNATURE_ENABLED: "true"
      DATASMART_GATEWAY_PYTHON_RUNTIME_SIGNATURE_SECRET: ${DATASMART_GATEWAY_SIGNATURE_SECRET:-local-development-only-change-me}
      DATASMART_GATEWAY_PYTHON_RUNTIME_SIGNATURE_KEY_ID: ${DATASMART_GATEWAY_SIGNATURE_KEY_ID:-gateway-compose-v1}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
      nacos:
        condition: service_started
      keycloak:
        condition: service_started
      permission-admin:
        condition: service_started
      # Agent 页面只有在 Python HTTP 端口和内部依赖初始化完成后才应通过 gateway 对外开放。
      python-ai-runtime:
        condition: service_healthy

  frontend:
    restart: unless-stopped
    image: datasmart/frontend:${DATASMART_IMAGE_TAG:-local}
    container_name: datasmart-frontend
    build:
      # 前端已经拆成独立仓库，因此这里使用后端仓库的兄弟目录作为构建上下文。
      # 这让本地全平台 Compose 可以一次性拉起前后端，同时仍然保留“前端仓库独立提交、独立演进”的边界。
      # 如果在 CI 中只 checkout 后端仓库，需要额外 checkout DataSmartGovernFrontend 到同级目录，或改用已发布的前端镜像。
      context: ../DataSmartGovernFrontend
      dockerfile: Dockerfile
      args:
        # Vite 会在构建期固化 VITE_* 变量，因此 Compose 通过 build args 明确传入本地联调所需配置。
        # `/api` 由前端容器内的 Nginx 代理到 gateway:8080，浏览器不需要知道容器网络里的服务名。
        VITE_API_BASE_URL: /api
        # 全平台 Compose 默认走真实 gateway/Keycloak 链路，关闭 mock fallback，避免后端异常被前端 mock 数据掩盖。
        VITE_ENABLE_MOCK_FALLBACK: ${DATASMART_FRONTEND_ENABLE_MOCK_FALLBACK:-false}
        VITE_APP_TITLE: ${DATASMART_FRONTEND_APP_TITLE:-DataSmart Govern}
        VITE_AUTH_MODE: ${DATASMART_FRONTEND_AUTH_MODE:-oidc}
        VITE_OIDC_AUTHORITY: ${DATASMART_FRONTEND_OIDC_AUTHORITY:-http://localhost:18080/realms/datasmart}
        VITE_OIDC_CLIENT_ID: ${DATASMART_FRONTEND_OIDC_CLIENT_ID:-datasmart-gateway}
        VITE_OIDC_SCOPE: ${DATASMART_FRONTEND_OIDC_SCOPE:-openid profile email}
        VITE_OIDC_REDIRECT_URI: ${DATASMART_FRONTEND_OIDC_REDIRECT_URI:-http://localhost:5173/auth/callback}
        VITE_OIDC_POST_LOGOUT_REDIRECT_URI: ${DATASMART_FRONTEND_OIDC_POST_LOGOUT_REDIRECT_URI:-http://localhost:5173/login}
    ports:
      # 对外仍使用 5173，是为了兼容当前 Keycloak client redirect URI 和用户已有访问习惯。
      # 容器内部是 Nginx 80 端口，不再运行 Vite dev server。
      - "5173:80"
    networks:
      - datasmart-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      # Nginx 运行时需要写临时缓存、PID/socket 与临时文件；把这些目录挂成 tmpfs 后，
      # 既能保持根文件系统只读，也不会把运行态文件落到镜像层或宿主机。
      - /var/cache/nginx
      - /var/run
      - /tmp
    depends_on:
      - gateway

  permission-admin:
    <<: *java-common
    image: datasmart/permission-admin:${DATASMART_IMAGE_TAG:-local}
    container_name: datasmart-permission-admin
    build:
      context: .
      dockerfile: docker/runtime/java-service.Dockerfile
      args:
        MODULE: permission-admin
        SERVER_PORT: 8085
    environment:
      <<: *java-common-environment
      # permission-admin 已迁移到 PostgreSQL，必须覆盖公共锚点中的迁移期 MySQL datasource。
      # currentSchema=permission_admin 能把权限角色、路由策略、数据范围、审计和 outbox 限定在权限服务自己的 schema。
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/datasmart_govern?currentSchema=permission_admin&ApplicationName=datasmart-permission-admin
      SPRING_DATASOURCE_USERNAME: datasmart
      SPRING_DATASOURCE_PASSWORD: ${DATASMART_POSTGRES_PASSWORD:-password}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      # permission-admin 通过 Keycloak Admin API 做账号供应；容器内必须访问 keycloak 服务名，不能使用宿主机 localhost。
      DATASMART_KEYCLOAK_BASE_URL: http://keycloak:18080
      DATASMART_KEYCLOAK_ADMIN_REALM: ${DATASMART_KEYCLOAK_ADMIN_REALM:-master}
      DATASMART_KEYCLOAK_TARGET_REALM: ${DATASMART_KEYCLOAK_TARGET_REALM:-datasmart}
      DATASMART_KEYCLOAK_ADMIN_CLIENT_ID: ${DATASMART_KEYCLOAK_ADMIN_CLIENT_ID:-admin-cli}
      DATASMART_KEYCLOAK_ADMIN_CLIENT_SECRET: ${DATASMART_KEYCLOAK_ADMIN_CLIENT_SECRET:-}
      DATASMART_KEYCLOAK_ADMIN_USERNAME: ${DATASMART_KEYCLOAK_ADMIN_USERNAME:-admin}
      DATASMART_KEYCLOAK_ADMIN_PASSWORD: ${DATASMART_KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8085:8085"
    depends_on:
      - postgresql
      - redis
      - kafka
      - nacos
      - keycloak

  task-management:
    <<: *java-common
    image: datasmart/task-management:${DATASMART_IMAGE_TAG:-local}
    container_name: datasmart-task-management
    build:
      context: .
      dockerfile: docker/runtime/java-service.Dockerfile
      args:
        MODULE: task-management
        SERVER_PORT: 8081
    environment:
      <<: *java-common-environment
      # task-management 的平台业务事实库已迁移到 PostgreSQL。
      # 覆盖公共 MySQL datasource 后，任务快照、草稿、执行 run、日志、幂等、Agent command inbox
      # 以及 task_data_sync_* 桥接表都会落在 task_management schema。
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/datasmart_govern?currentSchema=task_management&ApplicationName=datasmart-task-management
      SPRING_DATASOURCE_USERNAME: datasmart
      SPRING_DATASOURCE_PASSWORD: ${DATASMART_POSTGRES_PASSWORD:-password}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      DATASMART_AGENT_RUNTIME_INTERNAL_BASE_URL: http://agent-runtime:8091
      DATASMART_DATA_SYNC_INTERNAL_BASE_URL: http://data-sync:8086
      DATASMART_TASK_AGENT_TOOL_ACTION_CONTROLLED_APPROVAL_EVALUATE_URL: http://permission-admin:8085/permissions/agent/tool-action-approvals/evaluate
      DATASMART_PERMISSION_ADMIN_EVALUATE_URL: http://permission-admin:8085/permissions/evaluate
      # 自动 worker 与真实受控提交保持关闭；部署成功不应自动消费或修改客户数据。
      DATASMART_TASK_AGENT_ASYNC_WORKER_ENABLED: "false"
      DATASMART_TASK_AGENT_TOOL_ACTION_CONTROLLED_SUBMIT_ENABLED: "false"
    ports:
      - "8081:8081"
    depends_on:
      - postgresql
      - redis
      - kafka
      - nacos
      - permission-admin

  datasource-management:
    <<: *java-common
    image: datasmart/datasource-management:${DATASMART_IMAGE_TAG:-local}
    container_name: datasmart-datasource-management
    build:
      context: .
      dockerfile: docker/runtime/java-service.Dockerfile
      args:
        MODULE: datasource-management
        SERVER_PORT: 8082
    environment:
      <<: *java-common-environment
      # datasource-management 的平台业务事实库已迁移到 PostgreSQL。
      # 注意：这只覆盖 Spring Boot 自身 datasource；模块仍然可以通过连接器驱动访问客户侧 MySQL 数据源。
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/datasmart_govern?currentSchema=datasource_management&ApplicationName=datasmart-datasource-management
      SPRING_DATASOURCE_USERNAME: datasmart
      SPRING_DATASOURCE_PASSWORD: ${DATASMART_POSTGRES_PASSWORD:-password}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      # 数据源连接密码会以 AES-GCM 密文写入 datasource_config.password。
      # 本地 Compose 给出可重复的开发 key，便于容器重建后仍能解密；生产环境必须改用 Secret Manager/KMS/集群 Secret。
      DATASMART_DATASOURCE_CREDENTIAL_MASTER_KEY: ${DATASMART_DATASOURCE_CREDENTIAL_MASTER_KEY:-local-compose-datasource-credential-master-key-change-before-production}
      DATASMART_DATASOURCE_CREDENTIAL_KEY_ID: ${DATASMART_DATASOURCE_CREDENTIAL_KEY_ID:-compose-local-v1}
      DATASMART_TASK_MANAGEMENT_BASE_URL: http://task-management:8081
    ports:
      - "8082:8082"
    depends_on:
      - postgresql
      - redis
      - kafka
      - nacos
      - task-management

  data-sync:
    <<: *java-common
    image: datasmart/data-sync:${DATASMART_IMAGE_TAG:-local}
    container_name: datasmart-data-sync
    build:
      context: .
      dockerfile: docker/runtime/java-service.Dockerfile
      args:
        MODULE: data-sync
        SERVER_PORT: 8086
    environment:
      <<: *java-common-environment
      # data-sync 的平台业务事实库已迁移到 PostgreSQL。
      # 这里覆盖公共 MySQL datasource，只影响模板、任务、执行、checkpoint、事故和 outbox 控制面表；
      # 客户侧 MySQL/PostgreSQL/Kafka/文件等源端或目标端仍通过 datasource-management 的连接器能力访问。
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/datasmart_govern?currentSchema=data_sync&ApplicationName=datasmart-data-sync
      SPRING_DATASOURCE_USERNAME: datasmart
      SPRING_DATASOURCE_PASSWORD: ${DATASMART_POSTGRES_PASSWORD:-password}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      DATASMART_DATA_SYNC_DATASOURCE_CAPABILITY_BASE_URL: http://datasource-management:8082
      DATASMART_DATA_SYNC_DATASOURCE_RUN_ONCE_BASE_URL: http://datasource-management:8082
      DATASMART_DATA_SYNC_TASK_MANAGEMENT_RECEIPT_BASE_URL: http://task-management:8081
      # 完整 Compose 运行模式代表“产品闭环联调”，不能只创建 QUEUED execution 而没有执行器消费。
      # task-scheduler 负责扫描 SCHEDULED/定期任务并创建到期 execution；
      # worker-loop 负责认领 QUEUED execution，并调用 datasource-management 的 run-once 执行真实读写。
      # 单独 IDE/开发模式仍保持 application.yml 默认关闭，避免只启动 data-sync 时误消费历史任务。
      DATASMART_DATA_SYNC_TASK_SCHEDULER_SCHEDULER_ENABLED: ${DATASMART_DATA_SYNC_TASK_SCHEDULER_SCHEDULER_ENABLED:-true}
      DATASMART_DATA_SYNC_TASK_SCHEDULER_INITIAL_DELAY_MS: ${DATASMART_DATA_SYNC_TASK_SCHEDULER_INITIAL_DELAY_MS:-5000}
      DATASMART_DATA_SYNC_TASK_SCHEDULER_FIXED_DELAY_MS: ${DATASMART_DATA_SYNC_TASK_SCHEDULER_FIXED_DELAY_MS:-10000}
      DATASMART_DATA_SYNC_WORKER_LOOP_SCHEDULER_ENABLED: ${DATASMART_DATA_SYNC_WORKER_LOOP_SCHEDULER_ENABLED:-true}
      DATASMART_DATA_SYNC_WORKER_LOOP_INITIAL_DELAY_MS: ${DATASMART_DATA_SYNC_WORKER_LOOP_INITIAL_DELAY_MS:-5000}
      DATASMART_DATA_SYNC_WORKER_LOOP_FIXED_DELAY_MS: ${DATASMART_DATA_SYNC_WORKER_LOOP_FIXED_DELAY_MS:-5000}
      DATASMART_DATA_SYNC_WORKER_LOOP_MAX_EXECUTIONS_PER_RUN: ${DATASMART_DATA_SYNC_WORKER_LOOP_MAX_EXECUTIONS_PER_RUN:-5}
    ports:
      - "8086:8086"
    depends_on:
      - postgresql
      - redis
      - kafka
      - nacos
      - datasource-management
      - task-management

  data-quality:
    <<: *java-common
    image: datasmart/data-quality:${DATASMART_IMAGE_TAG:-local}
    container_name: datasmart-data-quality
    build:
      context: .
      dockerfile: docker/runtime/java-service.Dockerfile
      args:
        MODULE: data-quality
        SERVER_PORT: 8083
    environment:
      <<: *java-common-environment
      # data-quality 已完成 PostgreSQL 切换，显式覆盖公共锚点中的迁移期 MySQL 配置。
      # schema 隔离既是表命名空间，也是阻止跨微服务误访问业务事实的第一道边界。
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/datasmart_govern?currentSchema=data_quality&ApplicationName=datasmart-data-quality
      SPRING_DATASOURCE_USERNAME: datasmart
      SPRING_DATASOURCE_PASSWORD: ${DATASMART_POSTGRES_PASSWORD:-password}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: ${DATASMART_NEO4J_PASSWORD:-password}
      DATASMART_QUALITY_DATASOURCE_READ_ONLY_SQL_BASE_URL: http://datasource-management:8082
      DATASMART_QUALITY_DATASOURCE_METADATA_VALIDATION_BASE_URL: http://datasource-management:8082
      DATASMART_QUALITY_TASK_MANAGEMENT_BASE_URL: http://task-management:8081
      # 内置执行器默认关闭；管理员完成数据源、规则和容量校验后再显式启用。
      DATASMART_QUALITY_TASK_MANAGEMENT_EXECUTOR_COORDINATOR_ENABLED: "false"
    ports:
      - "8083:8083"
    depends_on:
      - postgresql
      - redis
      - kafka
      - nacos
      - neo4j
      - datasource-management
      - task-management

  agent-runtime:
    <<: *java-common
    image: datasmart/agent-runtime:${DATASMART_IMAGE_TAG:-local}
    container_name: datasmart-agent-runtime
    build:
      context: .
      dockerfile: docker/runtime/java-service.Dockerfile
      args:
        MODULE: agent-runtime
        SERVER_PORT: 8091
    environment:
      <<: *java-common-environment
      # agent-runtime 控制面事实库已迁入 PostgreSQL `agent_runtime` schema。
      # 这里不使用公共 java-common-environment 中的迁移期 MySQL datasource，而是显式配置专用 JDBC 连接；
      # 当前默认 store 仍是 memory，不会自动执行真实工具副作用，但 Flyway 会在容器启动时校验控制面表基线。
      DATASMART_AGENT_RUNTIME_JDBC_URL: jdbc:postgresql://postgresql:5432/datasmart_govern?currentSchema=agent_runtime&ApplicationName=datasmart-agent-runtime
      DATASMART_AGENT_RUNTIME_JDBC_USERNAME: datasmart
      DATASMART_AGENT_RUNTIME_JDBC_PASSWORD: ${DATASMART_POSTGRES_PASSWORD:-password}
      DATASMART_AGENT_RUNTIME_JDBC_DRIVER_CLASS_NAME: org.postgresql.Driver
      DATASMART_AGENT_RUNTIME_FLYWAY_ENABLED: "true"
      DATASMART_PERMISSION_ADMIN_EVALUATE_URL: http://permission-admin:8085/permissions/evaluate
      DATASMART_AGENT_RUNTIME_RESUME_APPROVAL_FACT_EVALUATE_URL: http://permission-admin:8085/permissions/agent/tool-action-approvals/evaluate
      DATASMART_TASK_MANAGEMENT_AGENT_COMMAND_CONSUME_URL: http://task-management:8081/internal/agent-async-task-commands/consume
      DATASMART_AGENT_RUNTIME_ARTIFACT_MINIO_ENDPOINT: http://minio:9000
      DATASMART_AGENT_RUNTIME_ARTIFACT_MINIO_ACCESS_KEY: ${DATASMART_MINIO_ACCESS_KEY:-datasmart}
      DATASMART_AGENT_RUNTIME_ARTIFACT_MINIO_SECRET_KEY: ${DATASMART_MINIO_SECRET_KEY:-datasmart123}
      DATASMART_AGENT_RUNTIME_TOOL_SERVICE_BASE_URLS_DATASOURCE_MANAGEMENT: http://datasource-management:8082
      DATASMART_AGENT_RUNTIME_TOOL_SERVICE_BASE_URLS_DATA_QUALITY: http://data-quality:8083
      DATASMART_AGENT_RUNTIME_TOOL_SERVICE_BASE_URLS_TASK_MANAGEMENT: http://task-management:8081
      DATASMART_AGENT_RUNTIME_TOOL_SERVICE_BASE_URLS_DATA_SYNC: http://data-sync:8086
      # dispatcher 默认关闭，避免容器启动后自动派发历史 outbox 或执行真实工具。
      DATASMART_AGENT_RUNTIME_OUTBOX_DISPATCHER_ENABLED: "false"
      DATASMART_AGENT_RUNTIME_ASYNC_COMMAND_DISPATCHER_ENABLED: "false"
      # MCP Durable Worker 是 agent-runtime 调用 Python Runtime 执行真实 MCP tools/call 的内部桥接。
      # 当前只打开 client 配置，不打开 outbox 自动消费；后续 dispatcher 接入后再由 outbox 状态机受控触发。
      DATASMART_AGENT_RUNTIME_MCP_DURABLE_WORKER_ENABLED: "true"
      DATASMART_AGENT_RUNTIME_MCP_DURABLE_WORKER_BASE_URL: http://python-ai-runtime:8090
      DATASMART_AGENT_RUNTIME_MCP_DURABLE_WORKER_RUN_PATH: /internal/agent/mcp/durable-worker/run
      DATASMART_AGENT_RUNTIME_MCP_DURABLE_WORKER_INCLUDE_MODEL_FEEDBACK: "true"
      DATASMART_AGENT_RUNTIME_MCP_DURABLE_WORKER_POST_TO_JAVA: "false"
    ports:
      - "8091:8091"
    depends_on:
      - postgresql
      - redis
      - kafka
      - nacos
      - minio
      - permission-admin
      - data-sync

  observability:
    <<: *java-common
    image: datasmart/observability:${DATASMART_IMAGE_TAG:-local}
    container_name: datasmart-observability
    build:
      context: .
      dockerfile: docker/runtime/java-service.Dockerfile
      args:
        MODULE: observability
        SERVER_PORT: 8084
    environment:
      <<: *java-common-environment
      # observability 已完成 PostgreSQL 试点切换，显式覆盖公共锚点中的迁移期 MySQL 配置。
      # currentSchema 保证该服务只能通过默认 search_path 访问自己的 schema。
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/datasmart_govern?currentSchema=observability&ApplicationName=datasmart-observability
      SPRING_DATASOURCE_USERNAME: datasmart
      SPRING_DATASOURCE_PASSWORD: ${DATASMART_POSTGRES_PASSWORD:-password}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      DATASMART_OBSERVABILITY_GATEWAY_BASE_URL: http://gateway:8080
      DATASMART_OBSERVABILITY_PERMISSION_ADMIN_BASE_URL: http://permission-admin:8085
      DATASMART_OBSERVABILITY_TASK_MANAGEMENT_BASE_URL: http://task-management:8081
      DATASMART_OBSERVABILITY_DATASOURCE_MANAGEMENT_BASE_URL: http://datasource-management:8082
      DATASMART_OBSERVABILITY_DATA_SYNC_BASE_URL: http://data-sync:8086
      DATASMART_OBSERVABILITY_DATA_QUALITY_BASE_URL: http://data-quality:8083
      DATASMART_OBSERVABILITY_AGENT_RUNTIME_BASE_URL: http://agent-runtime:8091
      DATASMART_OBSERVABILITY_SELF_BASE_URL: http://observability:8084
      DATASMART_OBSERVABILITY_PYTHON_AI_RUNTIME_BASE_URL: http://python-ai-runtime:8090
    ports:
      - "8084:8084"
    depends_on:
      - postgresql
      - gateway
      - permission-admin
      - task-management
      - datasource-management
      - data-sync
      - data-quality
      - agent-runtime
      - python-ai-runtime

  python-ai-runtime:
    restart: unless-stopped
    image: datasmart/python-ai-runtime:${DATASMART_IMAGE_TAG:-local}
    container_name: datasmart-python-ai-runtime
    build:
      context: .
      dockerfile: docker/runtime/python-ai-runtime.Dockerfile
      args:
        # postgresql extra 安装 psycopg3，用于 AI Memory 迁入 PostgreSQL/pgvector 后的长期记忆、receipt、
        # lease、审计 outbox 和 LangGraph durable state 持久化。默认仍不强制开启各 store，避免本地学习环境
        # 因未完成 schema 应用或数据库凭据而无法启动。
        PYTHON_RUNTIME_EXTRAS: api,rag,kafka,redis,postgresql,mcp
        # pip 包默认使用国内镜像；企业部署可注入内网 PyPI/制品库地址。该参数不影响 DaoCloud 基础镜像前缀。
        PIP_INDEX_URL: ${DATASMART_PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}
    environment:
      TZ: ${DATASMART_TIME_ZONE:-Asia/Shanghai}
      DATASMART_AGENT_RUNTIME_BASE_URL: http://agent-runtime:8091
      # Agent business plans must enter the Java control plane before any
      # confirmed side effect can run. This produces durable session/run/audit
      # references used by HITL confirmation, execution, replay and diagnostics.
      DATASMART_AGENT_RUNTIME_PLAN_INGESTION_ENABLED: "true"
      DATASMART_PERMISSION_ADMIN_BASE_URL: http://permission-admin:8085
      DATASMART_AI_RUNTIME_REDIS_URL: redis://redis:6379/0
      DATASMART_AI_RUNTIME_EVENT_STORE: redis-stream
      DATASMART_AI_RUNTIME_EVENT_CHECKPOINT_STORE: redis
      DATASMART_AI_RUNTIME_EVENT_OUTBOX_STORE: redis
      # Durable Agent Loop 使用独立 Redis DB 保存低敏恢复现场，避免容器重启或多实例切换后丢失 run 状态。
      # 它与 runtime event/checkpoint 数据分库，便于容量、TTL、备份和故障排查分别治理。
      DATASMART_AGENT_DURABLE_LOOP_STORE: redis
      DATASMART_AGENT_DURABLE_LOOP_REDIS_URL: redis://redis:6379/2
      DATASMART_AGENT_DURABLE_LOOP_TTL_SECONDS: "86400"
      # AI Memory 的目标 PostgreSQL DSN。各 memory 组件可用专属 DSN 覆盖；未覆盖时统一回退到该值。
      # DSN 使用 options 设置 search_path=ai_memory，让 Python SQL store 使用无 schema 前缀表名时仍被限制在
      # ai_memory schema 内，避免误写 public、agent_runtime 或其他 Java 微服务 schema。
      DATASMART_AI_MEMORY_POSTGRESQL_DSN: postgresql://datasmart:${DATASMART_POSTGRES_PASSWORD:-password}@postgresql:5432/datasmart_govern?options=-csearch_path%3Dai_memory
      DATASMART_AI_RUNTIME_EVENT_PUBLISHER: kafka
      DATASMART_AI_RUNTIME_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATASMART_GATEWAY_SIGNATURE_REQUIRED: "true"
      DATASMART_GATEWAY_SIGNATURE_SECRET: ${DATASMART_GATEWAY_SIGNATURE_SECRET:-local-development-only-change-me}
      DATASMART_GATEWAY_SIGNATURE_KEY_ID: ${DATASMART_GATEWAY_SIGNATURE_KEY_ID:-gateway-compose-v1}
      DATASMART_GATEWAY_SIGNATURE_NONCE_STORE: redis
      DATASMART_GATEWAY_SIGNATURE_NONCE_REDIS_URL: redis://redis:6379/1
      # 未配置真实模型 Provider 时仍保持 dry-run/诊断能力；生产部署再注入模型地址和 API Key。
      DATASMART_AI_OPENAI_COMPATIBLE_BASE_URL: ${DATASMART_AI_OPENAI_COMPATIBLE_BASE_URL:-}
      DATASMART_AI_OPENAI_COMPATIBLE_API_KEY: ${DATASMART_AI_OPENAI_COMPATIBLE_API_KEY:-}
      DATASMART_AI_OPENAI_COMPATIBLE_USER_AGENT: ${DATASMART_AI_OPENAI_COMPATIBLE_USER_AGENT:-DataSmart-AI-Runtime/1.0}
      DATASMART_AI_OPENAI_COMPATIBLE_WIRE_API: ${DATASMART_AI_OPENAI_COMPATIBLE_WIRE_API:-chat_completions}
      DATASMART_AI_AGENT_REASONING_EFFORT: ${DATASMART_AI_AGENT_REASONING_EFFORT:-}
      DATASMART_AI_OPENAI_COMPATIBLE_STORE_RESPONSE: ${DATASMART_AI_OPENAI_COMPATIBLE_STORE_RESPONSE:-false}
      DATASMART_AI_OPENAI_COMPATIBLE_TOOL_CALL_MODE: ${DATASMART_AI_OPENAI_COMPATIBLE_TOOL_CALL_MODE:-native}
      # model 必须使用 Provider 真实暴露的 ID，不根据营销名称或页面显示名猜测。
      # 同一 AGENT_REASONING 路由同时服务于自由文本意图识别、工具调用规划和工具结果二轮回答。
      DATASMART_AI_AGENT_REASONING_MODEL: ${DATASMART_AI_AGENT_REASONING_MODEL:-}
      DATASMART_AI_AGENT_REASONING_PROVIDER_NAME: ${DATASMART_AI_AGENT_REASONING_PROVIDER_NAME:-openai-compatible-agent-router}
      DATASMART_AI_AGENT_REASONING_TIMEOUT_SECONDS: ${DATASMART_AI_AGENT_REASONING_TIMEOUT_SECONDS:-90}
      DATASMART_AI_AGENT_REASONING_MAX_CONTEXT_TOKENS: ${DATASMART_AI_AGENT_REASONING_MAX_CONTEXT_TOKENS:-131072}
      DATASMART_AI_OPENAI_COMPATIBLE_MAX_RETRIES: ${DATASMART_AI_OPENAI_COMPATIBLE_MAX_RETRIES:-1}
      DATASMART_AI_OPENAI_COMPATIBLE_RETRY_BACKOFF_SECONDS: ${DATASMART_AI_OPENAI_COMPATIBLE_RETRY_BACKOFF_SECONDS:-0.5}
    ports:
      - "8090:8090"
    networks:
      - datasmart-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
      agent-runtime:
        condition: service_started
      permission-admin:
        condition: service_started

  # 覆盖基础 Compose 的宿主机抓取配置，使全容器模式使用服务 DNS。
  prometheus:
    volumes:
      - ./docker/prometheus/prometheus.application.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - gateway
      - permission-admin
      - task-management
      - datasource-management
      - data-sync
      - data-quality
      - agent-runtime
      - observability
      - python-ai-runtime
