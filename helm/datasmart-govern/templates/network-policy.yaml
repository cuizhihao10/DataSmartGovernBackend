{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "datasmart-govern.fullname" . }}-same-namespace
  labels:
    {{- include "datasmart-govern.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "datasmart-govern.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    # 第一版默认允许出站，原因是生产环境通常会访问客户托管的 MySQL、Redis、Kafka、IdP、模型网关等外部服务。
    # 更严格的 egress allow-list 应在客户网络拓扑、DNS、Service Mesh 或 NetworkPolicy 策略确认后再收紧。
    - {}
{{- end }}
