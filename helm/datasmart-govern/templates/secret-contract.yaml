apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "datasmart-govern.fullname" . }}-secret-contract
  labels:
    {{- include "datasmart-govern.labels" . | nindent 4 }}
    datasmart.cui/contract-type: secret-boundary
data:
  README.md: |-
    DataSmart Govern Secret Contract

    这个 ConfigMap 不是 Secret，也不保存任何密码。
    它的作用是把 chart 需要的 Secret key 明确写成可审查契约，方便平台管理员在正式发布前创建：
    kubectl create secret generic {{ .Values.global.existingSecret }} --from-literal=...

    生产环境必须由 Secret Manager、ExternalSecrets、SealedSecrets、Vault、云厂商 KMS 或客户认可的密钥系统提供这些值。
    不要把真实密码、token、OIDC client secret、模型 API Key、TLS 私钥写入 values.yaml 或 ConfigMap。
  required-keys: |-
{{- range .Values.secretContract.requiredKeys }}
    - {{ . }}
{{- end }}
